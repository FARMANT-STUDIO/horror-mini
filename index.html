<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HORROR MINI ALPHA 0.05</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/simplex-noise@2.4.0/simplex-noise.min.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Courier New', monospace; user-select: none; }
        #menu {
            position: fixed; inset: 0; background: radial-gradient(circle, #220000 0%, #000 100%);
            display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100;
        }
        #title { color: #ff0000; font-size: clamp(48px, 10vw, 80px); font-weight: 900; text-shadow: 4px 4px #000; margin: 0; }
        #version { color: #fff; font-size: 18px; margin-bottom: 30px; letter-spacing: 5px; }
        #btn-create {
            padding: 15px 40px; font-size: 20px; color: white; background: transparent;
            border: 3px solid white; cursor: pointer; border-radius: 4px; transition: 0.3s;
        }
        #btn-create:hover { background: white; color: black; }
        #ui-overlay {
            position: fixed; top: 10px; left: 10px; color: white; font-size: 12px; display: none; z-index: 50; width: 100%;
        }
        #gpu-monitor {
            position: fixed; bottom: 10px; right: 10px; background: rgba(0,0,0,0.8);
            border: 1px solid #00ff00; padding: 10px; color: #00ff00; font-size: 10px; display: none;
        }
        #crosshair {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            color: white; font-size: 24px; pointer-events: none; display: none; z-index: 60;
        }
    </style>
</head>
<body>

    <div id="menu">
        <h1 id="title">HORROR MINI</h1>
        <div id="version">ALPHA 0.05</div>
        <button id="btn-create">DÜNYA OLUŞTUR</button>
    </div>

    <div id="ui-overlay">
        <span>THE GAME'S DEVELOPER IS STRLXY-B9Q. DO NOT CHANGE IT.</span>
        <span style="margin-left: 20px; color: #ff8800; font-weight: bold;">ALPHA 0.05</span>
    </div>

    <div id="crosshair">+</div>

    <div id="gpu-monitor">
        <div>PRIMARY GPU: <span id="gpu-load">0%</span></div>
        <div>AUXILIARY GPU: <span id="aux-status" style="color:#00ffff">READY</span></div>
    </div>

    <script>
        let scene, camera, renderer, simplex, worldSeed;
        let clock = new THREE.Clock();
        const CHUNK_SIZE = 13;
        const VIEW_DISTANCE = 3; 
        const SEA_LEVEL = 23;
        const worldBlocks = new Map();
        const chunkMeshes = new Map();
        let clouds = [];
        
        const player = {
            pos: new THREE.Vector3(0, 40, 0),
            vel: new THREE.Vector3(0, 0, 0),
            speed: 0.12,
            jumpForce: 0.18,
            onGround: false,
            inWater: false,
            height: 1.8,
            radius: 0.3
        };

        const keys = {};

        document.getElementById('btn-create').addEventListener('click', () => {
            document.getElementById('menu').style.display = 'none';
            document.getElementById('ui-overlay').style.display = 'block';
            document.getElementById('gpu-monitor').style.display = 'block';
            document.getElementById('crosshair').style.display = 'block';
            initGame();
        });

        function initGame() {
            worldSeed = Math.floor(Math.random() * 9000000) + 1000000;
            simplex = new SimplexNoise(worldSeed.toString());

            scene = new THREE.Scene();
            const skyColor = 0x556677; // Korku atmosferi için daha karanlık mavi
            scene.background = new THREE.Color(skyColor);
            scene.fog = new THREE.Fog(skyColor, 5, CHUNK_SIZE * VIEW_DISTANCE);

            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            
            renderer = new THREE.WebGLRenderer({ antialias: false });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(1);
            document.body.appendChild(renderer.domElement);

            const sun = new THREE.DirectionalLight(0xffffff, 0.8);
            sun.position.set(0, 100, 0);
            scene.add(sun);
            scene.add(new THREE.AmbientLight(0xffffff, 0.4));

            initMaterials();
            initClouds();
            
            // Spawn Ayarı
            const startY = getTerrainHeight(0, 0);
            player.pos.set(0, startY + 2, 0);

            window.addEventListener('keydown', e => keys[e.code] = true);
            window.addEventListener('keyup', e => keys[e.code] = false);
            document.addEventListener('mousemove', onMouseMove);
            document.body.addEventListener('click', () => document.body.requestPointerLock());
            window.addEventListener('resize', onWindowResize);

            requestAnimationFrame(animate);
        }

        let matList;
        function initMaterials() {
            const grassTop = new THREE.MeshLambertMaterial({color: 0x3d9e3d});
            const grassSide = new THREE.MeshLambertMaterial({color: 0xffa500}); 
            matList = {
                grass: [grassSide, grassSide, grassTop, grassSide, grassSide, grassSide],
                dirt: new THREE.MeshLambertMaterial({color: 0xffa500}), 
                stone: new THREE.MeshLambertMaterial({color: 0x777777}),
                wood: new THREE.MeshLambertMaterial({color: 0x5D2906}),
                leaf: new THREE.MeshLambertMaterial({color: 0x116611, transparent: true, opacity: 0.9}),
                water: new THREE.MeshLambertMaterial({color: 0x0044ff, transparent: true, opacity: 0.6}),
                cloud: new THREE.MeshBasicMaterial({color: 0xffffff, transparent: true, opacity: 0.8})
            };
        }

        function getTerrainHeight(x, z) {
            const distFromCenter = Math.sqrt(x*x + z*z);
            let baseHeight = 25;
            
            if (distFromCenter < 12) {
                return baseHeight; // Spawn noktası düz
            } else {
                let noise = simplex.noise2D(x * 0.05, z * 0.05) * 12;
                return Math.floor(baseHeight + noise);
            }
        }

        function createChunk(cx, cz) {
            const key = `${cx},${cz}`;
            if (chunkMeshes.has(key)) return;

            document.getElementById('aux-status').innerText = "CALCULATING";
            
            const group = new THREE.Group();
            const geo = new THREE.BoxGeometry(1, 1, 1);
            const blocks = { grass: [], dirt: [], stone: [], wood: [], leaf: [], water: [] };

            for (let x = 0; x < CHUNK_SIZE; x++) {
                for (let z = 0; z < CHUNK_SIZE; z++) {
                    const wx = cx * CHUNK_SIZE + x;
                    const wz = cz * CHUNK_SIZE + z;
                    const h = getTerrainHeight(wx, wz);

                    // Su Seviyesi Kontrolü
                    if (h < SEA_LEVEL) {
                        for (let y = h + 1; y <= SEA_LEVEL; y++) {
                            setBlock(wx, y, wz, 'water');
                            blocks.water.push(new THREE.Vector3(wx, y, wz));
                        }
                    }

                    // Katmanlar
                    setBlock(wx, h, wz, 'grass');
                    blocks.grass.push(new THREE.Vector3(wx, h, wz));

                    for(let y = 1; y <= 5; y++) {
                        setBlock(wx, h - y, wz, 'dirt');
                        blocks.dirt.push(new THREE.Vector3(wx, h - y, wz));
                    }
                    for(let y = 6; y <= 26; y++) {
                        setBlock(wx, h - y, wz, 'stone');
                        blocks.stone.push(new THREE.Vector3(wx, h - y, wz));
                    }

                    // Ağaçlar (7 Blok)
                    if (Math.abs(wx) > 15 && Math.abs(wz) > 15 && h >= SEA_LEVEL && Math.random() < 0.012) {
                        for(let i = 1; i <= 7; i++) {
                            setBlock(wx, h + i, wz, 'wood');
                            blocks.wood.push(new THREE.Vector3(wx, h + i, wz));
                        }
                        // Yapraklar
                        for(let ly = 6; ly <= 9; ly++) {
                            for(let lx = -2; lx <= 2; lx++) {
                                for(let lz = -2; lz <= 2; lz++) {
                                    if (Math.abs(lx) + Math.abs(lz) < 3) {
                                        setBlock(wx + lx, h + ly, wz + lz, 'leaf');
                                        blocks.leaf.push(new THREE.Vector3(wx + lx, h + ly, wz + lz));
                                    }
                                }
                            }
                        }
                    }
                }
            }

            // GPU Optimizasyonu: Her tip bloğu tek bir InstanceMesh yap
            Object.keys(blocks).forEach(type => {
                const list = blocks[type];
                if (list.length === 0) return;
                const inst = new THREE.InstancedMesh(geo, type === 'grass' ? matList.grass : matList[type], list.length);
                const mat = new THREE.Matrix4();
                list.forEach((pos, i) => {
                    mat.setPosition(pos);
                    inst.setMatrixAt(i, mat);
                });
                group.add(inst);
            });

            scene.add(group);
            chunkMeshes.set(key, group);
            document.getElementById('aux-status').innerText = "IDLE";
        }

        function setBlock(x, y, z, type) {
            worldBlocks.set(`${Math.floor(x)},${Math.floor(y)},${Math.floor(z)}`, type);
        }

        function getBlock(x, y, z) {
            return worldBlocks.get(`${Math.floor(x)},${Math.floor(y)},${Math.floor(z)}`);
        }

        function checkCollision(x, y, z) {
            const r = player.radius;
            const h = player.height;
            for (let ox = -r; ox <= r; ox += r * 2) {
                for (let oz = -r; oz <= r; oz += r * 2) {
                    for (let oy = 0.1; oy <= h; oy += h / 2) {
                        const block = getBlock(x + ox, y + oy, z + oz);
                        // Su içinden geçilebilir, diğerleri katı
                        if (block && block !== 'water') return true;
                    }
                }
            }
            return false;
        }

        function updatePhysics() {
            // Su kontrolü
            const currentBlock = getBlock(player.pos.x, player.pos.y + 0.5, player.pos.z);
            player.inWater = (currentBlock === 'water');

            let gravity = player.inWater ? 0.002 : 0.01;
            player.vel.y -= gravity;

            const moveDir = new THREE.Vector3();
            if (keys['KeyW']) moveDir.z -= 1;
            if (keys['KeyS']) moveDir.z += 1;
            if (keys['KeyA']) moveDir.x -= 1;
            if (keys['KeyD']) moveDir.x += 1;
            
            moveDir.applyQuaternion(camera.quaternion);
            moveDir.y = 0;
            moveDir.normalize();

            let currentSpeed = player.inWater ? player.speed * 0.5 : player.speed;

            const nextX = player.pos.x + moveDir.x * currentSpeed;
            const nextZ = player.pos.z + moveDir.z * currentSpeed;

            if (!checkCollision(nextX, player.pos.y, player.pos.z)) player.pos.x = nextX;
            if (!checkCollision(player.pos.x, player.pos.y, nextZ)) player.pos.z = nextZ;

            const nextY = player.pos.y + player.vel.y;
            if (checkCollision(player.pos.x, nextY, player.pos.z)) {
                if (player.vel.y < 0) player.onGround = true;
                player.vel.y = 0;
            } else {
                player.pos.y = nextY;
                player.onGround = false;
            }

            if (keys['Space']) {
                if (player.onGround) player.vel.y = player.jumpForce;
                else if (player.inWater) player.vel.y = 0.05; // Yüzme
            }

            camera.position.copy(player.pos).y += 1.6;
        }

        function initClouds() {
            const cloudGeo = new THREE.BoxGeometry(12, 1, 12);
            for(let i = 0; i < 20; i++) {
                const cloud = new THREE.Mesh(cloudGeo, matList.cloud);
                cloud.position.set(Math.random() * 200 - 100, 50, Math.random() * 200 - 100);
                scene.add(cloud);
                clouds.push(cloud);
            }
        }

        function onMouseMove(e) {
            if (document.pointerLockElement) {
                camera.rotation.y -= e.movementX * 0.002;
                camera.rotation.x -= e.movementY * 0.002;
                camera.rotation.x = Math.max(-Math.PI / 2, Math.min(Math.PI / 2, camera.rotation.x));
            }
        }

        function animate() {
            requestAnimationFrame(animate);
            updatePhysics();

            const px = Math.floor(player.pos.x / CHUNK_SIZE);
            const pz = Math.floor(player.pos.z / CHUNK_SIZE);

            // Chunk yönetimi (3 Chunk görüş mesafesi)
            for (let x = px - VIEW_DISTANCE; x <= px + VIEW_DISTANCE; x++) {
                for (let z = pz - VIEW_DISTANCE; z <= pz + VIEW_DISTANCE; z++) {
                    createChunk(x, z);
                }
            }

            // Bulut Dönüşümü
            clouds.forEach(c => {
                c.scale.y = (player.pos.y > 20) ? 4 : 0.1;
                c.position.x += 0.01;
            });

            document.getElementById('gpu-load').innerText = Math.floor(renderer.info.render.calls / 10) + "%";
            renderer.render(scene, camera);
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

    </script>
</body>
</html>
