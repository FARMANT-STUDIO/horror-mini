<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HORROR MINI</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Press Start 2P', system-ui; color: #fff; }
        canvas { display: block; }
        
        #menu {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.97); display: flex; flex-direction: column;
            align-items: center; justify-content: center; z-index: 100;
        }
        #title {
            font-size: 68px; color: #ff0000; text-shadow: 0 0 30px #ff0000;
            animation: horrorShake 0.7s infinite alternate; margin-bottom: 10px;
        }
        @keyframes horrorShake { 0% { transform: translate(-2px, -2px) rotate(-3deg); } 100% { transform: translate(2px, 3px) rotate(3deg); } }
        
        #startBtn {
            padding: 18px 70px; font-size: 26px; background: #300000; color: #ff6666;
            border: 4px solid #ff0000; cursor: pointer; margin-top: 40px;
        }
        #startBtn:hover { background: #600000; transform: scale(1.08); }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
</head>
<body>
    <div id="menu">
        <div id="title">HORROR MINI</div>
        <div style="color:#cc0000; font-size:18px; text-align:center; line-height:1.4;">
            Kalp atışından hızlı<br>mouse'dan daha hızlı
        </div>
        <button id="startBtn">DÜNYA OLUŞTUR</button>
    </div>

    <script>
        // ==================== SEED SISTEMI ====================
        let seed = 1234567;
        let rngState = 0;

        function setSeed(s) {
            seed = s;
            rngState = s >>> 0;
        }

        function random() {
            rngState = (rngState + 0x6D2B79F5) >>> 0;
            let t = Math.imul(rngState ^ (rngState >>> 15), 1 | rngState);
            t = t + Math.imul(t ^ (t >>> 7), 61 | t) >>> 0;
            return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
        }

        function noise(x, z) {
            const n = Math.floor(x * 123.45 + z * 234.56) ^ seed;
            let val = Math.sin(n) * 43758.5453;
            return (val - Math.floor(val)) * 2 - 1;
        }

        // ==================== OYUN DEĞİŞKENLERİ ====================
        let scene, camera, renderer, player;
        let chunks = new Map();
        let blocks = new Map();
        let niblers = [];
        let clouds = [];
        let health = 10;
        let keys = {};
        let mouseLocked = false;

        const CHUNK_SIZE = 14;
        const VIEW_DISTANCE = 3;        // GTX 1650 için 3'e düşürüldü (daha performanslı)

        const materials = {};

        // ==================== THREE.JS BAŞLATMA ====================
        function initThree() {
            scene = new THREE.Scene();
            scene.fog = new THREE.Fog(0x88aaff, 35, 80);

            camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.1, 150);
            
            renderer = new THREE.WebGLRenderer({ antialias: false });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setClearColor(0x88aaff);
            renderer.shadowMap.enabled = true;
            renderer.shadowMap.type = THREE.PCFShadowMap; // Daha hafif gölge
            document.body.appendChild(renderer.domElement);

            scene.add(new THREE.AmbientLight(0xaaaaaa, 0.6));

            const sun = new THREE.DirectionalLight(0xffeecc, 1.1);
            sun.position.set(40, 70, 30);
            sun.castShadow = true;
            sun.shadow.mapSize.width = 512;
            sun.shadow.mapSize.height = 512;
            scene.add(sun);
        }

        function createPlayer() {
            player = new THREE.Group();
            const body = new THREE.Mesh(
                new THREE.BoxGeometry(0.7, 1.8, 0.7),
                new THREE.MeshLambertMaterial({ color: 0x3366ff })
            );
            body.position.y = 0.9;
            player.add(body);
            scene.add(player);
            player.position.set(10, 25, 10);
        }

        // Basit blok ekleme
        function addBlock(x, y, z, type) {
            const key = `${x},${y},${z}`;
            if (blocks.has(key)) return;

            const geometry = new THREE.BoxGeometry(1, 1, 1);
            let material;

            if (type === 1) material = new THREE.MeshLambertMaterial({ color: 0x3d8c40 });
            else if (type === 2) material = new THREE.MeshLambertMaterial({ color: 0x8c5a2e });
            else material = new THREE.MeshLambertMaterial({ color: 0x777777 });

            const mesh = new THREE.Mesh(geometry, material);
            mesh.position.set(x + 0.5, y + 0.5, z + 0.5);
            mesh.castShadow = true;
            mesh.receiveShadow = true;
            scene.add(mesh);
            blocks.set(key, mesh);
        }

        function generateChunk(cx, cz) {
            const key = `${cx},${cz}`;
            if (chunks.has(key)) return;

            for (let x = 0; x < CHUNK_SIZE; x++) {
                for (let z = 0; z < CHUNK_SIZE; z++) {
                    const wx = cx * CHUNK_SIZE + x;
                    const wz = cz * CHUNK_SIZE + z;
                    
                    let height = Math.floor(8 + Math.sin(wx*0.07)*4 + Math.cos(wz*0.09)*3 + noise(wx*0.1, wz*0.1)*5);
                    height = Math.max(4, Math.min(22, height));

                    for (let y = 0; y < height; y++) {
                        if (y < height - 5) addBlock(wx, y, wz, 3);
                        else if (y < height) addBlock(wx, y, wz, 2);
                        else addBlock(wx, y, wz, 1);
                    }
                }
            }
            chunks.set(key, true);
        }

        function startGame() {
            document.getElementById('menu').style.display = 'none';
            
            seed = Math.floor(Math.random() * 9000000) + 1000000;
            setSeed(seed);
            console.log("%c🌍 World Seed: " + seed, "color: lime; font-size: 16px");

            initThree();
            createPlayer();

            // İlk chunkları oluştur
            for (let x = -2; x <= 2; x++) {
                for (let z = -2; z <= 2; z++) {
                    generateChunk(x, z);
                }
            }

            // Basit animasyon döngüsü
            function animate() {
                requestAnimationFrame(animate);
                
                if (player) {
                    player.rotation.y += 0.001;
                    camera.position.set(player.position.x, player.position.y + 5, player.position.z + 10);
                    camera.lookAt(player.position);
                }
                
                renderer.render(scene, camera);
            }
            animate();

            console.log("%cOyun başarıyla başlatıldı!", "color: cyan");
        }

        // Buton
        document.getElementById('startBtn').addEventListener('click', startGame);

        // Hata yakalama
        window.addEventListener('error', (e) => {
            console.error("Hata:", e.message);
            alert("Bir hata oluştu: " + e.message + "\n\nConsole'a bak (F12)");
        });

        // Pencere yeniden boyutlandırma
        window.addEventListener('resize', () => {
            if (camera && renderer) {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            }
        });
    </script>
</body>
</html>
