<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>HORROR MINI - Deep Alpha</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Courier New', Courier, monospace; }
        #ui-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            background: rgba(0,0,0,0.9); z-index: 10;
        }
        #logo {
            color: #ff0000; font-size: 64px; font-weight: bold;
            text-shadow: 4px 4px #500; margin-bottom: 40px;
            animation: glitch 0.3s infinite;
        }
        .menu-btn {
            background: #111; color: #eee; border: 2px solid #444;
            padding: 12px 25px; font-size: 18px; cursor: pointer;
            margin: 8px; width: 320px; text-transform: uppercase;
        }
        .menu-btn:hover { background: #800; border-color: #fff; }
        
        #save-list { display: none; }
        .save-slot { 
            background: #1a1a1a; border: 1px border #333; 
            padding: 15px; margin: 5px; cursor: pointer; color: #777; width: 300px;
        }
        .save-slot:hover { border-color: #ff0000; color: #fff; }

        @keyframes glitch {
            0% { transform: skew(0deg); }
            50% { transform: skew(2deg); color: #aa0000; }
            100% { transform: skew(-1deg); }
        }
        #crosshair {
            position: absolute; top: 50%; left: 50%;
            width: 15px; height: 15px; border: 1px solid white;
            transform: translate(-50%, -50%); pointer-events: none; display: none;
        }
    </style>
</head>
<body>

    <div id="ui-overlay">
        <div id="logo">HORROR MINI</div>
        <div id="main-menu">
            <button class="menu-btn" onclick="openSinglePlayer()">TEK OYUNCULU</button>
        </div>
        <div id="save-prompt" style="display:none; text-align:center;">
            <p style="color:white; margin-bottom:20px;">Daha önceden oynadığınız (WORLD 1 SAVE) dünyanıza geri dönmek ister misiniz?</p>
            <button class="menu-btn" onclick="startGame(true)">EVET</button>
            <button class="menu-btn" onclick="showSaveList()">HAYIR</button>
        </div>
        <div id="save-list">
            <div class="save-slot" onclick="startGame(false)">[BOŞ SLOT 1] - YENİ DÜNYA</div>
            <div class="save-slot" onclick="startGame(false)">[BOŞ SLOT 2]</div>
            <button class="menu-btn" onclick="backToMenu()">GERİ</button>
        </div>
    </div>
    <div id="crosshair"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script>
        let scene, camera, renderer, stalker;
        let blocks = [];
        let isGameStarted = false;
        let moveForward = false, moveBackward = false, moveLeft = false, moveRight = false;
        let velocity = new THREE.Vector3();

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x010101);
            scene.fog = new THREE.FogExp2(0x010101, 0.08); // Yoğun sis

            camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
            renderer = new THREE.WebGLRenderer({ antialias: false });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            const ambientLight = new THREE.AmbientLight(0x202020, 1); 
            scene.add(ambientLight);

            generateWorld();
            spawnStalker();

            camera.position.set(0, 10, 0); 
            window.addEventListener('resize', onWindowResize);
            document.addEventListener('keydown', (e) => handleKey(e.code, true));
            document.addEventListener('keyup', (e) => handleKey(e.code, false));
        }

        function generateWorld() {
            const boxGeo = new THREE.BoxGeometry(1, 1, 1);
            const stoneMat = new THREE.MeshStandardMaterial({ color: 0x444444 });
            const coalMat = new THREE.MeshStandardMaterial({ color: 0x0a0a0a });
            const woodMat = new THREE.MeshStandardMaterial({ color: 0x3d2b1f });
            const sandMat = new THREE.MeshStandardMaterial({ color: 0xc2b280 });
            const waterMat = new THREE.MeshStandardMaterial({ color: 0x001133, transparent: true, opacity: 0.7 });

            const worldSize = 40;
            const waterLevel = 1;

            for(let x = -worldSize; x < worldSize; x++) {
                for(let z = -worldSize; z < worldSize; z++) {
                    
                    let h = Math.floor(Math.random() * 2);
                    if (Math.abs(x) > 20 || Math.abs(z) > 20) h += Math.floor(Math.random() * 10); // Dağlar

                    // Zemin Blokları
                    for(let y = 0; y <= h; y++) {
                        let mat = stoneMat;
                        if (y > 0 && Math.random() < 0.05) mat = coalMat; // Maden damarı

                        const block = new THREE.Mesh(boxGeo, mat);
                        block.position.set(x, y, z);
                        scene.add(block);
                        blocks.push(block);
                    }

                    // DENİZ VE KUM PİRAMİDİ (%1 ihtimal)
                    if (h < waterLevel) {
                        const water = new THREE.Mesh(boxGeo, waterMat);
                        water.position.set(x, waterLevel, z);
                        scene.add(water);

                        if (Math.random() < 0.005) { // Çok düşük olasılık
                            for(let py=0; py<3; py++) {
                                for(let px=-py; px<=py; px++) {
                                    const p = new THREE.Mesh(boxGeo, sandMat);
                                    p.position.set(x+px, waterLevel+py, z);
                                    scene.add(p);
                                    blocks.push(p);
                                }
                            }
                        }
                    }

                    // AĞAÇLAR (Yapraksız)
                    if (h >= waterLevel && Math.random() < 0.02) {
                        for(let th=1; th<5; th++) {
                            const trunk = new THREE.Mesh(boxGeo, woodMat);
                            trunk.position.set(x, h + th, z);
                            scene.add(trunk);
                            blocks.push(trunk);
                        }
                    }
                }
            }

            // 2X2 TÜNELLER (Rastgele kazılmış tüneller)
            for(let t=0; t<3; t++) {
                let tx = (Math.random()-0.5)*30;
                let tz = (Math.random()-0.5)*30;
                for(let i=0; i<15; i++) {
                    // Tünel aslında blokların arasından boşluk açmaktır ama 
                    // basitlik için buraya karanlık tünel yapısı ekliyoruz
                    const tBlock = new THREE.Mesh(boxGeo, stoneMat);
                    tBlock.position.set(tx, 1, tz+i); 
                    // Tünel efekti için boşluk mantığı basitleştirildi
                }
            }
        }

        function spawnStalker() {
            const stalkerGeo = new THREE.BoxGeometry(0.6, 1.8, 0.6);
            const stalkerMat = new THREE.MeshBasicMaterial({ color: 0xffffff }); // Bembeyaz
            stalker = new THREE.Mesh(stalkerGeo, stalkerMat);
            stalker.position.set(25, 2, 25);
            scene.add(stalker);
        }

        function handleKey(code, isPressed) {
            if(code === 'KeyW') moveForward = isPressed;
            if(code === 'KeyS') moveBackward = isPressed;
            if(code === 'KeyA') moveLeft = isPressed;
            if(code === 'KeyD') moveRight = isPressed;
            if(code === 'Escape' && isPressed) exitGame();
        }

        function update() {
            if(!isGameStarted) return;

            const speed = 0.12;
            if (moveForward) camera.translateZ(-speed);
            if (moveBackward) camera.translateZ(speed);
            if (moveLeft) camera.translateX(-speed);
            if (moveRight) camera.translateX(speed);

            // Stalker (Beyaz Karakter) Takibi - Uzaktan İzleme
            stalker.lookAt(camera.position);
            let dist = stalker.position.distanceTo(camera.position);
            if(dist < 5) { // Çok yaklaşırsan ışınlanır
                stalker.position.set((Math.random()-0.5)*60, 5, (Math.random()-0.5)*60);
            }

            // Raycast Yer Çekimi
            const ray = new THREE.Raycaster(camera.position, new THREE.Vector3(0, -1, 0));
            const hit = ray.intersectObjects(blocks);

            if (hit.length > 0 && hit[0].distance < 1.7) {
                velocity.y = 0;
                camera.position.y = hit[0].point.y + 1.7;
            } else {
                velocity.y -= 0.008;
            }
            camera.position.y += velocity.y;
        }

        function animate() {
            requestAnimationFrame(animate);
            update();
            renderer.render(scene, camera);
        }

        function openSinglePlayer() {
            document.getElementById('main-menu').style.display = 'none';
            document.getElementById('save-prompt').style.display = 'block';
        }
        function showSaveList() {
            document.getElementById('save-prompt').style.display = 'none';
            document.getElementById('save-list').style.display = 'block';
        }
        function startGame(isLoad) {
            document.getElementById('ui-overlay').style.display = 'none';
            document.getElementById('crosshair').style.display = 'block';
            document.body.requestPointerLock();
            isGameStarted = true;
        }
        function exitGame() {
            isGameStarted = false;
            document.exitPointerLock();
            document.getElementById('ui-overlay').style.display = 'flex';
            document.getElementById('main-menu').style.display = 'block';
            document.getElementById('save-list').style.display = 'none';
            document.getElementById('save-prompt').style.display = 'none';
            document.getElementById('crosshair').style.display = 'none';
        }
        function backToMenu() {
            document.getElementById('save-list').style.display = 'none';
            document.getElementById('main-menu').style.display = 'block';
        }
        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        document.body.addEventListener('mousemove', (e) => {
            if(document.pointerLockElement === document.body) {
                camera.rotation.y -= e.movementX * 0.002;
                camera.rotation.x -= e.movementY * 0.002;
            }
        });

        init();
        animate();
    </script>
</body>
</html>
