<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Farmant Studios | Horror-Mini</title>
    <style>
        /* Farmant Studios Stil Ayarları */
        body {
            margin: 0;
            padding: 0;
            background-color: #0d0216; /* Koyu Mor/Siyah Tema */
            color: #fff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        header {
            text-align: center;
            padding: 50px 20px;
            background: linear-gradient(180deg, #1a0533 0%, #0d0216 100%);
            width: 100%;
        }

        h1 { font-size: 3rem; color: #bc13fe; text-shadow: 0 0 15px #bc13fe; }
        p { font-size: 1.2rem; color: #ccc; }

        /* Sürümler Butonu */
        .btn-container { margin: 20px; }
        .btn {
            background-color: #bc13fe;
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 1.1rem;
            cursor: pointer;
            border-radius: 5px;
            transition: 0.3s;
            text-decoration: none;
            display: inline-block;
        }
        .btn:hover { background-color: #8b00cc; transform: scale(1.05); }

        /* Oyun Alanı Simülasyonu */
        #game-canvas {
            width: 80%;
            height: 400px;
            border: 3px solid #bc13fe;
            margin: 40px 0;
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            cursor: crosshair;
        }
        
        .game-msg { color: #555; font-style: italic; }

        footer {
            margin-top: 50px;
            padding: 20px;
            font-size: 0.8rem;
            color: #444;
        }
    </style>
</head>
<body>

    <header>
        <h1>FARMANT STUDIOS</h1>
        <p>Korku-Mini Deneyimine Hoş Geldiniz</p>
        
        <div class="btn-container">
            <a href="#game-start" class="btn" onclick="startGame()">SÜRÜMLERİ OYNA</a>
        </div>
    </header>

    <div id="game-start"></div>

    <div id="game-canvas">
        <p class="game-msg">[ Oyun Alanı: Tıkla ve Kontrolleri Dene ]</p>
        <div style="position: absolute; bottom: 10px; right: 10px; color: #bc13fe; font-size: 12px;">
            Pointer Lock Active: ON
        </div>
    </div>

    <div>
        <h3>Kontroller</h3>
        <ul>
            <li><strong>W-A-S-D:</strong> Hareket</li>
            <li><strong>MOUSE:</strong> Bakış (Pürüzsüz Kontrol)</li>
            <li><strong>ESC:</strong> Çıkış</li>
        </ul>
    </div>

    <footer>
        Farmant Studios - 2026 | Bu bir fan yapımıdır.
    </footer>

    <script>
        // Sürümler butonuna basınca yapılacak işlem
        function startGame() {
            alert("Farmant Studios: Oyun Başlatılıyor! Hazır mısın?");
            document.getElementById('game-canvas').scrollIntoView({ behavior: 'smooth' });
        }

        // Buraya senin orijinal oyun scriptlerini (Pointer Lock vs.) ekleyebilirsin
        console.log("Farmant Studios Sistemleri Aktif.");
    </script>

</body>
</html>
