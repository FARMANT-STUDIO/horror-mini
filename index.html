<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HORROR MINI - ALPHA 0.05</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: Arial, sans-serif; }
        canvas { display: block; }
        
        #menu {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.88); display: flex; flex-direction: column;
            align-items: center; justify-content: center; color: white; z-index: 100;
        }
        #title { font-size: 78px; color: #ff0000; text-shadow: 0 0 25px #ff0000; margin-bottom: 10px; letter-spacing: 6px; }
        #version { font-size: 28px; color: #aaa; margin-bottom: 70px; }
        #createBtn {
            padding: 22px 70px; font-size: 34px; background: #8B0000; color: white;
            border: 5px solid #ff4444; cursor: pointer; font-weight: bold;
        }
        #createBtn:hover { background: #ff0000; transform: scale(1.08); }

        #hud { 
            position: absolute; top: 15px; left: 15px; color: white; font-size: 14px;
            text-shadow: 2px 2px 4px black; z-index: 50; display: none; line-height: 1.4;
        }
        #crosshair { 
            position: absolute; top: 50%; left: 50%; font-size: 32px; color: rgba(255,255,255,0.9);
            transform: translate(-50%, -50%); pointer-events: none; z-index: 60; display: none;
        }
        #instructions {
            position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
            color: #bbb; font-size: 13px; z-index: 50; display: none; text-align: center;
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
</head>
<body>
    <div id="menu">
        <div id="title">HORROR MINI</div>
        <div id="version">ALPHA 0.05</div>
        <button id="createBtn">DÜNYA OLUŞTUR</button>
    </div>

    <div id="hud">
        <div>THE GAME'S DEVELOPER IS STRLXY-B9Q. DO NOT CHANGE IT.</div>
        <div>ALPHA 0.05</div>
    </div>
    <div id="crosshair">+</div>
    <div id="instructions">
        WASD → Hareket | SHIFT → Koş | SPACE → Zıpla | SOL TIK → Kır | SAĞ TIK → Koy | R → Respawn
    </div>

    <script>
        let scene, camera, renderer;
        let worldChunks = new Map();
        let seed = 0;
        const CHUNK_SIZE = 13;
        const RENDER_DISTANCE = 3;

        let move = { forward: false, backward: false, left: false, right: false, sprint: false };
        let velocity = new THREE.Vector3();
        let canJump = true;
        let spawnPoint = new THREE.Vector3(0, 30, 10);

        const BLOCKS = { AIR: 0, GRASS: 1, DIRT: 2, STONE: 3, WOOD: 4, LEAVES: 5, WATER: 6 };

        // ==================== SEED TABANLI RANDOM ====================
        function seededRandom(x, z) {
            let n = Math.sin(x * 12.9898 + z * 78.233 + seed) * 43758.5453123;
            return n - Math.floor(n);
        }

        function getHeight(wx, wz) {
            let h = 9;
            h += Math.floor(seededRandom(wx * 0.08, wz * 0.08) * 7);
            h += Math.floor(seededRandom(wx * 0.25, wz * 0.25) * 4);
            return Math.max(5, h);
        }

        function initThree() {
            scene = new THREE.Scene();
            scene.fog = new THREE.Fog(0x88bbff, 55, 120);

            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 300);
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setClearColor(0x88bbff);
            document.body.appendChild(renderer.domElement);

            scene.add(new THREE.AmbientLight(0xffffff, 0.65));
            const sun = new THREE.DirectionalLight(0xffffff, 0.95);
            sun.position.set(100, 120, 50);
            scene.add(sun);
        }

        function createBlock(x, y, z, type) {
            let material;
            if (type === BLOCKS.GRASS) {
                material = [
                    new THREE.MeshLambertMaterial({ color: 0x8B5A2B }), // sides
                    new THREE.MeshLambertMaterial({ color: 0x8B5A2B }),
                    new THREE.MeshLambertMaterial({ color: 0x00cc00 }), // top
                    new THREE.MeshLambertMaterial({ color: 0x8B5A2B }), // bottom
                    new THREE.MeshLambertMaterial({ color: 0x8B5A2B }),
                    new THREE.MeshLambertMaterial({ color: 0x8B5A2B })
                ];
            } else if (type === BLOCKS.WATER) {
                material = new THREE.MeshLambertMaterial({ color: 0x3388ff, transparent: true, opacity: 0.65 });
            } else {
                const colors = { 2: 0x8B5A2B, 3: 0x777777, 4: 0x8B4513, 5: 0x228B22 };
                material = new THREE.MeshLambertMaterial({ color: colors[type] || 0x888888 });
            }

            const mesh = new THREE.Mesh(new THREE.BoxGeometry(1, 1, 1), material);
            mesh.position.set(x + 0.5, y + 0.5, z + 0.5);
            mesh.userData = { type };
            return mesh;
        }

        function generateChunk(cx, cz) {
            const key = `${cx},${cz}`;
            if (worldChunks.has(key)) return;

            const group = new THREE.Group();

            for (let x = 0; x < CHUNK_SIZE; x++) {
                for (let z = 0; z < CHUNK_SIZE; z++) {
                    const wx = cx * CHUNK_SIZE + x;
                    const wz = cz * CHUNK_SIZE + z;
                    const height = getHeight(wx, wz);

                    // Katmanlar
                    for (let y = 0; y <= height; y++) {
                        let type = (y === height) ? BLOCKS.GRASS :
                                  (y > height - 5) ? BLOCKS.DIRT : BLOCKS.STONE;
                        group.add(createBlock(wx, y, wz, type));
                    }

                    // Ağaçlar
                    if (seededRandom(wx + 100, wz + 100) < 0.085) {
                        const treeY = height + 1;
                        for (let h = 0; h < 7; h++) {
                            group.add(createBlock(wx, treeY + h, wz, BLOCKS.WOOD));
                        }
                        for (let ly = 5; ly < 9; ly++) {
                            for (let lx = -2; lx <= 2; lx++) {
                                for (let lz = -2; lz <= 2; lz++) {
                                    if (Math.abs(lx) + Math.abs(lz) <= 3) {
                                        group.add(createBlock(wx + lx, treeY + ly, wz + lz, BLOCKS.LEAVES));
                                    }
                                }
                            }
                        }
                    }
                }
            }

            scene.add(group);
            worldChunks.set(key, group);
        }

        function loadChunks() {
            const px = Math.floor(camera.position.x / CHUNK_SIZE);
            const pz = Math.floor(camera.position.z / CHUNK_SIZE);

            for (let dx = -RENDER_DISTANCE; dx <= RENDER_DISTANCE; dx++) {
                for (let dz = -RENDER_DISTANCE; dz <= RENDER_DISTANCE; dz++) {
                    generateChunk(px + dx, pz + dz);
                }
            }
        }

        function startGame() {
            seed = Math.floor(1000000 + Math.random() * 9000000);
            console.log("%c🌍 Dünya Seed: " + seed, "color:lime;font-size:16px;font-weight:bold");

            document.getElementById('menu').style.display = 'none';
            document.getElementById('hud').style.display = 'block';
            document.getElementById('crosshair').style.display = 'block';
            document.getElementById('instructions').style.display = 'block';

            worldChunks.clear();
            camera.position.copy(spawnPoint);
            velocity.set(0,0,0);
            loadChunks();
        }

        // ==================== KONTROLLER ====================
        function initControls() {
            document.getElementById('createBtn').addEventListener('click', startGame);

            document.addEventListener('keydown', e => {
                switch(e.code) {
                    case 'KeyW': move.forward = true; break;
                    case 'KeyS': move.backward = true; break;
                    case 'KeyA': move.left = true; break;
                    case 'KeyD': move.right = true; break;
                    case 'ShiftLeft': case 'ShiftRight': move.sprint = true; break;
                    case 'Space': if(canJump) { velocity.y = 10; canJump = false; } break;
                    case 'KeyR': camera.position.copy(spawnPoint); velocity.set(0,0,0); break;
                }
            });

            document.addEventListener('keyup', e => {
                switch(e.code) {
                    case 'KeyW': move.forward = false; break;
                    case 'KeyS': move.backward = false; break;
                    case 'KeyA': move.left = false; break;
                    case 'KeyD': move.right = false; break;
                    case 'ShiftLeft': case 'ShiftRight': move.sprint = false; break;
                }
            });

            const raycaster = new THREE.Raycaster();

            renderer.domElement.addEventListener('mousedown', (e) => {
                if (document.pointerLockElement !== renderer.domElement) {
                    renderer.domElement.requestPointerLock();
                    return;
                }

                raycaster.setFromCamera(new THREE.Vector2(0, 0), camera);
                const intersects = raycaster.intersectObjects(scene.children, true);

                if (intersects.length > 0) {
                    const obj = intersects[0].object;
                    if (e.button === 0 && obj.userData.type) { // Sol tık - Kır
                        scene.remove(obj);
                    } else if (e.button === 2) { // Sağ tık - Koy
                        const normal = intersects[0].face.normal;
                        const pos = intersects[0].point.clone().add(normal.multiplyScalar(0.6));
                        const newBlock = createBlock(
                            Math.floor(pos.x),
                            Math.floor(pos.y),
                            Math.floor(pos.z),
                            BLOCKS.DIRT
                        );
                        scene.add(newBlock);
                    }
                }
            });

            document.addEventListener('mousemove', (e) => {
                if (document.pointerLockElement === renderer.domElement) {
                    camera.rotation.y -= e.movementX * 0.002;
                    camera.rotation.x -= e.movementY * 0.002;
                    camera.rotation.x = Math.max(-1.5, Math.min(1.5, camera.rotation.x));
                }
            });

            document.addEventListener('contextmenu', e => e.preventDefault());
        }

        let prevTime = performance.now();

        function animate() {
            requestAnimationFrame(animate);
            const delta = (performance.now() - prevTime) / 1000;
            prevTime = performance.now();

            // Hareket
            const speed = move.sprint ? 18 : 10;
            velocity.x = 0;
            velocity.z = 0;

            if (move.forward) velocity.z -= speed;
            if (move.backward) velocity.z += speed;
            if (move.left) velocity.x -= speed;
            if (move.right) velocity.x += speed;

            camera.translateX(velocity.x * delta);
            camera.translateZ(velocity.z * delta);

            // Yerçekimi
            velocity.y -= 28 * delta;
            camera.position.y += velocity.y * delta;

            // Zemin kontrolü
            if (camera.position.y < 12) {
                camera.position.y = 12;
                velocity.y = 0;
                canJump = true;
            }

            loadChunks();
            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // Başlat
        initThree();
        initControls();
        animate();
    </script>
</body>
</html>
