<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>HORROR MINI - BİLGİSAYAR EDİTİON Alpha 0.03</title>
    <style>
        body { margin: 0; overflow: hidden; background: #87CEEB; font-family: 'Courier New', monospace; }
        #ui-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            background: rgba(0,0,0,0.85); z-index: 10;
        }
        #logo { 
            color: #ff0000; font-size: 50px; font-weight: bold; 
            text-shadow: 3px 3px #000; animation: glitch 0.2s infinite; 
            text-align: center; line-height: 1.2;
        }
        #version-tag { font-size: 18px; color: #aaa; margin-top: 10px; }
        .menu-btn { 
            background: #eee; border: none; padding: 15px 40px; 
            font-size: 20px; cursor: pointer; margin: 10px; 
            font-weight: bold; width: 450px; transition: 0.2s;
        }
        .menu-btn:hover { background: #ff0000; color: white; }
        #crosshair {
            position: absolute; top: 50%; left: 50%; width: 12px; height: 12px;
            border: 2px solid white; border-radius: 50%; transform: translate(-50%, -50%);
            pointer-events: none; mix-blend-mode: difference; display: none;
        }
        @keyframes glitch { 0% { transform: skew(0); } 50% { transform: skew(2deg); color: #aa0000; } 100% { transform: skew(-1deg); } }
    </style>
</head>
<body>

    <div id="ui-overlay">
        <div id="logo">
            HORROR MINI<br>
            <span style="font-size: 24px; color: #fff;">BİLGİSAYAR EDİTİON</span><br>
            <span id="version-tag">Version Alpha 0.03</span>
        </div>
        <div id="menu-content" style="margin-top: 30px;">
            <button class="menu-btn" onclick="handleSinglePlayer()">TEK OYUNCULU</button>
        </div>
    </div>

    <div id="crosshair"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script>
        let scene, camera, renderer, stalker;
        let isGameStarted = false;
        let moveForward = false, moveBackward = false, moveLeft = false, moveRight = false;
        let velocity = new THREE.Vector3();
        let chunks = {}; 
        const CHUNK_SIZE = 8;
        const RENDER_DISTANCE = 4;

        const mats = {
            grass: new THREE.MeshStandardMaterial({ color: 0x567d46 }),
            dirt: new THREE.MeshStandardMaterial({ color: 0x8b4513 }),
            stone: new THREE.MeshStandardMaterial({ color: 0x777777 }),
            sand: new THREE.MeshStandardMaterial({ color: 0xedc9af }),
            coal: new THREE.MeshStandardMaterial({ color: 0x1a1a1a }),
            pyramid: new THREE.MeshStandardMaterial({ color: 0xd4af37 }),
            trunk: new THREE.MeshStandardMaterial({ color: 0x4d2926 }),
            leaves: new THREE.MeshStandardMaterial({ color: 0x228B22 }),
            water: new THREE.MeshStandardMaterial({ color: 0x00aaff, transparent: true, opacity: 0.6 }),
            stalker: new THREE.MeshBasicMaterial({ color: 0xffffff })
        };

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x87CEEB);
            scene.fog = new THREE.Fog(0x87CEEB, 20, 80);

            camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
            renderer = new THREE.WebGLRenderer({ antialias: false });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            const sun = new THREE.DirectionalLight(0xffffff, 1.2);
            sun.position.set(20, 40, 20);
            scene.add(sun, new THREE.AmbientLight(0xffffff, 0.5));

            spawnStalker();
            camera.position.set(0, 15, 0);

            document.addEventListener('mousedown', (e) => { if(isGameStarted && e.button === 0) breakBlock(); });
            document.addEventListener('keydown', (e) => {
                if(e.code === 'KeyK') placeBlock();
                handleKey(e.code, true);
            });
            document.addEventListener('keyup', (e) => handleKey(e.code, false));
            window.addEventListener('resize', onWindowResize);
        }

        function updateChunks() {
            const pX = Math.floor(camera.position.x / CHUNK_SIZE);
            const pZ = Math.floor(camera.position.z / CHUNK_SIZE);
            for (let x = pX - RENDER_DISTANCE; x <= pX + RENDER_DISTANCE; x++) {
                for (let z = pZ - RENDER_DISTANCE; z <= pZ + RENDER_DISTANCE; z++) {
                    const id = `${x},${z}`;
                    if (!chunks[id]) createChunk(x, z);
                }
            }
        }

        function createChunk(cx, cz) {
            const chunkBlocks = [];
            const geo = new THREE.BoxGeometry(1, 1, 1);
            for (let x = 0; x < CHUNK_SIZE; x++) {
                for (let z = 0; z < CHUNK_SIZE; z++) {
                    const wX = cx * CHUNK_SIZE + x;
                    const wZ = cz * CHUNK_SIZE + z;
                    let h = Math.floor(Math.sin(wX * 0.1) * Math.cos(wZ * 0.1) * 3 + 5);
                    for (let y = 0; y <= h; y++) {
                        let mat = (y === h) ? (h < 2 ? mats.sand : mats.grass) : (y > h - 3 ? mats.dirt : mats.stone);
                        if (y < h - 3 && Math.random() < 0.05) mat = mats.coal;
                        const b = new THREE.Mesh(geo, mat);
                        b.position.set(wX, y, wZ);
                        scene.add(b);
                        chunkBlocks.push(b);
                    }
                    if (h < 2) {
                        const water = new THREE.Mesh(geo, mats.water);
                        water.position.set(wX, 1.5, wZ);
                        scene.add(water);
                        if(Math.random() < 0.003) spawnPyramid(wX, 2, wZ, chunkBlocks);
                    }
                    if (h >= 5 && Math.random() < 0.015) spawnTree(wX, h, wZ, chunkBlocks);
                }
            }
            chunks[`${cx},${cz}`] = chunkBlocks;
        }

        function spawnTree(x, y, z, chunkBlocks) {
            const geo = new THREE.BoxGeometry(1, 1, 1);
            let treeHeight = 4 + Math.floor(Math.random()*3);
            for(let i=1; i<=treeHeight; i++) {
                const trunk = new THREE.Mesh(geo, mats.trunk);
                trunk.position.set(x, y+i, z);
                scene.add(trunk);
                chunkBlocks.push(trunk);
            }
            let r = 2;
            for(let ly = treeHeight - 1; ly <= treeHeight + 1; ly++) {
                for(let lx = -r; lx <= r; lx++) {
                    for(let lz = -r; lz <= r; lz++) {
                        const leaves = new THREE.Mesh(geo, mats.leaves);
                        leaves.position.set(x+lx, y+ly+1, z+lz);
                        scene.add(leaves);
                        chunkBlocks.push(leaves);
                    }
                }
            }
        }

        function spawnPyramid(x, y, z, chunkBlocks) {
            const geo = new THREE.BoxGeometry(1, 1, 1);
            for(let i=0; i<3; i++) {
                for(let px=-i; px<=i; px++) {
                    for(let pz=-i; pz<=i; pz++) {
                        const p = new THREE.Mesh(geo, mats.pyramid);
                        p.position.set(x+px, y+(2-i), z+pz);
                        scene.add(p);
                        chunkBlocks.push(p);
                    }
                }
            }
        }

        function breakBlock() {
            const ray = new THREE.Raycaster();
            ray.setFromCamera(new THREE.Vector2(0, 0), camera);
            const hits = ray.intersectObjects(scene.children);
            if (hits.length > 0 && hits[0].distance < 5 && hits[0].object !== stalker) scene.remove(hits[0].object);
        }

        function placeBlock() {
            const ray = new THREE.Raycaster();
            ray.setFromCamera(new THREE.Vector2(0, 0), camera);
            const hits = ray.intersectObjects(scene.children);
            if (hits.length > 0 && hits[0].distance < 5) {
                const pos = hits[0].object.position.clone().add(hits[0].face.normal);
                const b = new THREE.Mesh(new THREE.BoxGeometry(1, 1, 1), mats.stone);
                b.position.copy(pos);
                scene.add(b);
            }
        }

        function handleSinglePlayer() {
            const hasSave = localStorage.getItem('HorrorMini_Alpha0.03');
            if (hasSave) {
                document.getElementById('menu-content').innerHTML = `
                    <p style="color:white; text-align:center;">Daha önce oynadığınız (Alpha 0.03 SAVE) dünyanıza dönülsün mü?</p>
                    <button class="menu-btn" onclick="startGame()">EVET</button>
                    <button class="menu-btn" onclick="location.reload()">HAYIR</button>`;
            } else { startGame(); }
        }

        function startGame() {
            localStorage.setItem('HorrorMini_Alpha0.03', 'true');
            document.getElementById('ui-overlay').style.display = 'none';
            document.getElementById('crosshair').style.display = 'block';
            document.body.requestPointerLock();
            isGameStarted = true;
        }

        function spawnStalker() {
            stalker = new THREE.Mesh(new THREE.BoxGeometry(0.6, 2, 0.6), mats.stalker);
            stalker.position.set(25, 10, 25);
            scene.add(stalker);
        }

        function handleKey(code, isPressed) {
            if(code === 'KeyW') moveForward = isPressed;
            if(code === 'KeyS') moveBackward = isPressed;
            if(code === 'KeyA') moveLeft = isPressed;
            if(code === 'KeyD') moveRight = isPressed;
            if(code === 'Escape' && isPressed) location.reload();
        }

        function update() {
            if(!isGameStarted) return;
            const speed = 0.15;
            if (moveForward) camera.translateZ(-speed);
            if (moveBackward) camera.translateZ(speed);
            if (moveLeft) camera.translateX(-speed);
            if (moveRight) camera.translateX(speed);
            updateChunks();
            stalker.lookAt(camera.position);
            const ray = new THREE.Raycaster(camera.position, new THREE.Vector3(0, -1, 0));
            const hit = ray.intersectObjects(scene.children);
            if (hit.length > 0 && hit[0].distance < 1.7) {
                velocity.y = 0;
                camera.position.y = hit[0].point.y + 1.7;
            } else { velocity.y -= 0.01; }
            camera.position.y += velocity.y;
        }

        function animate() {
            requestAnimationFrame(animate);
            update();
            renderer.render(scene, camera);
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        document.body.addEventListener('mousemove', (e) => {
            if(document.pointerLockElement === document.body) {
                camera.rotation.y -= e.movementX * 0.002;
                camera.rotation.x -= e.movementY * 0.002;
                camera.rotation.x = Math.max(-Math.PI/2, Math.min(Math.PI/2, camera.rotation.x));
            }
        });

        init();
        animate();
    </script>
</body>
</html>
