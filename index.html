<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Farmant Voxel - Alpha 0.03 Ultimate</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Courier New', monospace; color: white; user-select: none; }
        canvas { display: block; }

        /* --- SURVIVAL UI (KALP & AÇLIK) --- */
        #stat-bars { position: fixed; bottom: 85px; left: 50%; transform: translateX(-50%); display: flex; flex-direction: column; align-items: center; gap: 4px; pointer-events: none; }
        .bar { display: flex; gap: 2px; font-size: 22px; text-shadow: 2px 2px #000; }
        #health-bar { color: #ff0000; }
        #hunger-bar { color: #8b4513; }

        /* --- 10 SLOTLU ŞEFFAF ENVANTER --- */
        #hotbar { position: fixed; bottom: 15px; left: 50%; transform: translateX(-50%); display: flex; gap: 5px; background: rgba(0,0,0,0.5); padding: 8px; border: 1px solid rgba(255,255,255,0.2); border-radius: 4px; }
        .slot { width: 45px; height: 50px; border: 1px solid rgba(255,255,255,0.3); background: rgba(0,0,0,0.4); display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 8px; position: relative; color: #ccc; }
        .slot.selected { border: 2px solid #0f0; background: rgba(0,255,0,0.1); }
        .count { position: absolute; bottom: 1px; right: 3px; color: #ff0; font-weight: bold; font-size: 10px; }

        /* --- MENÜ VE SÜRÜMLER --- */
        #menu { position: fixed; inset: 0; background: radial-gradient(circle, #1a0533 0%, #000 100%); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 1000; }
        .btn { background: #bc13fe; color: white; border: none; padding: 15px 40px; font-size: 1.5rem; cursor: pointer; border-radius: 5px; margin: 10px; transition: 0.3s; }
        .btn:hover { transform: scale(1.1); box-shadow: 0 0 20px #bc13fe; }
        
        #version-btn { position: fixed; top: 15px; right: 15px; background: white; color: black; border: none; padding: 8px 15px; cursor: pointer; font-weight: bold; border-radius: 4px; z-index: 1100; }
    </style>
</head>
<body>

    <div id="menu">
        <h1 style="color:#bc13fe; font-size: 3.5rem; text-shadow: 0 0 30px #bc13fe;">FARMANT</h1>
        <button class="btn" onclick="startGame()">TEK OYUNCULU</button>
        <button class="btn" style="opacity:0.4;">ÇOK OYUNCULU</button>
        <p style="color:#444; margin-top: 20px;">Alpha 0.03 - Ataların Atası</p>
    </div>

    <button id="version-btn" onclick="alert('Alpha 0.03 En Son Sürümdür!')">SÜRÜMLER ⚙️</button>

    <div id="stat-bars">
        <div id="health-bar" class="bar">❤❤❤❤❤❤❤❤❤❤</div>
        <div id="hunger-bar" class="bar">🍖🍖🍖🍖🍖🍖🍖🍖🍖🍖</div>
    </div>

    <div id="hotbar">
        <div class="slot selected">Toprak<div class="count" id="c-toprak">0</div></div>
        <div class="slot">Odun<div class="count" id="c-odun">0</div></div>
        <div class="slot">Tahta<div class="count" id="c-tahta">0</div></div>
        <div class="slot">Maden<div class="count" id="c-maden">0</div></div>
        <div class="slot">Et<div class="count" id="c-et">0</div></div>
        <div class="slot">Elmas<div class="count" id="c-elmas">0</div></div>
        <div class="slot">Tabela<div class="count" id="c-tabela">0</div></div>
        <div class="slot">Çubuk<div class="count" id="c-cubuk">0</div></div>
        <div class="slot">Kömür<div class="count" id="c-komur">0</div></div>
        <div class="slot">Gizem<div class="count" id="c-gizem">0</div></div>
    </div>

    <script type="module">
        import * as THREE from 'https://unpkg.com/three@0.160.0/build/three.module.js';

        let scene, camera, renderer, entity, timer = 0;
        let health = 10, hunger = 10;
        const blocks = [], animals = [], keys = {};
        const inventory = { toprak:0, odun:0, tahta:0, maden:0, et:0, elmas:0, tabela:0, cubuk:0, komur:0, gizem:0 };

        window.startGame = () => {
            document.getElementById('menu').style.display = 'none';
            document.body.requestPointerLock();
            init();
        };

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x87ceeb);
            scene.fog = new THREE.FogExp2(0x87ceeb, 0.03);
            
            camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            const light = new THREE.AmbientLight(0xffffff, 0.8);
            scene.add(light);

            generateWorld();
            spawnAnimals();
            
            // Açlık Döngüsü (Her 10 dakikada bir)
            setInterval(() => {
                if(hunger > 0) hunger--;
                else if(health > 0) health--;
                updateBars();
            }, 600000);

            animate();
        }

        function generateWorld() {
            const mats = {
                grass: new THREE.MeshLambertMaterial({color: 0x2ecc71}),
                stone: new THREE.MeshLambertMaterial({color: 0x777777}),
                wood: new THREE.MeshLambertMaterial({color: 0x5d4037})
            };

            for(let x=-20; x<20; x++) {
                for(let z=-20; z<20; z++) {
                    let h = Math.floor(Math.sin(x*0.15)*Math.cos(z*0.15)*5);
                    addBlock(x, h, z, mats.grass, "toprak");
                    
                    // Madenler
                    if(h < -2) addBlock(x, h-1, z, mats.stone, "maden");
                    
                    // Ağaçlar
                    if(h >= 0 && Math.random() < 0.02) {
                        for(let i=1; i<4; i++) addBlock(x, h+i, z, mats.wood, "odun");
                    }
                }
            }
        }

        function spawnAnimals() {
            const colors = [0xffffff, 0x4b2c20, 0xffff00]; // Koyun, İnek, Tavuk
            for(let i=0; i<10; i++) {
                const a = new THREE.Mesh(new THREE.BoxGeometry(0.7,0.7,0.7), new THREE.MeshLambertMaterial({color: colors[i%3]}));
                a.position.set(Math.random()*30-15, 2, Math.random()*30-15);
                a.userData = { type: 'animal' };
                scene.add(a);
                animals.push(a);
            }
        }

        function addBlock(x, y, z, mat, type) {
            const b = new THREE.Mesh(new THREE.BoxGeometry(1, 1, 1), mat);
            b.position.set(x, y, z);
            b.userData = { type };
            scene.add(b);
            blocks.push(b);
        }

        window.onmousedown = (e) => {
            if(e.button === 0 && document.pointerLockElement) {
                const ray = new THREE.Raycaster();
                ray.setFromCamera(new THREE.Vector2(0,0), camera);
                const inter = ray.intersectObjects([...blocks, ...animals]);
                if(inter.length > 0 && inter[0].distance < 4) {
                    const obj = inter[0].object;
                    if(obj.userData.type === 'animal') {
                        inventory.et++;
                        scene.remove(obj);
                        animals.splice(animals.indexOf(obj), 1);
                    } else {
                        const t = obj.userData.type;
                        if(inventory[t] !== undefined) inventory[t]++;
                        scene.remove(obj);
                        blocks.splice(blocks.indexOf(obj), 1);
                    }
                    updateUI();
                }
            }
        };

        function updateUI() {
            for(let key in inventory) {
                const el = document.getElementById('c-' + key);
                if(el) el.innerText = inventory[key];
            }
        }

        function updateBars() {
            document.getElementById('health-bar').innerText = '❤'.repeat(health);
            document.getElementById('hunger-bar').innerText = '🍖'.repeat(hunger);
        }

        function animate() {
            requestAnimationFrame(animate);
            timer++;

            // ENTITY (20 Saniye sonra)
            if(timer === 1200) {
                entity = new THREE.Mesh(new THREE.BoxGeometry(0.8, 1.8, 0.2), new THREE.MeshBasicMaterial({color: 0xffffff}));
                entity.position.set(camera.position.x + 10, 2, camera.position.z - 10);
                scene.add(entity);
            }
            if(entity) entity.lookAt(camera.position);

            const s = 0.15;
            if(keys['KeyW']) camera.translateZ(-s);
            if(keys['KeyS']) camera.translateZ(s);
            if(keys['KeyA']) camera.translateX(-s);
            if(keys['KeyD']) camera.translateX(s);
            camera.position.y = 2;

            animals.forEach(a => {
                a.position.x += (Math.random()-0.5)*0.03;
                a.position.z += (Math.random()-0.5)*0.03;
            });

            renderer.render(scene, camera);
        }

        window.onkeydown = (e) => keys[e.code] = true;
        window.onkeyup = (e) => keys[e.code] = false;
        document.addEventListener('mousemove', (e) => {
            if(document.pointerLockElement) {
                camera.rotation.y -= e.movementX * 0.002;
                camera.rotation.x -= e.movementY * 0.002;
            }
        });
    </script>
</body>
</html>
