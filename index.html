<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Farmant Voxel - Alpha 0.02.4 (Ultimate Edition)</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Courier New', monospace; color: white; user-select: none; }
        canvas { display: block; }

        /* --- MENÜ SİSTEMLERİ --- */
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 1000; }
        #title { color: #f00; font-size: clamp(40px, 10vw, 80px); text-shadow: 0 0 25px #700; margin-bottom: 30px; letter-spacing: 5px; }
        .menu-btn { width: 280px; padding: 15px; margin: 10px; background: #111; border: 2px solid #333; color: #fff; cursor: pointer; text-transform: uppercase; font-family: inherit; }
        .menu-btn:hover { border-color: #f00; background: #1a0000; box-shadow: 0 0 15px #f00; }
        
        /* Sürüm Seçici */
        #version-tag { position: absolute; top: 15px; right: 20px; color: #ff0; cursor: pointer; font-weight: bold; z-index: 1100; border: 1px solid #444; padding: 5px; background: rgba(0,0,0,0.5); }

        /* --- OYUN İÇİ HUD --- */
        #hud { position: absolute; top: 15px; left: 15px; z-index: 100; background: rgba(0,0,0,0.85); padding: 12px; border-left: 4px solid #f00; display: none; pointer-events: none; }
        .stat { color: #0f0; font-weight: bold; font-size: 13px; }
        #health-bar { position: absolute; bottom: 100px; left: 50%; transform: translateX(-50%); display: none; gap: 4px; z-index: 100; }
        .heart { color: #f00; font-size: 22px; text-shadow: 2px 2px #000; }

        /* Gelişmiş Hotbar */
        #hotbar { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); display: none; gap: 5px; background: rgba(0,0,0,0.8); padding: 8px; border: 2px solid #333; z-index: 100; }
        .slot { width: 50px; height: 55px; border: 2px solid #555; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 8px; position: relative; text-align: center;}
        .slot.selected { border-color: #0f0; background: rgba(0,255,0,0.1); box-shadow: 0 0 10px #0f0; }
        .count { position: absolute; bottom: 2px; right: 4px; color: #ff0; font-weight: bold; font-size: 11px; }
        
        #crosshair { position: absolute; top: 50%; left: 50%; width: 16px; height: 16px; transform: translate(-50%, -50%); border: 1px solid #fff; border-radius: 50%; opacity: 0.5; display: none; }
    </style>
</head>
<body>

    <div id="version-tag" onclick="location.reload()">SÜRÜM: ALPHA 0.02 (GÜNCEL)</div>

    <div id="main-menu" class="overlay">
        <h1 id="title">HORROR MINI</h1>
        <button class="menu-btn" onclick="showAncestor()">TEK OYUNCULU</button>
        <button class="menu-btn" style="opacity:0.3; cursor:not-allowed;">SÜRÜMLER (ALPHA 0.01)</button>
        <p style="color:#444; margin-top:20px;">FARMANT STUDIOS - ATALARIN ATASI</p>
    </div>

    <div id="ancestor-panel" class="overlay" style="display:none;">
        <h2 style="color:#aaa; letter-spacing:10px;">ATALARIN ATASI</h2>
        <button class="menu-btn" onclick="startGame()">DÜNYAYI OLUŞTUR</button>
    </div>

    <div id="hud">
        <span class="stat">XYZ:</span> <span id="val-pos">0, 0, 0</span><br>
        <span class="stat">SEVİYE:</span> <span id="val-lvl">0</span><br>
        <span class="stat">FPS:</span> 20/20
    </div>

    <div id="health-bar">
        <span class="heart">❤</span><span class="heart">❤</span><span class="heart">❤</span><span class="heart">❤</span><span class="heart">❤</span>
        <span class="heart">❤</span><span class="heart">❤</span><span class="heart">❤</span><span class="heart">❤</span><span class="heart">❤</span>
    </div>

    <div id="hotbar">
        <div id="slot-0" class="slot selected">Toprak<div class="count" id="cnt-0">0</div></div>
        <div id="slot-1" class="slot">Odun<div class="count" id="cnt-1">0</div></div>
        <div id="slot-2" class="slot">Taş<div class="count" id="cnt-2">0</div></div>
        <div id="slot-3" class="slot">Demir<div class="count" id="cnt-3">0</div></div>
        <div id="slot-4" class="slot">Altın<div class="count" id="cnt-4">0</div></div>
        <div id="slot-5" class="slot">Elmas<div class="count" id="cnt-5">0</div></div>
    </div>

    <div id="crosshair"></div>

    <script type="module">
        import * as THREE from 'https://unpkg.com/three@0.160.0/build/three.module.js';

        // --- 1. AYARLAR VE DEĞİŞKENLER ---
        const TARGET_FPS = 20;
        let lastTime = 0;
        const scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0x000000, 0.07); // Derin mağara sisi
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 80);
        const renderer = new THREE.WebGLRenderer({ antialias: false });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        const inventory = { toprak:0, odun:0, tas:0, demir:0, altin:0, elmas:0 };
        const invKeys = ["toprak", "odun", "tas", "demir", "altin", "elmas"];
        const blocks = [];
        const animals = [];
        const keys = {};
        let verticalVelocity = 0;
        const gravity = 0.015;

        // --- 2. MATERYALLER ---
        const mats = {
            grass: new THREE.MeshBasicMaterial({ color: 0x1a3300 }),
            dirt: new THREE.MeshBasicMaterial({ color: 0x3d2b1f }),
            stone: new THREE.MeshBasicMaterial({ color: 0x444444 }),
            iron: new THREE.MeshBasicMaterial({ color: 0xcccccc }), // Gümüşümsü
            gold: new THREE.MeshBasicMaterial({ color: 0xffd700 }), // Altın sarısı
            diamond: new THREE.MeshBasicMaterial({ color: 0x00ffff }), // Parlak mavi
            wood: new THREE.MeshBasicMaterial({ color: 0x2e1d11 }),
            water: new THREE.MeshBasicMaterial({ color: 0x001133, transparent: true, opacity: 0.6 }),
            animal: new THREE.MeshBasicMaterial({ color: 0xffffff })
        };

        // --- 3. DÜNYA ÜRETİMİ (DAĞ + MAĞARA + MADEN) ---
        function simple3DNoise(x, y, z) {
            return Math.sin(x * 0.1) * Math.cos(y * 0.1) * Math.sin(z * 0.1) + Math.cos(x * 0.2) * Math.sin(y * 0.2);
        }

        function generateWorld() {
            const size = 18; 
            for (let x = -size; x < size; x++) {
                for (let z = -size; z < size; z++) {
                    let h = Math.floor(Math.sin(x * 0.15) * Math.cos(z * 0.15) * 5) + 2;
                    
                    // Yüzey ve Dağlar
                    addBlock(x, h, z, mats.grass, 'toprak');

                    // Derinlikler ve Mağara Boşlukları
                    for (let y = h - 1; y > -80; y--) {
                        const noise = simple3DNoise(x, y, z);
                        if (noise > -0.6 || y > h - 4) { // Mağara eşiği
                            let mat = mats.dirt;
                            let type = 'toprak';

                            if (y < h - 3) {
                                mat = mats.stone;
                                type = 'tas';
                                // Maden Damarı Olasılıkları
                                let r = Math.random();
                                if (y < -10 && r < 0.05) { mat = mats.iron; type = 'demir'; }
                                if (y < -30 && r < 0.03) { mat = mats.gold; type = 'altin'; }
                                if (y < -50 && r < 0.015) { mat = mats.diamond; type = 'elmas'; }
                            }
                            addBlock(x, y, z, mat, type);
                        }
                    }
                    // Rastgele Ağaçlar
                    if(Math.random() < 0.03) {
                        for(let t=1; t<4; t++) addBlock(x, h+t, z, mats.wood, 'odun');
                    }
                }
            }
            // Sınırsız Deniz Katmanı (Görsel)
            const sea = new THREE.Mesh(new THREE.BoxGeometry(200, 15, 200), mats.water);
            sea.position.y = -7;
            scene.add(sea);

            spawnAnimal(5, 5);
            spawnAnimal(-10, -8);
        }

        function addBlock(x, y, z, mat, type) {
            const b = new THREE.Mesh(new THREE.BoxGeometry(1, 1, 1), mat);
            b.position.set(x, y, z);
            b.userData = { type: type };
            scene.add(b);
            blocks.push(b);
        }

        function spawnAnimal(x, z) {
            const a = new THREE.Mesh(new THREE.BoxGeometry(0.6, 0.5, 0.8), mats.animal);
            a.position.set(x, 2, z);
            scene.add(a);
            animals.push(a);
        }

        // --- 4. ETKİLEŞİM VE AI ---
        window.onmousedown = (e) => {
            if(e.button === 0 && document.pointerLockElement) {
                const ray = new THREE.Raycaster();
                ray.setFromCamera(new THREE.Vector2(0,0), camera);
                const inter = ray.intersectObjects(blocks);
                if(inter.length > 0 && inter[0].distance < 4.5) {
                    const obj = inter[0].object;
                    const type = obj.userData.type;
                    if(inventory[type] !== undefined) inventory[type]++;
                    updateUI();
                    scene.remove(obj);
                    blocks.splice(blocks.indexOf(obj), 1);
                }
            }
        };

        function updateUI() {
            invKeys.forEach((k, i) => document.getElementById('cnt-'+i).innerText = inventory[k]);
        }

        // --- 5. ANA DÖNGÜ (20 FPS) ---
        function animate(now) {
            requestAnimationFrame(animate);
            if (now - lastTime >= 1000/TARGET_FPS) {
                lastTime = now;
                if(!document.pointerLockElement) return;

                const inWater = camera.position.y < 0.5;
                let speed = inWater ? 0.06 : 0.13;

                if(keys['KeyW']) camera.translateZ(-speed);
                if(keys['KeyS']) camera.translateZ(speed);
                if(keys['KeyA']) camera.translateX(-speed);
                if(keys['KeyD']) camera.translateX(speed);

                // Deniz & O Tuşu
                if(inWater) {
                    if(keys['KeyO']) camera.position.y -= 0.06;
                    if(keys['Space']) camera.position.y += 0.06;
                    verticalVelocity = 0;
                } else {
                    if(keys['Space'] && camera.position.y <= 1.81) verticalVelocity = 0.25;
                    camera.position.y += verticalVelocity;
                    if(camera.position.y > 1.8) verticalVelocity -= gravity;
                    else { camera.position.y = 1.8; verticalVelocity = 0; }
                }

                // AI Kaçış
                animals.forEach(a => {
                    if(a.position.distanceTo(camera.position) < 5) {
                        const dir = new THREE.Vector3().subVectors(a.position, camera.position).normalize();
                        a.position.addScaledVector(dir, 0.15);
                    }
                });

                // Occlusion Culling
                const frustum = new THREE.Frustum();
                frustum.setFromProjectionMatrix(new THREE.Matrix4().multiplyMatrices(camera.projectionMatrix, camera.matrixWorldInverse));
                blocks.forEach(b => b.visible = frustum.containsPoint(b.position));

                // HUD
                document.getElementById('val-pos').innerText = `${Math.round(camera.position.x)}, ${Math.round(camera.position.y)}, ${Math.round(camera.position.z)}`;
                document.getElementById('val-lvl').innerText = Math.floor(camera.position.y);
                renderer.render(scene, camera);
            }
        }

        // --- 6. BAŞLATMA ---
        window.showAncestor = () => { document.getElementById('main-menu').style.display='none'; document.getElementById('ancestor-panel').style.display='flex'; };
        window.startGame = () => {
            document.getElementById('ancestor-panel').style.display = 'none';
            document.getElementById('hud').style.display = 'block';
            document.getElementById('health-bar').style.display = 'flex';
            document.getElementById('hotbar').style.display = 'flex';
            document.getElementById('crosshair').style.display = 'block';
            document.body.requestPointerLock();
            generateWorld();
            camera.position.set(0, 10, 15);
            animate(0);
        };
        window.onkeydown = (e) => keys[e.code] = true;
        window.onkeyup = (e) => keys[e.code] = false;
        document.addEventListener('mousemove', (e) => {
            if(document.pointerLockElement) {
                camera.rotation.y -= e.movementX * 0.003;
                camera.rotation.x -= e.movementY * 0.003;
                camera.rotation.x = Math.max(-1.5, Math.min(1.5, camera.rotation.x));
            }
        });
    </script>
</body>
</html>
