<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HORROR MINI ALPHA 0.05</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/simplex-noise@2.4.0/simplex-noise.min.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Courier New', monospace; user-select: none; }
        #menu {
            position: fixed; inset: 0; background: radial-gradient(circle, #220000 0%, #000 100%);
            display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100;
        }
        #title { color: #ff0000; font-size: clamp(48px, 10vw, 80px); font-weight: 900; text-shadow: 4px 4px #000; margin: 0; }
        #version { color: #fff; font-size: 18px; margin-bottom: 30px; letter-spacing: 5px; }
        #btn-create {
            padding: 15px 40px; font-size: 20px; color: white; background: transparent;
            border: 3px solid white; cursor: pointer; border-radius: 4px; transition: 0.3s;
        }
        #btn-create:hover { background: white; color: black; }
        #ui-overlay {
            position: fixed; top: 10px; left: 10px; color: white; font-size: 12px; display: none; z-index: 50;
        }
        #gpu-monitor {
            position: fixed; bottom: 10px; right: 10px; background: rgba(0,0,0,0.8);
            border: 1px solid #00ff00; padding: 10px; color: #00ff00; font-size: 10px; display: none;
        }
    </style>
</head>
<body>

    <div id="menu">
        <h1 id="title">HORROR MINI</h1>
        <div id="version">ALPHA 0.05</div>
        <button id="btn-create">DÜNYA OLUŞTUR</button>
    </div>

    <div id="ui-overlay">
        <span>THE GAME'S DEVELOPER IS STRLXY-B9Q. DO NOT CHANGE IT.</span>
        <span style="margin-left: 15px; color: #ff8800;">ALPHA 0.05</span>
    </div>

    <div id="gpu-monitor">
        <div>CORE LOAD: <span id="gpu-load">0%</span></div>
        <div>AUXILIARY GPU: <span id="aux-status" style="color:#00ffff">IDLE</span></div>
    </div>

    <script>
        let scene, camera, renderer, simplex, worldSeed;
        let clock = new THREE.Clock();
        const CHUNK_SIZE = 13;
        const VIEW_DISTANCE = 3;
        const worldBlocks = new Map(); // Blok verisi deposu
        const chunkMeshes = new Map();
        
        const player = {
            pos: new THREE.Vector3(0, 40, 0),
            vel: new THREE.Vector3(0, 0, 0),
            size: { w: 0.6, h: 1.8, d: 0.6 },
            speed: 0.1,
            jumpForce: 0.15,
            onGround: false
        };

        const keys = {};

        document.getElementById('btn-create').addEventListener('click', () => {
            document.getElementById('menu').style.display = 'none';
            document.getElementById('ui-overlay').style.display = 'block';
            document.getElementById('gpu-monitor').style.display = 'block';
            initGame();
        });

        function initGame() {
            worldSeed = Math.floor(Math.random() * 9000000) + 1000000;
            simplex = new SimplexNoise(worldSeed.toString());

            scene = new THREE.Scene();
            const skyColor = 0x556677;
            scene.background = new THREE.Color(skyColor);
            scene.fog = new THREE.Fog(skyColor, 10, CHUNK_SIZE * VIEW_DISTANCE);

            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 500);
            
            renderer = new THREE.WebGLRenderer({ antialias: false });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(1);
            document.body.appendChild(renderer.domElement);

            const light = new THREE.DirectionalLight(0xffffff, 0.8);
            light.position.set(5, 50, 5); // Güneş tepede
            scene.add(light);
            scene.add(new THREE.AmbientLight(0xffffff, 0.4));

            initMaterials();
            
            // İlk spawn noktasını belirle
            const startY = getTerrainHeight(0, 0);
            player.pos.set(0, startY + 2, 0);

            window.addEventListener('keydown', e => keys[e.code] = true);
            window.addEventListener('keyup', e => keys[e.code] = false);
            document.addEventListener('mousemove', onMouseMove);
            document.body.addEventListener('click', () => document.body.requestPointerLock());
            window.addEventListener('resize', onWindowResize);

            requestAnimationFrame(animate);
        }

        let materials;
        function initMaterials() {
            const grassTop = new THREE.MeshLambertMaterial({color: 0x3d9e3d});
            const grassSide = new THREE.MeshLambertMaterial({color: 0xffa500}); // Turuncu yanlar
            materials = {
                grass: [grassSide, grassSide, grassTop, grassSide, grassSide, grassSide],
                dirt: new THREE.MeshLambertMaterial({color: 0xffa500}),
                stone: new THREE.MeshLambertMaterial({color: 0x777777}),
                wood: new THREE.MeshLambertMaterial({color: 0x5D2906}),
                leaf: new THREE.MeshLambertMaterial({color: 0x116611, transparent: true, opacity: 0.9}),
                cloud: new THREE.MeshBasicMaterial({color: 0xffffff, transparent: true, opacity: 0.8})
            };
        }

        function getTerrainHeight(x, z) {
            return Math.floor(simplex.noise2D(x * 0.05, z * 0.05) * 8) + 25;
        }

        function createChunk(cx, cz) {
            const key = `${cx},${cz}`;
            if (chunkMeshes.has(key)) return;

            document.getElementById('aux-status').innerText = "CALCULATING";
            
            const group = new THREE.Group();
            const geo = new THREE.BoxGeometry(1, 1, 1);
            const blocks = { grass: [], dirt: [], stone: [], wood: [], leaf: [] };

            for (let x = 0; x < CHUNK_SIZE; x++) {
                for (let z = 0; z < CHUNK_SIZE; z++) {
                    const wx = cx * CHUNK_SIZE + x;
                    const wz = cz * CHUNK_SIZE + z;
                    const h = getTerrainHeight(wx, wz);

                    // Katmanları Kaydet (Fizik için)
                    setBlock(wx, h, wz, 'grass');
                    blocks.grass.push(new THREE.Vector3(wx, h, wz));

                    for(let y = 1; y <= 5; y++) {
                        setBlock(wx, h - y, wz, 'dirt');
                        blocks.dirt.push(new THREE.Vector3(wx, h - y, wz));
                    }
                    for(let y = 6; y <= 20; y++) {
                        setBlock(wx, h - y, wz, 'stone');
                        blocks.stone.push(new THREE.Vector3(wx, h - y, wz));
                    }

                    // Ağaçlar (7 Blok Gövde)
                    if (Math.random() < 0.02) {
                        for(let i = 1; i <= 7; i++) {
                            setBlock(wx, h + i, wz, 'wood');
                            blocks.wood.push(new THREE.Vector3(wx, h + i, wz));
                        }
                        // Yapraklar
                        for(let ly = 6; ly <= 9; ly++) {
                            for(let lx = -2; lx <= 2; lx++) {
                                for(let lz = -2; lz <= 2; lz++) {
                                    if (Math.abs(lx) + Math.abs(lz) < 3) {
                                        setBlock(wx + lx, h + ly, wz + lz, 'leaf');
                                        blocks.leaf.push(new THREE.Vector3(wx + lx, h + ly, wz + lz));
                                    }
                                }
                            }
                        }
                    }
                }
            }

            // GPU Yükünü azaltmak için InstancedMesh kullanıyoruz
            Object.keys(blocks).forEach(type => {
                const list = blocks[type];
                if (list.length === 0) return;
                const inst = new THREE.InstancedMesh(geo, type === 'grass' ? materials.grass : materials[type], list.length);
                const mat = new THREE.Matrix4();
                list.forEach((pos, i) => {
                    mat.setPosition(pos);
                    inst.setMatrixAt(i, mat);
                });
                group.add(inst);
            });

            scene.add(group);
            chunkMeshes.set(key, group);
            document.getElementById('aux-status').innerText = "IDLE";
        }

        function setBlock(x, y, z, type) {
            const k = `${Math.floor(x)},${Math.floor(y)},${Math.floor(z)}`;
            worldBlocks.set(k, type);
        }

        function getBlock(x, y, z) {
            return worldBlocks.get(`${Math.floor(x)},${Math.floor(y)},${Math.floor(z)}`);
        }

        function updatePhysics() {
            const dt = clock.getDelta();
            player.vel.y -= 0.008; // Yerçekimi

            const moveDir = new THREE.Vector3();
            if (keys['KeyW']) moveDir.z -= 1;
            if (keys['KeyS']) moveDir.z += 1;
            if (keys['KeyA']) moveDir.x -= 1;
            if (keys['KeyD']) moveDir.x += 1;
            
            moveDir.applyQuaternion(camera.quaternion);
            moveDir.y = 0;
            moveDir.normalize();

            // Yatay Hareket ve Çarpışma
            const nextX = player.pos.x + moveDir.x * player.speed;
            const nextZ = player.pos.z + moveDir.z * player.speed;

            if (!checkCollision(nextX, player.pos.y, player.pos.z)) player.pos.x = nextX;
            if (!checkCollision(player.pos.x, player.pos.y, nextZ)) player.pos.z = nextZ;

            // Dikey Hareket (Zıplama ve Düşme)
            const nextY = player.pos.y + player.vel.y;
            if (checkCollision(player.pos.x, nextY, player.pos.z)) {
                if (player.vel.y < 0) player.onGround = true;
                player.vel.y = 0;
            } else {
                player.pos.y = nextY;
                player.onGround = false;
            }

            if (keys['Space'] && player.onGround) {
                player.vel.y = player.jumpForce;
                player.onGround = false;
            }

            camera.position.copy(player.pos).y += 1.6;
        }

        function checkCollision(x, y, z) {
            // Basit AABB Çarpışma Testi
            for (let ox = -0.3; ox <= 0.3; ox += 0.6) {
                for (let oy = 0; oy <= 1.8; oy += 0.9) {
                    for (let oz = -0.3; oz <= 0.3; oz += 0.6) {
                        if (getBlock(x + ox, y + oy, z + oz)) return true;
                    }
                }
            }
            return false;
        }

        function onMouseMove(e) {
            if (document.pointerLockElement) {
                camera.rotation.y -= e.movementX * 0.002;
                camera.rotation.x -= e.movementY * 0.002;
                camera.rotation.x = Math.max(-Math.PI / 2, Math.min(Math.PI / 2, camera.rotation.x));
            }
        }

        function animate() {
            requestAnimationFrame(animate);
            updatePhysics();

            const px = Math.floor(player.pos.x / CHUNK_SIZE);
            const pz = Math.floor(player.pos.z / CHUNK_SIZE);

            // Sadece 3 Chunk Görüş Mesafesi
            for (let x = px - VIEW_DISTANCE; x <= px + VIEW_DISTANCE; x++) {
                for (let z = pz - VIEW_DISTANCE; z <= pz + VIEW_DISTANCE; z++) {
                    createChunk(x, z);
                }
            }

            // GPU Yük Takibi
            document.getElementById('gpu-load').innerText = Math.floor(renderer.info.render.calls / 10) + "%";

            renderer.render(scene, camera);
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

    </script>
</body>
</html>
