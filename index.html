<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Horror Mini - Alpha 0.03</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body, html { margin: 0; padding: 0; overflow: hidden; background: #000; font-family: 'Courier New', monospace; user-select: none; }
        
        /* --- ANA MENÜ ARAYÜZÜ --- */
        #gui-wrapper { position: absolute; width: 100%; height: 100%; z-index: 100; display: block; background: radial-gradient(circle, #111 0%, #000 100%); }
        .alpha-tag { position: absolute; top: 10px; left: 10px; color: #444; font-size: 12px; font-weight: bold; }
        .main-header { position: absolute; top: 10%; left: 50%; transform: translateX(-50%); text-align: center; }
        .main-header h1 { color: #cc0000; font-size: 4rem; margin: 0; text-shadow: 0 0 20px #ff0000; letter-spacing: 10px; }
        .account-box { color: #555; margin-top: 15px; border: 1px solid #222; padding: 8px; display: inline-block; font-size: 14px; }
        
        .menu-button { position: absolute; top: 50%; background: none; border: 2px solid #cc0000; color: #cc0000; padding: 20px 45px; font-size: 1.2rem; cursor: pointer; transition: 0.4s; font-family: inherit; }
        .btn-left { left: 60px; }
        .btn-right { right: 60px; }
        .menu-button:hover { background: #cc0000; color: #000; box-shadow: 0 0 30px #ff0000; }
        
        .footer-copy { position: absolute; bottom: 10px; right: 15px; color: #222; font-size: 11px; }

        /* --- OYUN İÇİ HUD --- */
        #hud-display { display: none; position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); z-index: 50; }
        .stats-row { display: flex; gap: 40px; color: #eee; font-size: 1.8rem; text-shadow: 2px 2px #000; }
        #reticle { display: none; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: rgba(255,255,255,0.4); font-size: 28px; z-index: 50; pointer-events: none; }
        #version-overlay { display: none; position: absolute; top: 10px; left: 10px; color: rgba(255,255,255,0.2); font-size: 12px; z-index: 50; }

        /* --- KORKU UYARISI --- */
        #scare-overlay { display: none; position: fixed; width: 100%; height: 100%; background: #000; color: #ff0000; z-index: 500; align-items: center; justify-content: center; font-size: 5rem; font-weight: bold; letter-spacing: -2px; }
    </style>
</head>
<body>

    <div id="scare-overlay">O SENİ İZLİYOR</div>

    <div id="gui-wrapper">
        <div class="alpha-tag">HORROR MİNİ PROCEST OLD ALPHA 0.03</div>
        <div class="main-header">
            <h1>HORROR MİNİ</h1>
            <div class="account-box">HESAP BİLGİLERİ</div>
        </div>
        <button class="menu-button btn-left" onclick="launchGame()">TEK OYUNCULU</button>
        <button class="menu-button btn-right" onclick="triggerScare()">ÇOK OYUNCULU</button>
        <div class="footer-copy">FARMANT STUDİONUN TÜM HAKLARI SAKLIDIR</div>
    </div>

    <div id="reticle">+</div>
    <div id="version-overlay">ALPHA 0.03</div>
    <div id="hud-display">
        <div class="stats-row">
            <div>❤️ x10</div>
            <div id="hunger-meter">🍗 x10</div>
        </div>
    </div>

    <script>
        // --- SİSTEM AYARLARI ---
        let SEED = Math.floor(Math.random() * 1000000); // Dinamik Seed
        const CHUNK_SIZE = 16;
        const RENDER_DISTANCE = 15; // 15 Chunk kapasitesi

        function seededRand(s) {
            let x = Math.sin(s) * 10000;
            return x - Math.floor(x);
        }

        // --- OYUN DEĞİŞKENLERİ ---
        let scene, camera, renderer, stalker, clock = new THREE.Clock();
        let hunger = 10, hungerTimer = 0;
        let activeKeys = {};
        let isRunning = false;

        function triggerScare() {
            const overlay = document.getElementById('scare-overlay');
            overlay.style.display = 'flex';
            setTimeout(() => overlay.style.display = 'none', 2500);
        }

        function launchGame() {
            document.getElementById('gui-wrapper').style.display = 'none';
            document.getElementById('hud-display').style.display = 'block';
            document.getElementById('reticle').style.display = 'block';
            document.getElementById('version-overlay').style.display = 'block';
            
            initEngine();
            isRunning = true;
        }

        function initEngine() {
            // Sahne Kurulumu
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x010101);
            scene.fog = new THREE.FogExp2(0x010101, 0.12);

            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            
            renderer = new THREE.WebGLRenderer({ antialias: false });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            // Oyuncu Işığı (El Feneri Etkisi)
            const pointLight = new THREE.PointLight(0xffffff, 1.2, 18);
            camera.add(pointLight);
            scene.add(camera);

            generateChunkWorld();
            spawnStalker();

            camera.position.set(0, 1.7, 0);

            // Giriş Dinleyicileri
            window.addEventListener('keydown', (e) => activeKeys[e.code] = true);
            window.addEventListener('keyup', (e) => activeKeys[e.code] = false);
            window.addEventListener('mousemove', (e) => {
                if(document.pointerLockElement) {
                    camera.rotation.y -= e.movementX * 0.0025;
                    camera.rotation.x -= e.movementY * 0.0025;
                    camera.rotation.x = Math.max(-Math.PI/2, Math.min(Math.PI/2, camera.rotation.x));
                }
            });
            document.body.onclick = () => { if(isRunning) renderer.domElement.requestPointerLock(); };

            mainLoop();
        }

        function generateChunkWorld() {
            const geo = new THREE.BoxGeometry(1, 1, 1);
            let s = SEED;
            let range = (RENDER_DISTANCE * CHUNK_SIZE) / 2;

            for(let i = 0; i < 2500; i++) {
                let rx = Math.floor(seededRand(s++) * (range * 2)) - range;
                let rz = Math.floor(seededRand(s++) * (range * 2)) - range;
                let val = seededRand(s++);

                let mat;
                if(val > 0.98) mat = new THREE.MeshBasicMaterial({color: 0xff3300}); // Lav
                else if(val > 0.95) mat = new THREE.MeshBasicMaterial({color: 0x0022ff}); // Su
                else if(val > 0.88) { // Havada Ağaç (Yapraksız)
                    const log = new THREE.Mesh(new THREE.BoxGeometry(0.4, 4, 0.4), new THREE.MeshBasicMaterial({color: 0x221100}));
                    log.position.set(rx, 3.5, rz);
                    scene.add(log);
                    continue;
                }
                else mat = new THREE.MeshBasicMaterial({color: 0x2a2a2a}); // Taş/Zemin

                const b = new THREE.Mesh(geo, mat);
                b.position.set(rx, -1, rz);
                scene.add(b);
            }
        }

        function spawnStalker() {
            stalker = new THREE.Mesh(
                new THREE.BoxGeometry(0.6, 2, 0.6),
                new THREE.MeshBasicMaterial({color: 0xffffff})
            );
            stalker.position.set(25, 0.5, -25);
            scene.add(stalker);
        }

        function mainLoop() {
            requestAnimationFrame(mainLoop);
            let delta = clock.getDelta();

            // Hareket Kontrolü
            let currentSpeed = activeKeys['ShiftLeft'] ? 9 : 4.5;
            let moveZ = (activeKeys['KeyW'] ? -1 : 0) + (activeKeys['KeyS'] ? 1 : 0);
            let moveX = (activeKeys['KeyA'] ? -1 : 0) + (activeKeys['KeyD'] ? 1 : 0);

            if(moveZ !== 0) camera.translateZ(moveZ * currentSpeed * delta);
            if(moveX !== 0) camera.translateX(moveX * currentSpeed * delta);
            
            // Eğilme Mekaniği
            camera.position.y = activeKeys['ControlLeft'] ? 0.9 : 1.7;

            // Açlık Sistemi
            hungerTimer += delta;
            if(hungerTimer > 12) {
                if(hunger > 0) hunger--;
                document.getElementById('hunger-meter').innerText = "🍗 x" + hunger;
                hungerTimer = 0;
            }

            // Stalker Mantığı (Görüş ve Mesafe)
            let dist = camera.position.distanceTo(stalker.position);
            stalker.visible = (dist > 5.5); // 5 blok yaklaşınca kaybolur
            if(stalker.visible) stalker.lookAt(camera.position);

            renderer.render(scene, camera);
        }

        window.onresize = () => {
            if(camera) {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            }
        };
    </script>
</body>
</html>
