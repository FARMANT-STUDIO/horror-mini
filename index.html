<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Farmant Voxel - Alpha 0.03.5 ULTIMATE COMBINED</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Courier New', monospace; color: white; user-select: none; }
        canvas { display: block; }
        
        /* --- UI VE HUD --- */
        #hud { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); display: flex; flex-direction: column; align-items: center; gap: 8px; pointer-events: none; z-index: 10; }
        .stat-bar { display: flex; gap: 2px; font-size: 20px; text-shadow: 2px 2px #000; }
        #hotbar { display: flex; gap: 5px; background: rgba(0,0,0,0.5); padding: 8px; border: 1px solid rgba(255,255,255,0.2); border-radius: 5px; }
        .slot { width: 40px; height: 45px; border: 1px solid #555; display: flex; align-items: center; justify-content: center; font-size: 8px; position: relative; background: rgba(0,0,0,0.3); }
        .slot.selected { border: 2px solid #0f0; background: rgba(0,255,0,0.1); }
        .count { position: absolute; bottom: 1px; right: 2px; color: #ff0; font-weight: bold; }
        
        /* --- EFEKTLER --- */
        #flash { position: fixed; inset: 0; background: white; opacity: 0; pointer-events: none; z-index: 10000; transition: opacity 0.1s; }
        #start-menu { position: fixed; inset: 0; background: radial-gradient(circle, #1a0533 0%, #000 100%); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 20000; }
        .play-btn { background: #bc13fe; color: white; border: none; padding: 20px 60px; font-size: 24px; cursor: pointer; border-radius: 50px; box-shadow: 0 0 20px #bc13fe; }
    </style>
</head>
<body>

    <div id="flash"></div>
    <div id="start-menu">
        <h1 style="color:#bc13fe; font-size: 60px; text-shadow: 0 0 30px #bc13fe;">FARMANT</h1>
        <button class="play-btn" onclick="initGame()">DÜNYAYA GİR</button>
    </div>

    <div id="hud">
        <div class="stat-bar" style="color: #ff0000;" id="h-bar">❤❤❤❤❤❤❤❤❤❤</div>
        <div class="stat-bar" style="color: #8b4513;" id="hung-bar">🍖🍖🍖🍖🍖🍖🍖🍖🍖🍖</div>
        <div id="hotbar">
            <div class="slot selected">Odun<div class="count" id="c-odun">0</div></div>
            <div class="slot">Et<div class="count" id="c-et">0</div></div>
            <div class="slot">Maden<div class="count" id="c-maden">0</div></div>
            <div class="slot">Tahta<div class="count" id="c-tahta">0</div></div>
            <div class="slot">Toprak<div class="count" id="c-toprak">0</div></div>
            <div class="slot">Gizem<div class="count" id="c-tabela">0</div></div>
            <div class="slot">..</div><div class="slot">..</div><div class="slot">..</div><div class="slot">..</div>
        </div>
    </div>

    <script type="module">
        import * as THREE from 'https://unpkg.com/three@0.160.0/build/three.module.js';

        let scene, camera, renderer, entity, timer = 0, isGameRunning = false;
        let health = 10, hunger = 10;
        const blocks = [], animals = [], keys = {};
        const inventory = { odun: 0, et: 0, maden: 0, tahta: 0, toprak: 0, tabela: 0 };

        window.initGame = () => {
            document.getElementById('start-menu').style.display = 'none';
            document.body.requestPointerLock();
            isGameRunning = true;
            setup();
        };

        function setup() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x87ceeb);
            scene.fog = new THREE.FogExp2(0x87ceeb, 0.04);

            camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
            camera.position.set(0, 1.7, 5);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            const sun = new THREE.DirectionalLight(0xffffff, 1.2);
            sun.position.set(10, 50, 10);
            scene.add(sun, new THREE.AmbientLight(0xffffff, 0.6));

            generateWorld();
            spawnAnimals();
            
            // Açlık Sistemi (10 dakikada bir)
            setInterval(() => { if(hunger > 0) hunger--; else health--; updateStats(); }, 600000);

            animate();
        }

        function generateWorld() {
            const mats = {
                grass: new THREE.MeshLambertMaterial({ color: 0x2ecc71 }),
                stone: new THREE.MeshLambertMaterial({ color: 0x777777 }),
                wood: new THREE.MeshLambertMaterial({ color: 0x5d4037 }),
                leaf: new THREE.MeshLambertMaterial({ color: 0x1b5e20, transparent: true, opacity: 0.8 }),
                water: new THREE.MeshBasicMaterial({ color: 0x0066ff, transparent: true, opacity: 0.6 })
            };

            for(let x=-25; x<25; x++) {
                for(let z=-25; z<25; z++) {
                    // Dağlar ve Düzlük Karmaşası (Hitbox sabitli -0.5 zemin)
                    let h = Math.floor(Math.sin(x*0.15)*Math.cos(z*0.15)*6);
                    if(x > -5 && x < 5 && z > -5 && z < 5) h = 0; // Başlangıç alanı düzlük

                    const b = new THREE.Mesh(new THREE.BoxGeometry(1, 1, 1), h < -2 ? mats.stone : mats.grass);
                    b.position.set(x, h - 0.5, z);
                    b.userData = { type: h < -2 ? 'maden' : 'toprak' };
                    scene.add(b);
                    blocks.push(b);

                    // Ağaçlar (Sadece karada)
                    if(h >= 0 && Math.random() < 0.03 && (Math.abs(x)>3 || Math.abs(z)>3)) {
                        for(let i=0; i<3; i++) {
                            const trunk = new THREE.Mesh(new THREE.BoxGeometry(0.7, 1, 0.7), mats.wood);
                            trunk.position.set(x, h + i + 0.5, z);
                            trunk.userData = { type: 'odun' };
                            scene.add(trunk);
                            blocks.push(trunk);
                        }
                        const leaves = new THREE.Mesh(new THREE.BoxGeometry(2.5, 2, 2.5), mats.leaf);
                        leaves.position.set(x, h + 3.5, z);
                        scene.add(leaves);
                    }
                }
            }

            // Deniz Katmanı
            const sea = new THREE.Mesh(new THREE.PlaneGeometry(200, 200), mats.water);
            sea.rotation.x = -Math.PI/2;
            sea.position.y = -2.5;
            scene.add(sea);
        }

        function spawnAnimals() {
            const colors = [0xffffff, 0x4b2c20, 0xffff00];
            for(let i=0; i<8; i++) {
                const a = new THREE.Mesh(new THREE.BoxGeometry(0.7,0.7,0.9), new THREE.MeshLambertMaterial({color: colors[i%3]}));
                a.position.set(Math.random()*20-10, 1, Math.random()*20-10);
                a.userData = { type: 'animal' };
                scene.add(a);
                animals.push(a);
            }
        }

        function spawnGhost() {
            const ghost = new THREE.Group();
            const body = new THREE.Mesh(new THREE.BoxGeometry(0.6, 1.2, 0.3), new THREE.MeshBasicMaterial({color: 0xffffff}));
            const head = new THREE.Mesh(new THREE.BoxGeometry(0.4, 0.4, 0.4), new THREE.MeshBasicMaterial({color: 0xffffff}));
            head.position.y = 0.8;
            ghost.add(body, head);
            ghost.position.set(camera.position.x + 15, 1, camera.position.z - 15);
            entity = ghost;
            scene.add(entity);
        }

        window.onmousedown = (e) => {
            if(!isGameRunning || !document.pointerLockElement) return;
            const ray = new THREE.Raycaster();
            ray.setFromCamera(new THREE.Vector2(0,0), camera);
            const inter = ray.intersectObjects([...blocks, ...animals]);
            
            if(inter.length > 0 && inter[0].distance < 4) {
                const obj = inter[0].object;
                const type = obj.userData.type;
                if(type === 'animal') { inventory.et++; scene.remove(obj); }
                else if(inventory[type] !== undefined) { inventory[type]++; scene.remove(obj); }
                updateUI();
            }
        };

        function updateUI() {
            for(let key in inventory) {
                const el = document.getElementById('c-' + key);
                if(el) el.innerText = inventory[key];
            }
        }

        function updateStats() {
            document.getElementById('h-bar').innerText = '❤'.repeat(Math.max(0, health));
            document.getElementById('hung-bar').innerText = '🍖'.repeat(Math.max(0, hunger));
        }

        function animate() {
            requestAnimationFrame(animate);
            if(!isGameRunning) return;
            timer++;

            // ATALARIN ATASI (20. saniyede çıkar - 1200 tick)
            if(timer === 1200 && !entity) spawnGhost();

            if(entity) {
                entity.lookAt(camera.position.x, 1, camera.position.z);
                const d = camera.position.distanceTo(entity.position);
                if(d < 6) {
                    // ŞİMŞEK VE KAYBOLMA
                    document.getElementById('flash').style.opacity = '1';
                    setTimeout(() => document.getElementById('flash').style.opacity = '0', 150);
                    
                    const sign = new THREE.Mesh(new THREE.BoxGeometry(0.7, 0.5, 0.1), new THREE.MeshLambertMaterial({color: 0x8b4513}));
                    sign.position.set(entity.position.x, 0.5, entity.position.z);
                    scene.add(sign);
                    inventory.tabela++; updateUI();
                    
                    scene.remove(entity);
                    entity = null;
                }
            }

            // HAREKET VE HİTBOX SABİTLEME
            const s = 0.13;
            if(keys['KeyW']) camera.translateZ(-s);
            if(keys['KeyS']) camera.translateZ(s);
            if(keys['KeyA']) camera.translateX(-s);
            if(keys['KeyD']) camera.translateX(s);
            camera.position.y = 1.7; // Sabit boy

            animals.forEach(a => { a.position.x += (Math.random()-0.5)*0.02; a.position.z += (Math.random()-0.5)*0.02; });

            renderer.render(scene, camera);
        }

        window.onkeydown = (e) => {
            keys[e.code] = true;
            if(e.code === 'KeyE') alert("Üretim Menüsü: 1 Odun = 4 Tahta (Yakında)");
        };
        window.onkeyup = (e) => keys[e.code] = false;
        document.addEventListener('mousemove', (e) => {
            if(document.pointerLockElement) {
                camera.rotation.y -= e.movementX * 0.002;
                camera.rotation.x -= e.movementY * 0.002;
                camera.rotation.x = Math.max(-1.5, Math.min(1.5, camera.rotation.x));
            }
        });
    </script>
</body>
</html>
