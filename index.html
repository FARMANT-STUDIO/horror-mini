<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HORROR MINI - Alpha 0.04 (Menu Update)</title>
    <style>
        body { margin: 0; overflow: hidden; background: #eee; font-family: 'Courier New', monospace; touch-action: none; -webkit-user-select: none; user-select: none; }
        
        /* UI Overlay - Ana Menü */
        #ui-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            background: rgba(255,255,255,0.95); z-index: 100;
        }
        #logo { color: #000; font-size: 38px; font-weight: bold; text-align: center; margin-bottom: 20px; }
        .menu-btn { background: #000; color: white; border: none; padding: 20px 60px; font-size: 22px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .menu-btn:hover { background: #333; }

        /* Kitap ve Kalem Simgesi */
        #notes-icon {
            position: absolute; left: 25px; bottom: 25px; font-size: 45px; cursor: pointer; z-index: 110;
            filter: drop-shadow(0 0 5px rgba(0,0,0,0.2));
        }

        /* Güncelleme Notları Paneli */
        #notes-panel {
            display: none; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 85%; max-width: 450px; background: white; border: 4px solid black; padding: 25px; z-index: 120;
            box-shadow: 10px 10px 0px rgba(0,0,0,0.1);
        }
        #notes-panel h2 { font-size: 16px; border-bottom: 2px solid #000; padding-bottom: 10px; margin-top: 0; }
        #notes-panel p { font-size: 14px; line-height: 1.8; font-weight: bold; }
        #close-notes { background: #000; color: #fff; border: none; padding: 8px 15px; cursor: pointer; float: right; font-weight: bold; }

        /* Sol Üst Yazılar */
        #dev-info-container {
            position: absolute; top: 10px; left: 10px; z-index: 110;
        }
        .info-box {
            color: #000; font-size: 13px; font-weight: bold;
            background: rgba(255,255,255,0.8); padding: 5px 10px; border-radius: 2px;
            margin-bottom: 5px; width: fit-content; border: 1px solid rgba(0,0,0,0.1);
        }

        #crosshair { 
            position: absolute; top: 50%; left: 50%; width: 8px; height: 8px; 
            border: 1px solid black; border-radius: 50%; transform: translate(-50%, -50%); 
            pointer-events: none; display: none; z-index: 45; 
        }
    </style>
</head>
<body>

    <!-- Sol Üst Bilgiler -->
    <div id="dev-info-container">
        <div class="info-box">THE GAME DEVELOPER IS STRLXY-B9Q, DO NOT CHANGE IT.</div>
        <div class="info-box">ALPHA 0.04</div>
    </div>

    <!-- Menü Ekranı -->
    <div id="ui-overlay">
        <div id="logo">HORROR MINI<br><span style="font-size: 18px; color: #666;">MENU UPDATE</span></div>
        <button class="menu-btn" onclick="startGame()">OYUNA BAŞLA</button>
        <p style="font-size: 12px; margin-top: 25px;">(WASD: Hareket | Sol Tık: Kır | Sağ Tık: Koy)</p>
        
        <!-- Kitap Kalem Simgesi -->
        <div id="notes-icon" onclick="toggleNotes()">📝</div>
    </div>

    <!-- Güncelleme Notları -->
    <div id="notes-panel">
        <button id="close-notes" onclick="toggleNotes()">KAPAT</button>
        <h2>FARMANT STUDIOS | HORROR MİNİ | ALPHA 0.04</h2>
        <p>
            (+) GELİŞTİRİCİ NOTU <br>
            (+) STALKER HATASI DÜZELTMESİ <br>
            (+) GELİŞTİRİCİ UYARISI GÜNCELLEMESİ
        </p>
    </div>

    <div id="crosshair"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script>
        let scene, camera, renderer, stalker;
        let isGameStarted = false;
        let keys = { w: false, a: false, s: false, d: false };
        let velocity = new THREE.Vector3();
        let chunks = {};
        const CHUNK_SIZE = 8;
        const RENDER_DISTANCE = 4;

        const mats = {
            grass: new THREE.MeshLambertMaterial({ color: 0x999999 }),
            dirt: new THREE.MeshLambertMaterial({ color: 0x666666 }),
            stone: new THREE.MeshLambertMaterial({ color: 0x444444 }),
            trunk: new THREE.MeshLambertMaterial({ color: 0x332211 }),
            leaves: new THREE.MeshLambertMaterial({ color: 0x223322 }),
            stalker: new THREE.MeshBasicMaterial({ color: 0x000000 }) 
        };

        const blockGeo = new THREE.BoxGeometry(1, 1, 1);

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0xffffff); 
            // SİS AYARI: 2 birimden başlayıp 45 birimde tam kapatıyor (Eski sürümde 28'di, görüşü açtık)
            scene.fog = new THREE.Fog(0xffffff, 2, 45);

            camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
            camera.rotation.order = 'YXZ';
            
            renderer = new THREE.WebGLRenderer({ antialias: false });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            const sun = new THREE.DirectionalLight(0xffffff, 0.8);
            sun.position.set(10, 20, 10);
            scene.add(sun);
            scene.add(new THREE.AmbientLight(0xffffff, 0.6));

            camera.position.set(4, 35, 4); 
            
            spawnStalker();
            setupControls();
            updateChunks();
            window.addEventListener('resize', onWindowResize);
            animate();
        }

        function toggleNotes() {
            const panel = document.getElementById('notes-panel');
            panel.style.display = (panel.style.display === 'block') ? 'none' : 'block';
        }

        function setupControls() {
            window.addEventListener('keydown', (e) => { keys[e.key.toLowerCase()] = true; });
            window.addEventListener('keyup', (e) => { keys[e.key.toLowerCase()] = false; });

            document.addEventListener('mousemove', (e) => {
                if (document.pointerLockElement === document.body) {
                    camera.rotation.y -= e.movementX * 0.0025;
                    camera.rotation.x -= e.movementY * 0.0025;
                    camera.rotation.x = Math.max(-1.5, Math.min(1.5, camera.rotation.x));
                }
            });

            window.addEventListener('mousedown', (e) => {
                if (!isGameStarted) return;
                if (e.button === 0) breakBlock();
                if (e.button === 2) placeBlock();
            });

            window.addEventListener('contextmenu', (e) => e.preventDefault());
        }

        function createChunk(cx, cz) {
            const chunkGroup = new THREE.Group();
            for (let x = 0; x < CHUNK_SIZE; x++) {
                for (let z = 0; z < CHUNK_SIZE; z++) {
                    const wX = cx * CHUNK_SIZE + x;
                    const wZ = cz * CHUNK_SIZE + z;
                    let h = Math.floor(Math.sin(wX * 0.15) * 2 + 5);
                    for (let y = 0; y <= h; y++) {
                        const b = new THREE.Mesh(blockGeo, y === h ? mats.grass : (y > h-2 ? mats.dirt : mats.stone));
                        b.position.set(wX, y, wZ);
                        chunkGroup.add(b);
                    }
                }
            }
            scene.add(chunkGroup);
            chunks[`${cx},${cz}`] = chunkGroup;
        }

        function updateChunks() {
            const pX = Math.floor(camera.position.x / CHUNK_SIZE);
            const pZ = Math.floor(camera.position.z / CHUNK_SIZE);
            for(let x = pX - RENDER_DISTANCE; x <= pX + RENDER_DISTANCE; x++) {
                for(let z = pZ - RENDER_DISTANCE; z <= pZ + RENDER_DISTANCE; z++) {
                    if(!chunks[`${x},${z}`]) createChunk(x, z);
                }
            }
        }

        function breakBlock() {
            const ray = new THREE.Raycaster();
            ray.setFromCamera(new THREE.Vector2(0,0), camera);
            const hits = ray.intersectObjects(scene.children, true);
            const hit = hits.find(h => h.object !== stalker);
            if(hit && hit.distance < 7) hit.object.parent.remove(hit.object);
        }

        function placeBlock() {
            const ray = new THREE.Raycaster();
            ray.setFromCamera(new THREE.Vector2(0,0), camera);
            const hits = ray.intersectObjects(scene.children, true);
            const hit = hits.find(h => h.object !== stalker);
            if(hit && hit.distance < 7) {
                const b = new THREE.Mesh(blockGeo, mats.stone);
                b.position.copy(hit.object.position).add(hit.face.normal);
                hit.object.parent.add(b);
            }
        }

        function spawnStalker() {
            if (!stalker) {
                stalker = new THREE.Mesh(new THREE.BoxGeometry(0.5, 2.5, 0.5), mats.stalker);
                scene.add(stalker);
            }
            const angle = Math.random() * Math.PI * 2;
            const dist = 22 + Math.random() * 8; // Oyuncudan daha uzak bir yerde doğar
            stalker.position.set(
                camera.position.x + Math.cos(angle) * dist,
                camera.position.y + 2,
                camera.position.z + Math.sin(angle) * dist
            );
        }

        function startGame() {
            document.getElementById('ui-overlay').style.display = 'none';
            document.getElementById('crosshair').style.display = 'block';
            isGameStarted = true;
            document.body.requestPointerLock();
        }

        function update() {
            if(!isGameStarted) return;

            const speed = 0.14;
            if (keys.w) camera.translateZ(-speed);
            if (keys.s) camera.translateZ(speed);
            if (keys.a) camera.translateX(-speed);
            if (keys.d) camera.translateX(speed);

            updateChunks();

            // Stalker Mekaniği
            stalker.lookAt(camera.position);
            const camDir = new THREE.Vector3();
            camera.getWorldDirection(camDir);
            const toStalker = new THREE.Vector3().subVectors(stalker.position, camera.position).normalize();
            const dot = camDir.dot(toStalker);

            if (dot > 0.94) { // Oyuncu ona baktığı an
                spawnStalker(); 
            }

            // Fizik ve Yerçekimi
            const ray = new THREE.Raycaster(camera.position, new THREE.Vector3(0,-1,0));
            const hit = ray.intersectObjects(scene.children, true);
            const ground = hit.find(h => h.object !== stalker);
            
            if(ground && ground.distance < 1.8) {
                velocity.y = 0;
                camera.position.y = ground.point.y + 1.8;
            } else { 
                velocity.y -= 0.01; 
            }
            camera.position.y += velocity.y;
            
            // Stalker'ı yere sabitle
            const sRay = new THREE.Raycaster(stalker.position, new THREE.Vector3(0,-1,0));
            const sHit = sRay.intersectObjects(scene.children, true);
            const sGround = sHit.find(h => h.object !== stalker);
            if(sGround) stalker.position.y = sGround.point.y + 1.25;
        }

        function animate() {
            requestAnimationFrame(animate);
            update();
            renderer.render(scene, camera);
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        init();
    </script>
</body>
</html>
