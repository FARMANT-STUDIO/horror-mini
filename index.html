<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Farmant Studios | Korku-Mini</title>
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: #0d0216; color: #fff;
            font-family: 'Segoe UI', sans-serif; overflow: hidden;
        }

        /* 1. GİRİŞ EKRANI (Açılışta Burası Görünür) */
        #menu-screen {
            position: fixed; width: 100%; height: 100%;
            background: radial-gradient(circle, #1a0533 0%, #05010a 100%);
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            z-index: 100; transition: 0.5s;
        }

        h1 { font-size: 4rem; color: #bc13fe; text-shadow: 0 0 30px #bc13fe; margin: 0; }
        p { font-size: 1.2rem; color: #888; margin-bottom: 30px; }

        .start-btn {
            background-color: #bc13fe; color: white;
            border: none; padding: 20px 50px;
            font-size: 1.8rem; font-weight: bold;
            cursor: pointer; border-radius: 50px;
            box-shadow: 0 0 20px rgba(188, 19, 254, 0.6);
            transition: 0.3s;
        }
        .start-btn:hover { background-color: #e044ff; transform: scale(1.1); box-shadow: 0 0 40px #bc13fe; }

        /* 2. OYUN EKRANI (İlk Başta Gizli) */
        #game-container {
            display: none; width: 100%; height: 100%;
            background: #000; position: relative;
        }

        #crosshair {
            position: absolute; top: 50%; left: 50%;
            width: 10px; height: 10px; border: 2px solid white;
            border-radius: 50%; transform: translate(-50%, -50%);
            pointer-events: none; z-index: 10;
        }

        footer { position: absolute; bottom: 10px; width: 100%; text-align: center; color: #333; font-size: 12px; }
    </style>
</head>
<body>

    <div id="menu-screen">
        <h1>FARMANT STUDIOS</h1>
        <p>Korku-Mini: Karanlık Başlıyor...</p>
        <button class="start-btn" onclick="launchGame()">🕹️ OYUNA BAŞLA</button>
        <div style="margin-top: 20px; color: #555;">Kontroller: WASD + Mouse</div>
    </div>

    <div id="game-container">
        <div id="crosshair"></div>
        <div id="game-msg" style="position:absolute; top:20px; left:20px; color:#bc13fe;">Farmant Studios Aktif</div>
        
        <footer>Farmant Studios - 2026 | Fan Yapımı</footer>
    </div>

    <script>
        function launchGame() {
            // Menüyü sakla, oyunu göster
            document.getElementById('menu-screen').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('menu-screen').style.display = 'none';
                document.getElementById('game-container').style.display = 'block';
                
                // BURASI ÖNEMLİ: Oyun kodun buradaysa, oyunun "Start" fonksiyonunu çağırabilirsin.
                initGame(); 
            }, 500);
        }

        function initGame() {
            console.log("Farmant Studios: Oyun Motoru Çalıştırıldı!");
            // Kanka, senin o pürüzsüz mouse ve hareket kodlarını 
            // tam buraya yapıştırırsan butona basınca hepsi aktif olur!
        }
    </script>

</body>
</html>
