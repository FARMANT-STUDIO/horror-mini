<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Horror Mini v0.03</title>

<style>
body { margin:0; overflow:hidden; background:black; }

#ui{
  position:absolute;
  top:10px;
  left:10px;
  color:#0f0;
  font-family:monospace;
  font-size:14px;
  z-index:10;
}

#version{
  color:#ff4444;
  font-size:10px;
}
</style>
</head>

<body>

<div id="ui">
HORROR MINI ENGINE
<div id="version">v0.03 STABLE UPGRADE</div>
</div>

<script type="module">
import * as THREE from "https://unpkg.com/three@0.160.0/build/three.module.js";
import { PointerLockControls } from "https://unpkg.com/three@0.160.0/examples/jsm/controls/PointerLockControls.js";
import { SimplexNoise } from "https://cdn.skypack.dev/simplex-noise";


// ---------------- CORE ----------------
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0a0a0a);

const camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.1, 1000);

const renderer = new THREE.WebGLRenderer({antialias:false});
renderer.setSize(innerWidth, innerHeight);
document.body.appendChild(renderer.domElement);

const controls = new PointerLockControls(camera, document.body);
document.body.addEventListener("click",()=>controls.lock());

scene.add(new THREE.AmbientLight(0xffffff,0.9));

const noise = new SimplexNoise();


// ---------------- TEXTURE PACK (NON-MINECRAFT) ----------------
const tex = new THREE.TextureLoader().load(
  "https://i.imgur.com/8QfQp0X.png"
);

tex.magFilter = THREE.NearestFilter;
tex.minFilter = THREE.NearestFilter;


// ---------------- INSTANCED BLOCK SYSTEM ----------------
const geometry = new THREE.BoxGeometry(1,1,1);
const material = new THREE.MeshLambertMaterial({ map: tex });

let blocks = [];
let world = new Map();

const key = (x,y,z)=>`${x},${y},${z}`;


// ---------------- PLAYER PHYSICS ----------------
const player = {
  vel: new THREE.Vector3(),
  dir: new THREE.Vector3(),
  speed: 0.15,
  canJump:false
};

camera.position.set(0,25,0);


// ---------------- INPUT ----------------
let keys = {};

document.addEventListener("keydown",(e)=>{
  keys[e.key.toLowerCase()] = true;

  if(e.key.toLowerCase()==="k"){
    placeBlock();
  }
});

document.addEventListener("keyup",(e)=>{
  keys[e.key.toLowerCase()] = false;
});


// ---------------- BLOCK ----------------
function addBlock(x,y,z){
  const m = new THREE.Mesh(geometry,material);
  m.position.set(x,y,z);
  scene.add(m);

  blocks.push(m);
  world.set(key(x,y,z),true);
}


// ---------------- WORLD GEN ----------------
function generate(){

  for(let x=-20;x<20;x++){
    for(let z=-20;z<20;z++){

      const h = Math.floor(
        noise.noise2D(x*0.05,z*0.05)*18 + 20
      );

      for(let y=0;y<h;y++){
        addBlock(x,y,z);
      }
    }
  }
}

generate();


// ---------------- SAVE SYSTEM ----------------
function saveWorld(){
  const data = [...world.keys()];
  localStorage.setItem("world1", JSON.stringify(data));
}

function loadWorld(){
  const data = JSON.parse(localStorage.getItem("world1")||"[]");

  for(let k of data){
    const [x,y,z] = k.split(",").map(Number);
    addBlock(x,y,z);
  }
}


// ---------------- RAYCAST ----------------
const ray = new THREE.Raycaster();

function breakBlock(){
  ray.setFromCamera({x:0,y:0},camera);

  const hit = ray.intersectObjects(blocks);

  if(hit.length && hit[0].distance < 6){
    const b = hit[0].object;
    scene.remove(b);
    world.delete(key(b.position.x,b.position.y,b.position.z));
  }
}

function placeBlock(){
  ray.setFromCamera({x:0,y:0},camera);

  const hit = ray.intersectObjects(blocks);

  if(hit.length && hit[0].distance < 6){

    const n = hit[0].face.normal;
    const pos = hit[0].object.position.clone().add(n);

    if(!world.has(key(pos.x,pos.y,pos.z))){
      addBlock(pos.x,pos.y,pos.z);
    }
  }
}

document.addEventListener("mousedown",(e)=>{
  if(e.button===0) breakBlock();
});


// ---------------- COLLISION + GRAVITY ----------------
function solid(x,y,z){
  return world.has(key(
    Math.floor(x),
    Math.floor(y),
    Math.floor(z)
  ));
}

function move(){

  player.dir.set(0,0,0);

  if(keys["w"]) player.dir.z -= 1;
  if(keys["s"]) player.dir.z += 1;
  if(keys["a"]) player.dir.x -= 1;
  if(keys["d"]) player.dir.x += 1;

  player.dir.normalize();

  const nx = camera.position.x + player.dir.x * player.speed;
  const nz = camera.position.z + player.dir.z * player.speed;

  if(!solid(nx,camera.position.y,camera.position.z)){
    camera.position.x = nx;
  }

  if(!solid(camera.position.x,camera.position.y,nz)){
    camera.position.z = nz;
  }

  // gravity
  player.vel.y -= 0.02;
  camera.position.y += player.vel.y;

  if(solid(camera.position.x,camera.position.y-1,camera.position.z)){
    camera.position.y = Math.floor(camera.position.y)+1;
    player.vel.y = 0;
    player.canJump = true;
  }

  if(keys[" "] && player.canJump){
    player.vel.y = 0.3;
    player.canJump = false;
  }
}


// ---------------- LOOP ----------------
function animate(){
  requestAnimationFrame(animate);

  move();

  renderer.render(scene,camera);
}

animate();


// ---------------- RESIZE ----------------
window.addEventListener("resize",()=>{
  camera.aspect = innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth,innerHeight);
});

</script>

</body>
</html>
