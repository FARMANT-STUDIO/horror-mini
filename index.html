<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>KNKCIM Horror - V1.0</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; color: #00FF00; font-family: monospace; }
        #debug-ui { position: absolute; top: 10px; left: 10px; background: rgba(0,0,0,0.5); padding: 10px; z-index: 10; }
        #crosshair { 
            position: absolute; top: 50%; left: 50%; 
            width: 10px; height: 10px; background: white; 
            border-radius: 50%; transform: translate(-50%, -50%); 
        }
    </style>
</head>
<body>

<div id="debug-ui">
    <div id="fps">FPS: 0</div>
    <div id="xyz">XYZ: 0 / 0 / 0</div>
</div>
<div id="crosshair"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>
    // --- MOTOR BAŞLATMA ---
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x050505);
    scene.fog = new THREE.FogExp2(0x050505, 0.1); // Korku Sisi

    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ antialias: false });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    // --- DÜNYA OLUŞTURMA ---
    const geometry = new THREE.BoxGeometry(1, 1, 1);
    const material = new THREE.MeshPhongMaterial({ color: 0x222222 }); // Karanlık Taşlar

    for (let x = -10; x < 10; x++) {
        for (let z = -10; z < 10; z++) {
            const block = new THREE.Mesh(geometry, material);
            block.position.set(x, Math.floor(Math.sin(x*0.5) * 2), z);
            scene.add(block);
        }
    }

    // Işık
    const light = new THREE.PointLight(0xffffff, 1, 20);
    scene.add(light);
    scene.add(new THREE.AmbientLight(0x202020));

    camera.position.y = 5;
    camera.position.z = 5;

    // --- OYUN DÖNGÜSÜ ---
    let lastTime = performance.now();
    function animate() {
        requestAnimationFrame(animate);

        // FPS Hesapla
        const time = performance.now();
        const fps = Math.round(1000 / (time - lastTime));
        lastTime = time;

        // Işığı kameraya bağla (El Feneri gibi)
        light.position.copy(camera.position);

        // UI Güncelle
        document.getElementById('fps').innerText = `FPS: ${fps}`;
        document.getElementById('xyz').innerText = `XYZ: ${camera.position.x.toFixed(2)} / ${camera.position.y.toFixed(2)} / ${camera.position.z.toFixed(2)}`;

        renderer.render(scene, camera);
    }
    animate();

    // Fare ile bakış (Basit)
    window.addEventListener('mousemove', (e) => {
        camera.rotation.y -= e.movementX * 0.002;
        camera.rotation.x -= e.movementY * 0.002;
    });
</script>
</body>
</html>
