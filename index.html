<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HORROR MINI - ALPHA 0.04 FINAL</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Courier New', monospace; color: #fff; }
        canvas { filter: grayscale(1) contrast(1.5) brightness(0.8); image-rendering: pixelated; }
        
        /* GLITCH KATMANI */
        #glitch-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 200; display: none; overflow: hidden; }
        .glitch-text { position: absolute; font-weight: bold; color: red; animation: blink 0.1s infinite; text-transform: uppercase; }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0; } 100% { opacity: 1; } }

        /* HACKED MENÜ */
        #ui-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            background: #000; z-index: 100; border: 6px double red; box-sizing: border-box;
        }
        #logo { color: red; font-size: 38px; font-weight: bold; text-align: center; animation: shake 0.2s infinite; }
        @keyframes shake { 0% { transform: translate(1px,1px); } 50% { transform: translate(-1px,-1px); } 100% { transform: translate(1px,-1px); } }
        
        .menu-btn { background: red; color: white; border: 2px solid white; padding: 15px 45px; font-size: 22px; cursor: pointer; margin-top: 25px; }
        
        /* NOTLAR */
        #notes-icon { position: absolute; left: 20px; bottom: 20px; font-size: 40px; cursor: pointer; z-index: 110; filter: invert(1); }
        #notes-panel {
            display: none; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 80%; max-width: 400px; background: #000; border: 3px solid red; padding: 20px; z-index: 120;
        }

        #crosshair { position: absolute; top: 50%; left: 50%; width: 10px; height: 10px; border: 1px solid red; transform: translate(-50%, -50%); pointer-events: none; display: none; z-index: 45; }
    </style>
</head>
<body>

    <div id="glitch-overlay"></div>
    <div id="ui-overlay">
        <div id="logo">HORROR MINI<br><span style="font-size:16px; color:white;">SİSTEM KRİTİK: ERROR 1</span></div>
        <button class="menu-btn" onclick="startGame()">VERİYİ KURTAR</button>
        <div id="notes-icon" onclick="toggleNotes()">📝</div>
    </div>

    <div id="notes-panel">
        <button onclick="toggleNotes()" style="float:right; background:red; border:none; color:white; cursor:pointer;">X</button>
        <h3 style="color:red;">FARMANT STUDIOS - LOG 0.04</h3>
        <p style="font-size:14px;">
            <span style="color:red; font-weight:bold;">(-) HUKA GERİ DÖNDÜ!</span><br>
            <span style="color:white;">(-) SİL SİL DELETE DELETE</span><br>
            <span style="color:red;">(-) SYSTEM FAILURE IMMINENT</span>
        </p>
    </div>

    <div id="crosshair"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script>
        let scene, camera, renderer, stalker, audioCtx, gainNode;
        let isGameStarted = false, keys = { w: false, a: false, s: false, d: false };
        let velocity = new THREE.Vector3(), chunks = {}, trees = [];
        const CHUNK_SIZE = 8, RENDER_DISTANCE = 2; // FPS İÇİN DÜŞÜK TUTULDU

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0xbbbbbb);
            scene.fog = new THREE.Fog(0xbbbbbb, 1, 20);

            camera = new THREE.PerspectiveCamera(70, window.innerWidth/window.innerHeight, 0.1, 100);
            camera.rotation.order = 'YXZ';

            renderer = new THREE.WebGLRenderer({ antialias: false });
            renderer.setPixelRatio(0.65); // ÇÖZÜNÜRLÜK DÜŞÜRÜLDÜ (FPS COŞAR)
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            scene.add(new THREE.AmbientLight(0xffffff, 0.7));
            camera.position.set(0, 15, 0);
            
            spawnStalker();
            setupControls();
            animate();
        }

        function setupAudio() {
            try {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                const buffer = audioCtx.createBuffer(1, audioCtx.sampleRate * 2, audioCtx.sampleRate);
                const data = buffer.getChannelData(0);
                for (let i = 0; i < data.length; i++) data[i] = Math.random() * 2 - 1;
                const source = audioCtx.createBufferSource();
                source.buffer = buffer; source.loop = true;
                gainNode = audioCtx.createGain();
                gainNode.gain.value = 0.05;
                source.connect(gainNode); gainNode.connect(audioCtx.destination);
                source.start();
            } catch(e) { console.log("Ses başlatılamadı"); }
        }

        function spawnGlitchText() {
            if(!isGameStarted) return;
            const msgs = ["ERROR", "HUKA", "DELETE", "422"];
            const div = document.createElement('div');
            div.className = 'glitch-text';
            div.innerText = msgs[Math.floor(Math.random()*msgs.length)];
            div.style.left = Math.random()*90+"%"; div.style.top = Math.random()*90+"%";
            document.getElementById('glitch-overlay').appendChild(div);
            setTimeout(() => div.remove(), 400);
        }

        function createChunk(cx, cz) {
            const group = new THREE.Group();
            const geo = new THREE.BoxGeometry(1,1,1);
            const mat = new THREE.MeshLambertMaterial({color: 0x333333});
            for (let x = 0; x < CHUNK_SIZE; x++) {
                for (let z = 0; z < CHUNK_SIZE; z++) {
                    const wx = cx * CHUNK_SIZE + x, wz = cz * CHUNK_SIZE + z;
                    let h = Math.floor(Math.sin(wx * 0.2) * 2 + 5);
                    const b = new THREE.Mesh(geo, mat);
                    b.position.set(wx, h, wz);
                    group.add(b);
                    if(Math.random() < 0.02) {
                        const log = new THREE.Mesh(geo, new THREE.MeshBasicMaterial({color:0}));
                        log.position.set(wx, h+1, wz); group.add(log);
                        trees.push({obj: log, start: Date.now()});
                    }
                }
            }
            scene.add(group); chunks[`${cx},${cz}`] = group;
        }

        function spawnStalker() {
            if(!stalker) { stalker = new THREE.Mesh(new THREE.BoxGeometry(0.6, 2.2, 0.6), new THREE.MeshBasicMaterial({color:0})); scene.add(stalker); }
            stalker.position.set(camera.position.x + 12, camera.position.y, camera.position.z + 12);
        }

        function setupControls() {
            window.onkeydown = (e) => keys[e.key.toLowerCase()] = true;
            window.onkeyup = (e) => keys[e.key.toLowerCase()] = false;
            document.onmousemove = (e) => {
                if (document.pointerLockElement === document.body) {
                    camera.rotation.y -= e.movementX * 0.003;
                    camera.rotation.x -= e.movementY * 0.003;
                    camera.rotation.x = Math.max(-1.5, Math.min(1.5, camera.rotation.x));
                }
            };
        }

        function toggleNotes() { const p = document.getElementById('notes-panel'); p.style.display = p.style.display === 'block' ? 'none' : 'block'; }

        function startGame() {
            isGameStarted = true;
            setupAudio();
            document.getElementById('ui-overlay').style.display = 'none';
            document.getElementById('glitch-overlay').style.display = 'block';
            document.getElementById('crosshair').style.display = 'block';
            document.body.requestPointerLock();
            setInterval(spawnGlitchText, 800);
        }

        function animate() {
            requestAnimationFrame(animate);
            if(isGameStarted) {
                if(keys.w) camera.translateZ(-0.2); if(keys.s) camera.translateZ(0.2);
                if(keys.a) camera.translateX(-0.2); if(keys.d) camera.translateX(0.2);
                
                let px = Math.floor(camera.position.x/CHUNK_SIZE), pz = Math.floor(camera.position.z/CHUNK_SIZE);
                for(let x=px-RENDER_DISTANCE; x<=px+RENDER_DISTANCE; x++) {
                    for(let z=pz-RENDER_DISTANCE; z<=pz+RENDER_DISTANCE; z++) { if(!chunks[`${x},${z}`]) createChunk(x,z); }
                }

                trees.forEach((t, i) => {
                    t.obj.position.x += (Math.random()-0.5)*0.05;
                    if(Date.now() - t.start > 15000) { t.obj.scale.multiplyScalar(0.95); }
                });

                stalker.lookAt(camera.position);
                if(Math.random() < 0.005) spawnStalker();

                const ray = new THREE.Raycaster(camera.position, new THREE.Vector3(0,-1,0));
                const hits = ray.intersectObjects(scene.children, true).find(h => h.object !== stalker);
                if(hits && hits.distance < 1.8) { velocity.y = 0; camera.position.y = hits.point.y + 1.8; }
                else { velocity.y -= 0.015; camera.position.y += velocity.y; }
            }
            renderer.render(scene, camera);
        }
        init();
    </script>
</body>
</html>
