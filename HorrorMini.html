<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Farmant Voxel - Alpha 0.02 FINAL</title>
    <style>
        body { margin: 0; overflow: hidden; background: #87ceeb; font-family: 'Courier New', monospace; user-select: none; }
        canvas { display: block; }
        #hud { position: fixed; bottom: 10px; left: 50%; transform: translateX(-50%); display: flex; flex-direction: column; align-items: center; pointer-events: none; z-index: 10; }
        .bar { display: flex; gap: 2px; font-size: 20px; text-shadow: 2px 2px #000; color: #ff2e2e; }
        #hotbar { display: flex; gap: 4px; background: rgba(0,0,0,0.8); padding: 8px; border: 2px solid #333; border-radius: 4px; }
        .slot { width: 40px; height: 48px; border: 1px solid #555; background: rgba(255,255,255,0.05); color: #fff; font-size: 8px; display: flex; align-items: center; justify-content: center; position: relative; }
        .slot.sel { border: 2px solid #bc13fe; box-shadow: 0 0 10px #bc13fe; }
        #blood { position: fixed; inset: 0; background: radial-gradient(circle, transparent 20%, rgba(150,0,0,0.8) 100%); display: none; pointer-events: none; z-index: 1000; }
        #menu { position: fixed; inset: 0; background: #000; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 10000; }
        .btn { background: #bc13fe; color: white; border: none; padding: 15px 50px; font-size: 24px; cursor: pointer; border-radius: 5px; }
    </style>
</head>
<body>
    <div id="blood"></div>
    <div id="menu">
        <h1 style="color:#bc13fe; font-size: 60px;">FARMANT</h1>
        <p style="color:#444; margin-bottom:20px;">Alpha 0.02 - FINAL BUILD</p>
        <button class="btn" onclick="start()">DÜNYAYA GİR</button>
        <p style="color:#666; margin-top:20px; font-size:12px;">ESC: ACİL ÇIKIŞ | Ü: BLOK KOY | 20sn Ghost</p>
    </div>

    <div id="hud">
        <div class="bar">❤❤❤❤❤❤❤❤❤❤</div>
        <div id="hotbar">
            <div class="slot sel">Toprak</div><div class="slot">Odun</div><div class="slot">Tahta</div><div class="slot">Et</div><div class="slot">Gizem</div>
            <div class="slot">..</div><div class="slot">..</div><div class="slot">..</div><div class="slot">..</div><div class="slot">..</div>
        </div>
    </div>

    <script type="module">
        import * as THREE from 'https://unpkg.com/three@0.160.0/build/three.module.js';

        let scene, camera, renderer, ghost, timer = 0, isLive = false, isHorror = false;
        let vVel = 0; const grav = 0.0075, jump = 0.15, chunkSize = 16, dDist = 2;
        const blocks = [], mobs = [], keys = {}, world = {};

        window.start = () => { document.getElementById('menu').style.display='none'; document.body.requestPointerLock(); isLive=true; init(); };

        function init() {
            scene = new THREE.Scene(); scene.background = new THREE.Color(0x87ceeb);
            scene.fog = new THREE.Fog(0x87ceeb, 10, 50);
            camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
            camera.position.set(0, 20, 0);
            renderer = new THREE.WebGLRenderer({ antialias: false, powerPreference: "high-performance" });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);
            scene.add(new THREE.HemisphereLight(0xffffff, 0x444444, 1.4));
            loop();
        }

        function buildChunk(cx, cz) {
            const id = `${cx},${cz}`; if(world[id]) return;
            const matG = new THREE.MeshLambertMaterial({color: 0x2ecc71});
            const matS = new THREE.MeshLambertMaterial({color: 0x3498db}); // Su
            for(let x=0; x<chunkSize; x++) {
                for(let z=0; z<chunkSize; z++) {
                    const wx = cx*chunkSize+x, wz = cz*chunkSize+z;
                    // DAĞLAR VE DENİZLER (Gelişmiş Gürültü)
                    let h = Math.floor(Math.sin(wx*0.15)*Math.cos(wz*0.15)*6 + Math.sin(wx*0.05)*4);
                    const b = new THREE.Mesh(new THREE.BoxGeometry(1,1,1), h < -2 ? matS : matG);
                    b.position.set(wx, h, wz); scene.add(b); blocks.push(b);
                }
            }
            world[id] = true;
            if(Math.random() > 0.8) spawnAnimal(cx*chunkSize+8, 10, cz*chunkSize+8);
        }

        function spawnAnimal(x, y, z) {
            const m = new THREE.Group();
            const mat = new THREE.MeshLambertMaterial({color: 0x5d4037});
            const body = new THREE.Mesh(new THREE.BoxGeometry(0.8, 0.7, 1.2), mat);
            const head = new THREE.Mesh(new THREE.BoxGeometry(0.5, 0.5, 0.5), mat);
            head.position.set(0, 0.4, 0.6); m.add(body, head);
            m.position.set(x, y, z); scene.add(m); mobs.push(m);
        }

        function loop() {
            requestAnimationFrame(loop); if(!isLive) return; timer++;

            // GHOST (20. Saniye)
            if(timer === 1200 && !ghost) {
                ghost = new THREE.Mesh(new THREE.BoxGeometry(0.6, 1.8, 0.2), new THREE.MeshBasicMaterial({color:0xffffff}));
                ghost.position.set(camera.position.x+15, 5, camera.position.z-15); scene.add(ghost);
            }

            // FİZİK & HİTBOX
            vVel -= grav; camera.position.y += vVel;
            const ray = new THREE.Raycaster(camera.position, new THREE.Vector3(0,-1,0));
            const intersect = ray.intersectObjects(blocks);
            if(intersect.length > 0 && intersect[0].distance < 1.7) {
                camera.position.y = intersect[0].point.y + 1.7; vVel = 0;
                if(keys['Space']) vVel = jump;
            }

            // SONSUZ DÜNYA ÜRETİMİ
            const ccx = Math.floor(camera.position.x/chunkSize), ccz = Math.floor(camera.position.z/chunkSize);
            for(let i=-dDist; i<=dDist; i++) for(let j=-dDist; j<=dDist; j++) buildChunk(ccx+i, ccz+j);

            // GHOST KORKU MEKANİĞİ
            if(ghost) {
                ghost.lookAt(camera.position.x, 2, camera.position.z);
                if(camera.position.distanceTo(ghost.position) < 5 && !isHorror) {
                    isHorror = true; document.getElementById('blood').style.display='block';
                    scene.background.set(0x220000); scene.fog.color.set(0xaa0000);
                    mobs.forEach(m => m.children.forEach(c => c.material.color.set(0xffffff)));
                }
            }

            // HAREKET & HAYVAN HAREKETİ
            const s = isHorror ? 0.08 : 0.16;
            if(keys['KeyW']) camera.translateZ(-s); if(keys['KeyS']) camera.translateZ(s);
            if(keys['KeyA']) camera.translateX(-s); if(keys['KeyD']) camera.translateX(s);
            mobs.forEach(m => { m.position.x += Math.sin(timer*0.02)*0.02; m.lookAt(camera.position.x, m.position.y, camera.position.z); });

            renderer.render(scene, camera);
        }

        window.onkeydown = (e) => { 
            if(e.key === "Escape") window.location.href = "https://google.com"; // PANİK MODU
            keys[e.code] = true; 
        };
        window.onkeyup = (e) => keys[e.code] = false;
        document.addEventListener('mousemove', (e) => {
            if(document.pointerLockElement) {
                camera.rotation.y -= e.movementX * 0.002;
                camera.rotation.x -= e.movementY * 0.002;
                camera.rotation.x = Math.max(-1.5, Math.min(1.5, camera.rotation.x));
            }
        });
    </script>
</body>
</html>
