<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>KNKCIM Horror - Baş Geliştirici Paneli</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; font-family: sans-serif; }
        #debug-ui {
            position: absolute; top: 10px; left: 10px;
            color: #00FF00; font-family: monospace; font-size: 14px;
            background: rgba(0, 0, 0, 0.5); padding: 10px; border-radius: 5px;
            pointer-events: none; /* Tıklamayı engelle */
        }
        #loading-screen {
            position: absolute; width: 100%; height: 100%;
            background: black; color: white; display: flex;
            justify-content: center; align-items: center; z-index: 100;
        }
    </style>
</head>
<body>

<div id="loading-screen"> HORROR YÜKLENİYOR... CHUNKLAR HAZIRLANIYOR...</div>
<div id="debug-ui">
    <div id="fps">FPS: 0</div>
    <div id="xyz">XYZ: 0 / 0 / 0</div>
</div>

<script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js"
        }
    }
</script>

<script type="module">
    import * as THREE from 'three';

    // --- DEĞİŞKENLER ---
    let scene, camera, renderer, clock;
    let player = { height: 1.8, speed: 0.2, vY: 0, gravity: 0.01 };
    let chunks = [];
    const CHUNK_SIZE = 16;
    const RENDER_DISTANCE = 3; // Kaç chunk ötesi çizilecek?

    // --- BAŞLATICI ---
    init();

    function init() {
        // 1. Sahne ve Sis (FPS Dostu Sis)
        scene = new THREE.Scene();
        scene.background = new THREE.Color(0x050505);
        scene.fog = new THREE.FogExp2(0x050505, 0.05); // Uzaktaki bloklar detaylı olmayacak

        // 2. Kamera
        camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(8, 20, 8);

        // 3. Renderer (Görüntüleyici)
        renderer = new THREE.WebGLRenderer({ antialias: false }); // FPS için antialias kapalı
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        clock = new THREE.Clock();

        // 4. Dünya Oluşturma (Chunk Sistemi)
        createWorld();

        // Yükleme ekranını kaldır
        document.getElementById('loading-screen').style.display = 'none';

        animate();
    }

    function createWorld() {
        const geometry = new THREE.BoxGeometry(1, 1, 1);
        const material = new THREE.MeshPhongMaterial({ color: 0x44aa44 }); // Çim rengi
        const stoneMat = new THREE.MeshPhongMaterial({ color: 0x888888 }); // Taş rengi

        // Işıklandırma
        const light = new THREE.DirectionalLight(0xffffff, 1);
        light.position.set(10, 20, 10);
        scene.add(light);
        scene.add(new THREE.AmbientLight(0x404040));

        // CHUNK DÖNGÜSÜ (Dağlar ve Ovalar)
        for (let x = 0; x < CHUNK_SIZE; x++) {
            for (let z = 0; z < CHUNK_SIZE; z++) {
                // Perlin benzeri yükselti (Sin/Cos ile)
                let height = Math.floor(Math.sin(x * 0.2) * 3 + Math.cos(z * 0.2) * 2 + 10);
                
                for (let y = 0; y < height; y++) {
                    const block = new THREE.Mesh(geometry, y > height - 2 ? material : stoneMat);
                    block.position.set(x, y, z);
                    scene.add(block);
                }

                // 5 BLOK YÜKSEKLİĞİNDE AĞAÇ (Rastgele)
                if (x === 5 && z === 5) {
                    spawnTree(x, height, z);
                }
            }
        }
    }

    function spawnTree(x, y, z) {
        const logMat = new THREE.MeshPhongMaterial({ color: 0x5C4033 });
        const leafMat = new THREE.MeshPhongMaterial({ color: 0x228B22 });
        const geom = new THREE.BoxGeometry(1, 1, 1);

        for (let i = 0; i < 5; i++) {
            const log = new THREE.Mesh(geom, logMat);
            log.position.set(x, y + i, z);
            scene.add(log);
        }
        // Yaprak
        const leaf = new THREE.Mesh(geom, leafMat);
        leaf.position.set(x, y + 5, z);
        leaf.scale.set(3, 2, 3);
        scene.add(leaf);
    }

    // --- OYUN DÖNGÜSÜ ---
    function animate() {
        requestAnimationFrame(animate);

        // Fizik: Yer Çekimi
        player.vY -= player.gravity;
        camera.position.y += player.vY;

        // Basit Zemin Çarpışması
        if (camera.position.y < 12) {
            camera.position.y = 12;
            player.vY = 0;
        }

        // Debug UI Güncelleme
        updateDebugUI();

        renderer.render(scene, camera);
    }

    function updateDebugUI() {
        document.getElementById('xyz').innerText = 
            `XYZ: ${camera.position.x.toFixed(2)} / ${camera.position.y.toFixed(2)} / ${camera.position.z.toFixed(2)}`;
        
        // FPS Hesaplama (Basit)
        const fps = Math.round(1 / clock.getDelta());
        if(fps !== Infinity) document.getElementById('fps').innerText = `FPS: ${fps}`;
    }

    // Pencere Boyutu Değişirse
    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });

</script>
</body>
</html>
