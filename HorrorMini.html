<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Farmant Voxel - Alpha 0.02</title>
    <style>
        body { margin: 0; overflow: hidden; background: #87ceeb; font-family: 'Segoe UI', sans-serif; user-select: none; }
        canvas { display: block; }
        
        /* HUD - Sürüm Adı 0.02 Olarak Güncellendi */
        #hud { position: fixed; bottom: 12px; left: 50%; transform: translateX(-50%); display: flex; flex-direction: column; align-items: center; gap: 4px; pointer-events: none; z-index: 10; }
        .bar { display: flex; gap: 2px; font-size: 20px; text-shadow: 1px 1px #000; }
        #hotbar { display: flex; gap: 4px; background: rgba(0,0,0,0.8); padding: 6px; border: 2px solid #444; border-radius: 4px; }
        .slot { width: 40px; height: 44px; border: 1px solid #555; background: rgba(255,255,255,0.05); display: flex; align-items: center; justify-content: center; font-size: 8px; color: #eee; position: relative; }
        .slot.selected { border: 2px solid #bc13fe; box-shadow: 0 0 8px #bc13fe; }

        #blood-overlay { position: fixed; inset: 0; background: radial-gradient(circle, transparent 20%, rgba(200,0,0,0.7) 100%); display: none; pointer-events: none; z-index: 1000; }
        #start-menu { position: fixed; inset: 0; background: #000; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 20000; }
        .btn { background: #bc13fe; color: white; border: none; padding: 15px 45px; font-size: 22px; cursor: pointer; border-radius: 4px; box-shadow: 0 0 20px #bc13fe; }
    </style>
</head>
<body>

    <div id="blood-overlay"></div>
    <div id="start-menu">
        <h1 style="color:#bc13fe; font-size: 55px; letter-spacing: 8px; margin:0;">FARMANT</h1>
        <p style="color:#555; margin-bottom:30px;">Alpha 0.02 - RESMİ SÜRÜM</p>
        <button class="btn" onclick="startGame()">OYUNA BAŞLA</button>
        <p style="color:#444; margin-top:20px; font-size:11px;">ESC: ACİL ÇIKIŞ | Ü: BLOK KOY | 20sn Sonra Ghost Gelir</p>
    </div>

    <div id="hud">
        <div class="bar" style="color:#ff2e2e;">❤❤❤❤❤❤❤❤❤❤</div>
        <div class="bar" style="color:#ff9f43;">🍖🍖🍖🍖🍖🍖🍖🍖🍖🍖</div>
        <div id="hotbar">
            <div class="slot selected">Toprak</div><div class="slot">Odun</div>
            <div class="slot">Maden</div><div class="slot">Tahta</div>
            <div class="slot">Et</div><div class="slot">Tabela</div>
            <div class="slot">..</div><div class="slot">..</div><div class="slot">..</div><div class="slot">..</div>
        </div>
    </div>

    <script type="module">
        import * as THREE from 'https://unpkg.com/three@0.160.0/build/three.module.js';

        let scene, camera, renderer, ghost, timer = 0, isLive = false, isHorror = false;
        let vY = 0;
        const gravity = 0.0075, jump = 0.15, chunkSize = 16, dDist = 2;
        const blocks = [], mobs = [], keys = {}, worldChunks = {};

        window.startGame = () => {
            document.getElementById('start-menu').style.display = 'none';
            document.body.requestPointerLock();
            isLive = true;
            init();
        };

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x87ceeb);
            scene.fog = new THREE.Fog(0x87ceeb, 15, 50);

            camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
            camera.position.set(0, 15, 0);

            renderer = new THREE.WebGLRenderer({ antialias: false, powerPreference: "high-performance" });
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            const light = new THREE.HemisphereLight(0xffffff, 0x444444, 1.3);
            scene.add(light);

            loop();
        }

        // ESC İLE GOOGLE'A KAÇIŞ
        document.addEventListener('keydown', (e) => {
            if (e.key === "Escape") {
                window.location.href = "https://www.google.com";
            }
            keys[e.code] = true;
        });

        function createChunk(cx, cz) {
            const id = `${cx},${cz}`;
            if(worldChunks[id]) return;
            const sX = cx * chunkSize, sZ = cz * chunkSize;
            const gMat = new THREE.MeshLambertMaterial({color: 0x2ecc71});
            const sMat = new THREE.MeshLambertMaterial({color: 0x666666});

            for(let x=0; x<chunkSize; x++) {
                for(let z=0; z<chunkSize; z++) {
                    const wx = sX + x, wz = sZ + z;
                    let h = Math.floor(Math.sin(wx*0.18) * Math.cos(wz*0.18) * 4);
                    
                    // 2x2 Gizemli Tüneller
                    if(Math.abs(wx) === 12 && Math.abs(wz) === 12) h -= 5;

                    const b = new THREE.Mesh(new THREE.BoxGeometry(1,1,1), h < -1 ? sMat : gMat);
                    b.position.set(wx, h, wz);
                    scene.add(b);
                    blocks.push(b);
                }
            }
            worldChunks[id] = true;
            if(Math.random() > 0.85) spawnAnimal(sX+8, 6, sZ+8);
        }

        function spawnAnimal(x, y, z) {
            const mob = new THREE.Group();
            const mat = new THREE.MeshLambertMaterial({color: 0x5d4037});
            const body = new THREE.Mesh(new THREE.BoxGeometry(0.8, 0.7, 1.1), mat);
            const head = new THREE.Mesh(new THREE.BoxGeometry(0.4, 0.4, 0.4), mat);
            head.position.set(0, 0.4, 0.6);
            mob.add(body, head);
            mob.position.set(x, y, z);
            scene.add(mob);
            mobs.push(mob);
        }

        function spawnGhost() {
            ghost = new THREE.Group();
            const gBody = new THREE.Mesh(new THREE.BoxGeometry(0.6, 1.6, 0.3), new THREE.MeshBasicMaterial({color: 0xffffff}));
            const gHead = new THREE.Mesh(new THREE.BoxGeometry(0.4, 0.4, 0.4), new THREE.MeshBasicMaterial({color: 0xffffff}));
            gHead.position.y = 0.9;
            ghost.add(gBody, gHead);
            ghost.position.set(camera.position.x + 15, 2, camera.position.z - 15);
            scene.add(ghost);
        }

        function triggerHorror() {
            isHorror = true;
            document.getElementById('blood-overlay').style.display = 'block';
            scene.fog.color.set(0x220000);
            scene.background.set(0x0a0000);
            mobs.forEach(m => m.children.forEach(c => c.material.color.set(0xffffff)));
        }

        function loop() {
            requestAnimationFrame(loop);
            if(!isLive) return;
            timer++;

            // 20. SANİYE GHOST (1200 frame / 60fps = 20sn)
            if(timer === 1200 && !ghost) spawnGhost();

            // YERÇEKİMİ
            vY -= gravity;
            camera.position.y += vY;
            const ray = new THREE.Raycaster(camera.position, new THREE.Vector3(0,-1,0));
            const hit = ray.intersectObjects(blocks);
            if(hit.length > 0 && hit[0].distance < 1.75) {
                camera.position.y = hit[0].point.y + 1.75;
                vY = 0;
                if(keys['Space']) vY = jump;
            }

            // CHUNKS
            const cCX = Math.floor(camera.position.x / chunkSize);
            const cCZ = Math.floor(camera.position.z / chunkSize);
            for(let i=-dDist; i<=dDist; i++) {
                for(let j=-dDist; j<=dDist; j++) createChunk(cCX+i, cCZ+j);
            }

            // GHOST
            if(ghost) {
                ghost.lookAt(camera.position.x, 2, camera.position.z);
                if(camera.position.distanceTo(ghost.position) < 5 && !isHorror) triggerHorror();
            }

            // Ü TUŞU - BLOK KOYMA
            if(keys['KeyU'] || keys['BracketRight']) {
                const bRay = new THREE.Raycaster();
                bRay.setFromCamera(new THREE.Vector2(0,0), camera);
                const bHit = bRay.intersectObjects(blocks);
                if(bHit.length > 0 && bHit[0].distance < 4.5) {
                    const p = bHit[0].object.position.clone().add(bHit[0].face.normal);
                    const nb = new THREE.Mesh(new THREE.BoxGeometry(1,1,1), new THREE.MeshLambertMaterial({color: 0x8b4513}));
                    nb.position.copy(p);
                    scene.add(nb); blocks.push(nb);
                    keys['KeyU'] = false; 
                }
            }

            const speed = isHorror ? 0.07 : 0.15;
            if(keys['KeyW']) camera.translateZ(-speed);
            if(keys['KeyS']) camera.translateZ(speed);
            if(keys['KeyA']) camera.translateX(-speed);
            if(keys['KeyD']) camera.translateX(speed);

            renderer.render(scene, camera);
        }

        window.onkeyup = (e) => keys[e.code] = false;
        document.addEventListener('mousemove', (e) => {
            if(document.pointerLockElement) {
                camera.rotation.y -= e.movementX * 0.0022;
                camera.rotation.x -= e.movementY * 0.0022;
                camera.rotation.x = Math.max(-1.5, Math.min(1.5, camera.rotation.x));
            }
        });
    </script>
</body>
</html>
