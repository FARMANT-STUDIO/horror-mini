<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>FARMANT STUDIOS - HORROR MINI</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #050505; }
        #ui { 
            position: absolute; top: 20px; left: 20px; 
            color: #00ff00; font-family: 'Courier New', monospace; 
            text-shadow: 2px 2px #000; pointer-events: none;
            z-index: 10;
        }
        #crosshair { 
            position: absolute; top: 50%; left: 50%; 
            width: 20px; height: 2px; background: rgba(255,255,255,0.5);
            transform: translate(-50%, -50%);
        }
        #crosshair::after {
            content: ''; position: absolute; top: -9px; left: 9px;
            width: 2px; height: 20px; background: rgba(255,255,255,0.5);
        }
    </style>
</head>
<body>
    <div id="ui">
        <span style="font-size: 1.2em; color: #ff0000; font-weight: bold;">FARMANT STUDIOS</span><br>
        <span style="font-size: 1.5em; letter-spacing: 2px;">HORROR MINI - BILGISAYAR EDITION</span><br>
        <hr style="border: 1px solid #333;">
        KONUM: <span id="pos">0, 0, 0</span><br>
        CHUNKS: <span id="chunkCount">0</span><br>
        KONTROLLER: [W,A,S,D] Hareket | [K] Blok Koy | [SOL TIK] Kır
    </div>
    <div id="crosshair"></div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { PointerLockControls } from 'three/addons/controls/PointerLockControls.js';

        // --- GLOBAL AYARLAR ---
        const CHUNK_SIZE = 16;
        const DEEP_LAYERS = 42;
        const VIEW_DIST = 3; 

        const scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0x001100, 0.02); 

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 500);
        const renderer = new THREE.WebGLRenderer({ antialias: false });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio * 0.7); 
        document.body.appendChild(renderer.domElement);

        const controls = new PointerLockControls(camera, document.body);
        document.body.addEventListener('click', () => controls.lock());

        // Materyaller (InstancedMesh için ortak kullanılır)
        const mats = {
            grass: new THREE.MeshLambertMaterial({ color: 0x3d6117 }),
            dirt: new THREE.MeshLambertMaterial({ color: 0x4d3319 }),
            stone: new THREE.MeshLambertMaterial({ color: 0x333333 }),
            stalker: new THREE.MeshBasicMaterial({ color: 0xffffff })
        };
        const boxGeo = new THREE.BoxGeometry(1, 1, 1);

        const chunks = new Map();

        // --- CHUNK SINIFI (INSTANCED MESH KULLANIMI) ---
        class Chunk {
            constructor(cx, cz) {
                this.cx = cx;
                this.cz = cz;
                this.group = new THREE.Group();
                
                // Her chunk için 3 ana katman (Yüzey, Toprak, Taş)
                const countPerLayer = CHUNK_SIZE * CHUNK_SIZE;
                this.iGrass = new THREE.InstancedMesh(boxGeo, mats.grass, countPerLayer);
                this.iDirt = new THREE.InstancedMesh(boxGeo, mats.dirt, countPerLayer * 3);
                this.iStone = new THREE.InstancedMesh(boxGeo, mats.stone, countPerLayer * DEEP_LAYERS);

                this.generate();
            }

            generate() {
                const dummy = new THREE.Object3D();
                let gIdx = 0, dIdx = 0, sIdx = 0;

                for (let x = 0; x < CHUNK_SIZE; x++) {
                    for (let z = 0; z < CHUNK_SIZE; z++) {
                        const worldX = this.cx * CHUNK_SIZE + x;
                        const worldZ = this.cz * CHUNK_SIZE + z;
                        const surfaceY = Math.floor(Math.sin(worldX * 0.1) * 2 + Math.cos(worldZ * 0.1) * 2 + 10);

                        // 1. Çimen (Yüzey)
                        dummy.position.set(worldX, surfaceY, worldZ);
                        dummy.updateMatrix();
                        this.iGrass.setMatrixAt(gIdx++, dummy.matrix);

                        // 2. Alt Katmanlar (42 Kat)
                        for (let y = 1; y <= DEEP_LAYERS; y++) {
                            const depthY = surfaceY - y;
                            dummy.position.set(worldX, depthY, worldZ);
                            dummy.updateMatrix();

                            if (y < 4) {
                                this.iDirt.setMatrixAt(dIdx++, dummy.matrix);
                            } else {
                                this.iStone.setMatrixAt(sIdx++, dummy.matrix);
                            }
                        }
                    }
                }
                this.iGrass.instanceMatrix.needsUpdate = true;
                this.iDirt.instanceMatrix.needsUpdate = true;
                this.iStone.instanceMatrix.needsUpdate = true;

                this.group.add(this.iGrass, this.iDirt, this.iStone);
            }
        }

        // --- HAREKET SİSTEMİ ---
        const keys = {};
        window.addEventListener('keydown', (e) => keys[e.code] = true);
        window.addEventListener('keyup', (e) => keys[e.code] = false);

        function updateMovement() {
            const speed = 0.15;
            if (keys['KeyW']) controls.moveForward(speed);
            if (keys['KeyS']) controls.moveForward(-speed);
            if (keys['KeyA']) controls.moveRight(-speed);
            if (keys['KeyD']) controls.moveRight(speed);
        }

        // --- BLOK KOYMA (K) VE KIRMA (MOUSE) ---
        window.addEventListener('keydown', (e) => {
            if (e.code === 'KeyK' && controls.isLocked) {
                raycastAction(true); // Ekle
            }
        });
        window.addEventListener('mousedown', (e) => {
            if (e.button === 0 && controls.isLocked) {
                raycastAction(false); // Sil
            }
        });

        function raycastAction(isAdding) {
            const ray = new THREE.Raycaster();
            ray.setFromCamera(new THREE.Vector2(0,0), camera);
            // InstancedMesh'ler group içinde olduğu için recursive aramalıyız
            const hits = ray.intersectObjects(scene.children, true);
            
            if (hits.length > 0) {
                const hit = hits[0];
                if (hit.object === stalker) return;

                if (isAdding) {
                    const pos = new THREE.Vector3().copy(hit.point).add(hit.face.normal.multiplyScalar(0.5)).floor();
                    const b = new THREE.Mesh(boxGeo, mats.grass); // Eklenenler normal mesh olabilir (sayısı az olduğu için)
                    b.position.set(pos.x + 0.5, pos.y + 0.5, pos.z + 0.5);
                    scene.add(b);
                } else {
                    // InstancedMesh kırma zordur, bu yüzden şimdilik objeyi gizliyoruz veya mesh ise siliyoruz
                    if (hit.object instanceof THREE.InstancedMesh) {
                        // Basit prototipte instanced blok kırma yerine mesh silmeyi simüle ediyoruz
                        const instanceId = hit.instanceId;
                        const tempMatrix = new THREE.Matrix4();
                        tempMatrix.makeScale(0,0,0); // Bloğu görünmez yap
                        hit.object.setMatrixAt(instanceId, tempMatrix);
                        hit.object.instanceMatrix.needsUpdate = true;
                    } else {
                        scene.remove(hit.object);
                    }
                }
            }
        }

        // --- STALKER ---
        const stalker = new THREE.Mesh(new THREE.BoxGeometry(0.8, 1.9, 0.8), mats.stalker);
        scene.add(stalker);
        stalker.position.set(0, -100, 0);

        function handleStalker() {
            const dist = camera.position.distanceTo(stalker.position);
            if (dist > 50) {
                const angle = Math.random() * Math.PI * 2;
                stalker.position.set(camera.position.x + Math.cos(angle)*25, 12, camera.position.z + Math.sin(angle)*25);
            }
            const camDir = new THREE.Vector3();
            camera.getWorldDirection(camDir);
            const toStalker = new THREE.Vector3().subVectors(stalker.position, camera.position).normalize();
            if (camDir.dot(toStalker) > 0.8) stalker.position.y = -100;
        }

        // --- DINAMIK CHUNK ---
        function updateChunks() {
            const curCX = Math.floor(camera.position.x / CHUNK_SIZE);
            const curCZ = Math.floor(camera.position.z / CHUNK_SIZE);

            for (let x = curCX - VIEW_DIST; x <= curCX + VIEW_DIST; x++) {
                for (let z = curCZ - VIEW_DIST; z <= curCZ + VIEW_DIST; z++) {
                    const key = `${x},${z}`;
                    if (!chunks.has(key)) {
                        const c = new Chunk(x, z);
                        chunks.set(key, c);
                        scene.add(c.group);
                    }
                }
            }
            document.getElementById('chunkCount').innerText = chunks.size;
        }

        // --- DÖNGÜ ---
        camera.position.set(5, 15, 5);
        const ambient = new THREE.AmbientLight(0xffffff, 0.4);
        scene.add(ambient);
        const pLight = new THREE.PointLight(0xffffff, 0.7, 30);
        scene.add(pLight);

        function animate() {
            requestAnimationFrame(animate);
            if (controls.isLocked) {
                updateMovement();
                updateChunks();
                handleStalker();
                pLight.position.copy(camera.position);
                document.getElementById('pos').innerText = 
                    `${Math.round(camera.position.x)}, ${Math.round(camera.position.y)}, ${Math.round(camera.position.z)}`;
            }
            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
