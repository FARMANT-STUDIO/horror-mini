<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Horror Mini v0.03</title>

<style>
body { margin:0; overflow:hidden; background:#000; }

#ui{
  position:absolute;
  top:10px;
  left:10px;
  color:#0f0;
  font-family:monospace;
  z-index:10;
}

#crosshair{
  position:absolute;
  top:50%;
  left:50%;
  width:6px;
  height:6px;
  background:white;
  transform:translate(-50%,-50%);
}
</style>
</head>

<body>

<div id="ui">HORROR MINI v0.03 - SEA UPDATE</div>
<div id="crosshair"></div>

<script type="module">
import * as THREE from "https://unpkg.com/three@0.160.0/build/three.module.js";
import { PointerLockControls } from "https://unpkg.com/three@0.160.0/examples/jsm/controls/PointerLockControls.js";
import { SimplexNoise } from "https://cdn.skypack.dev/simplex-noise";


// ================= CORE =================
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0a0a0a);

const camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.1, 1000);

const renderer = new THREE.WebGLRenderer({antialias:false});
renderer.setSize(innerWidth, innerHeight);
document.body.appendChild(renderer.domElement);

const controls = new PointerLockControls(camera, document.body);
document.body.addEventListener("click",()=>controls.lock());

scene.add(new THREE.AmbientLight(0xffffff,0.9));

const noise = new SimplexNoise();


// ================= TEXTURE =================
const tex = new THREE.TextureLoader().load(
  "https://i.imgur.com/8QfQp0X.png"
);
tex.magFilter = THREE.NearestFilter;
tex.minFilter = THREE.NearestFilter;

const mat = new THREE.MeshLambertMaterial({ map: tex });
const geo = new THREE.BoxGeometry(1,1,1);


// ================= WORLD =================
const blocks = [];
const world = new Map();

const key = (x,y,z)=>`${x},${y},${z}`;


// ================= SEA LEVEL =================
const SEA = 18;


// ================= BLOCK =================
function addBlock(x,y,z){
  const m = new THREE.Mesh(geo,mat);
  m.position.set(x,y,z);
  scene.add(m);

  blocks.push(m);
  world.set(key(x,y,z),true);
}


// ================= WORLD GEN (SEA ADDED) =================
function gen(){

  for(let x=-20;x<20;x++){
    for(let z=-20;z<20;z++){

      const h =
        noise.noise2D(x*0.05,z*0.05)*18 +
        noise.noise2D(x*0.02,z*0.02)*10 +
        20;

      for(let y=0;y<h;y++){
        addBlock(x,y,z);
      }

      // 🌊 DENİZ (VOXEL WATER)
      if(h < SEA){
        for(let y=h;y<SEA;y++){
          const water = new THREE.Mesh(
            geo,
            new THREE.MeshBasicMaterial({color:0x0044ff,transparent:true,opacity:0.5})
          );
          water.position.set(x,y,z);
          scene.add(water);

          blocks.push(water);
          world.set(key(x,y,z),true);
        }
      }
    }
  }
}

gen();


// ================= HITBOX SYSTEM =================
function solid(x,y,z){
  return world.has(key(
    Math.floor(x),
    Math.floor(y),
    Math.floor(z)
  ));
}


// ================= PLAYER PHYSICS =================
const player = {
  vel: new THREE.Vector3(),
  dir: new THREE.Vector3(),
  speed: 0.15,
  canJump:false
};

camera.position.set(0,30,0);


// ================= INPUT =================
const keys = {};

document.addEventListener("keydown",e=>{
  keys[e.key.toLowerCase()] = true;
});

document.addEventListener("keyup",e=>{
  keys[e.key.toLowerCase()] = false;
});


// ================= MOVEMENT + COLLISION =================
function move(){

  player.dir.set(0,0,0);

  if(keys["w"]) player.dir.z -= 1;
  if(keys["s"]) player.dir.z += 1;
  if(keys["a"]) player.dir.x -= 1;
  if(keys["d"]) player.dir.x += 1;

  player.dir.normalize();

  const nx = camera.position.x + player.dir.x * player.speed;
  const nz = camera.position.z + player.dir.z * player.speed;

  // 🧱 HITBOX (X-Z)
  if(!solid(nx,camera.position.y,camera.position.z)){
    camera.position.x = nx;
  }

  if(!solid(camera.position.x,camera.position.y,nz)){
    camera.position.z = nz;
  }

  // 🌍 GRAVITY
  player.vel.y -= 0.025;
  camera.position.y += player.vel.y;

  // 🧱 FLOOR HITBOX
  if(solid(camera.position.x,camera.position.y-1,camera.position.z)){
    camera.position.y = Math.floor(camera.position.y)+1;
    player.vel.y = 0;
    player.canJump = true;
  }

  // 🦘 JUMP
  if(keys[" "] && player.canJump){
    player.vel.y = 0.32;
    player.canJump = false;
  }

  // 🌊 WATER FRICTION (basit his)
  if(camera.position.y < SEA){
    player.speed = 0.08;
  }else{
    player.speed = 0.15;
  }
}


// ================= LOOP =================
function animate(){
  requestAnimationFrame(animate);
  move();
  renderer.render(scene,camera);
}

animate();


// ================= RESIZE =================
window.addEventListener("resize",()=>{
  camera.aspect = innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth,innerHeight);
});
</script>

</body>
</html>
