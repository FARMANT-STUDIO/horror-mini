<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>KNKCIM Survival Engine - V4</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #87CEEB; font-family: 'Segoe UI', sans-serif; }
        #ui { position: absolute; top: 15px; left: 15px; background: rgba(0,0,0,0.8); color: #fff; padding: 15px; border-radius: 10px; font-size: 14px; pointer-events: none; border: 1px solid #444; z-index: 10; }
        #inventory { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.8); padding: 10px; border-radius: 5px; color: gold; font-weight: bold; border: 2px solid #555; }
        #crosshair { position: absolute; top: 50%; left: 50%; width: 18px; height: 18px; border: 2px solid white; transform: translate(-50%, -50%); border-radius: 50%; }
        #loading-screen { position: absolute; width: 100%; height: 100%; background: #000; color: #0f0; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 100; transition: opacity 0.5s; }
    </style>
</head>
<body>

<div id="loading-screen">
    <h1>KNKCIM SURVIVAL</h1>
    <div id="status">Dünya Modelleniyor...</div>
</div>

<div id="ui">
    <div id="fps" style="color: #ffcc00;">FPS: 0</div>
    <div id="xyz" style="color: #00ff00;">XYZ: 0 / 100 / 0</div>
    <div id="inv-count" style="color: #ff5555; margin-top: 5px;">ET: 0</div>
</div>

<div id="inventory">ENVANTER: Çiğ Et [ <span id="meat-val">0</span> ]</div>
<div id="crosshair"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x87CEEB);
    scene.fog = new THREE.Fog(0x87CEEB, 10, 100);

    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ antialias: false });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    const blocks = [];
    const animals = [];
    let inventoryMeat = 0;

    const materials = {
        grass: new THREE.MeshLambertMaterial({ color: 0x3d8c40 }),
        dirt: new THREE.MeshLambertMaterial({ color: 0x5c4033 }),
        stone: new THREE.MeshLambertMaterial({ color: 0x777777 }),
        diamond: new THREE.MeshLambertMaterial({ color: 0x00f2ff }),
        gold: new THREE.MeshLambertMaterial({ color: 0xffd700 }),
        meat: new THREE.MeshLambertMaterial({ color: 0xffaaaa }), // Hayvan rengi
        wood: new THREE.MeshLambertMaterial({ color: 0x4a2e13 })
    };

    const geometry = new THREE.BoxGeometry(1, 1, 1);

    // --- DÜNYA OLUŞTURMA (KATMANLI) ---
    function generateWorld() {
        for(let x=-15; x<15; x++) {
            for(let z=-15; z<15; z++) {
                // Kat 100: Çimen
                createBlock(x, 100, z, 'grass');
                
                // 6 Blok Derinliğine Kadar Toprak (99'dan 94'e)
                for(let y=94; y<100; y++) {
                    createBlock(x, y, z, 'dirt');
                }

                // 94'ten aşağısı: Taş ve Maden Boşlukları
                for(let y=85; y<94; y++) {
                    // Mağara Boşluğu Simülasyonu (%15 şansla hava)
                    if(Math.random() > 0.15) {
                        let type = 'stone';
                        const m = Math.random();
                        if(m > 0.99) type = 'diamond';
                        else if(m > 0.97) type = 'gold';
                        createBlock(x, y, z, type);
                    }
                }
            }
        }
        spawnAnimals();
        document.getElementById('loading-screen').style.display = 'none';
    }

    function createBlock(x, y, z, type) {
        const mesh = new THREE.Mesh(geometry, materials[type]);
        mesh.position.set(x, y, z);
        scene.add(mesh);
        blocks.push(mesh);
    }

    // --- HAYVAN SİSTEMİ ---
    function spawnAnimals() {
        for(let i=0; i<5; i++) {
            const animal = new THREE.Mesh(new THREE.BoxGeometry(0.8, 0.6, 1.2), materials.meat);
            animal.position.set(Math.random()*10 - 5, 101, Math.random()*10 - 5);
            animal.userData = { direction: new THREE.Vector3(Math.random()-0.5, 0, Math.random()-0.5).normalize(), timer: 0 };
            scene.add(animal);
            animals.push(animal);
        }
    }

    // --- HAREKET SİSTEMİ (WASD) ---
    const keys = {};
    window.addEventListener('keydown', (e) => keys[e.code] = true);
    window.addEventListener('keyup', (e) => keys[e.code] = false);

    function updateMovement() {
        const speed = 0.15;
        const dir = new THREE.Vector3();
        camera.getWorldDirection(dir);
        dir.y = 0; dir.normalize();
        const side = new THREE.Vector3().crossVectors(camera.up, dir).normalize();

        if (keys['KeyW']) camera.position.addScaledVector(dir, speed);
        if (keys['KeyS']) camera.position.addScaledVector(dir, -speed);
        if (keys['KeyA']) camera.position.addScaledVector(side, speed);
        if (keys['KeyD']) camera.position.addScaledVector(side, -speed);
    }

    // --- ETKİLEŞİM (KAZMA VE AVLANMA) ---
    const raycaster = new THREE.Raycaster();
    window.addEventListener('mousedown', (e) => {
        if(e.button === 0 && document.pointerLockElement) {
            raycaster.setFromCamera(new THREE.Vector2(0,0), camera);
            
            // Hayvan vurma kontrolü
            const animalHit = raycaster.intersectObjects(animals);
            if(animalHit.length > 0) {
                const target = animalHit[0].object;
                inventoryMeat += 1;
                document.getElementById('meat-val').innerText = inventoryMeat;
                document.getElementById('inv-count').innerText = `ET: ${inventoryMeat}`;
                scene.remove(target);
                animals.splice(animals.indexOf(target), 1);
                return;
            }

            // Blok kazma kontrolü
            const blockHit = raycaster.intersectObjects(blocks);
            if(blockHit.length > 0) {
                const target = blockHit[0].object;
                scene.remove(target);
                blocks.splice(blocks.indexOf(target), 1);
            }
        }
    });

    // Bakış ve Kilit
    window.addEventListener('mousemove', (e) => {
        if(document.pointerLockElement) {
            camera.rotation.y -= e.movementX * 0.002;
            camera.rotation.x -= e.movementY * 0.002;
            camera.rotation.x = Math.max(-1.5, Math.min(1.5, camera.rotation.x));
        }
    });
    window.addEventListener('click', () => document.body.requestPointerLock());

    // Işık ve Render
    const sun = new THREE.DirectionalLight(0xffffff, 1.2);
    sun.position.set(10, 50, 10);
    scene.add(sun);
    scene.add(new THREE.AmbientLight(0x606060));
    camera.position.set(0, 102, 5);

    let lastTime = performance.now();
    function animate() {
        requestAnimationFrame(animate);
        const time = performance.now();
        const fps = Math.round(1000 / (time - lastTime));
        lastTime = time;

        updateMovement();

        // Hayvanları Hareket Ettir
        animals.forEach(a => {
            a.position.addScaledVector(a.userData.direction, 0.02);
            a.userData.timer++;
            if(a.userData.timer > 100) {
                a.userData.direction.set(Math.random()-0.5, 0, Math.random()-0.5).normalize();
                a.userData.timer = 0;
            }
        });

        document.getElementById('fps').innerText = `FPS: ${fps}`;
        document.getElementById('xyz').innerText = `XYZ: ${camera.position.x.toFixed(0)} / ${camera.position.y.toFixed(0)} / ${camera.position.z.toFixed(0)}`;
        renderer.render(scene, camera);
    }

    generateWorld();
    animate();
</script>
</body>
</html>
