<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Horror Mini - Alpha Engine</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; font-family: 'Courier New', monospace; }
        #ui-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; background: rgba(0,0,0,0.7); color: white; z-index: 10; }
        .menu-btn { background: #444; border: 2px solid #fff; color: white; padding: 15px 30px; margin: 10px; cursor: pointer; font-size: 1.2rem; min-width: 300px; }
        .menu-btn:hover { background: #666; }
        #crosshair { position: absolute; top: 50%; left: 50%; width: 20px; height: 20px; border: 2px solid white; transform: translate(-50%, -50%); pointer-events: none; z-index: 5; }
        #info { position: absolute; bottom: 10px; left: 10px; color: white; pointer-events: none; }
    </style>
</head>
<body>

<div id="crosshair"></div>
<div id="info">W,A,S,D: Hareket | Sol Tık: Kır | K: Koy | Yerçekimi Aktif</div>

<div id="ui-overlay">
    <h1>HORROR MINI: ALPHA</h1>
    <div id="save-prompt" style="display:none; text-align: center;">
        <p>Kayıtlı bir dünyanız bulunuyor. Geri dönmek ister misiniz?</p>
        <button class="menu-btn" onclick="initGame(true)">EVET (KAYDA DÖN)</button>
        <button class="menu-btn" onclick="showWorldList()">HAYIR (LİSTEYE GİT)</button>
    </div>
    <div id="main-menu">
        <button class="menu-btn" onclick="checkSaveOnStart()">TEK OYUNCULU</button>
        <button class="menu-btn" disabled style="opacity: 0.5;">ÇOK OYUNCULU (YAKINDA)</button>
    </div>
    <div id="world-list" style="display:none;">
        <div id="existing-saves"></div>
        <button class="menu-btn" onclick="initGame(false)" style="background: #2d5a27;">YENİ DÜNYA OLUŞTUR</button>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/gh/mrdoob/three.js@r128/examples/js/controls/PointerLockControls.js"></script>

<script>
// --- KONFİGÜRASYON ---
const WORLD_SIZE = 114; // Yaklaşık 13,000 yüzey bloğu (114x114)
const CHUNK_SIZE = 16;
const RENDER_DISTANCE = 25; 
const BLOCK_TYPES = {
    GRASS: 0, DIRT: 1, STONE: 2, SAND: 3, GRAVEL: 4, 
    COAL: 5, IRON: 6, GOLD: 7, DIAMOND: 8, WOOD: 9, LEAVES: 10
};
const COLORS = [0x55aa33, 0x8b4513, 0x808080, 0xd2b48c, 0x696969, 0x222222, 0xd3d3d3, 0xffd700, 0x00ffff, 0x5d4037, 0x228b22];

let scene, camera, renderer, controls;
let blocks = []; // Dünya verisi
let moveFwd = false, moveBwd = false, moveLft = false, moveRgt = false;
let velocity = new THREE.Vector3();

// --- BAŞLATMA VE MENÜ ---
function checkSaveOnStart() {
    if (localStorage.getItem('horrorMini_save')) {
        document.getElementById('main-menu').style.display = 'none';
        document.getElementById('save-prompt').style.display = 'block';
    } else {
        showWorldList();
    }
}

function showWorldList() {
    document.getElementById('save-prompt').style.display = 'none';
    document.getElementById('main-menu').style.display = 'none';
    document.getElementById('world-list').style.display = 'block';
    const savesDiv = document.getElementById('existing-saves');
    if (localStorage.getItem('horrorMini_save')) {
        savesDiv.innerHTML = `<button class="menu-btn" onclick="initGame(true)">DÜNYA 1 (KAYITLI)</button>`;
    }
}

function initGame(loadSave) {
    document.getElementById('ui-overlay').style.display = 'none';
    
    scene = new THREE.Scene();
    scene.background = new THREE.Color(0x87CEEB);
    scene.fog = new THREE.Fog(0x87CEEB, 20, 100);

    camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(WORLD_SIZE/2, 25, WORLD_SIZE/2);

    renderer = new THREE.WebGLRenderer({ antialias: false });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    controls = new THREE.PointerLockControls(camera, document.body);
    document.addEventListener('click', () => controls.lock());

    // Işıklandırma (Alpha Tarzı)
    const ambient = new THREE.AmbientLight(0xffffff, 0.6);
    scene.add(ambient);
    const sun = new THREE.DirectionalLight(0xffffff, 0.4);
    sun.position.set(50, 100, 50);
    scene.add(sun);

    if (loadSave) {
        blocks = JSON.parse(localStorage.getItem('horrorMini_save'));
    } else {
        generateAlphaWorld();
    }
    
    renderBlocks();
    setupInput();
    animate();
}

// --- DÜNYA ÜRETİMİ ---
function generateAlphaWorld() {
    for (let x = 0; x < WORLD_SIZE; x++) {
        for (let z = 0; z < WORLD_SIZE; z++) {
            // Dağlık yapı (Perlin gürültüsü benzeri basit matematik)
            let h = Math.floor(Math.sin(x/8) * 4 + Math.cos(z/8) * 4 + 15);
            
            for (let y = 0; y < h; y++) {
                let type;
                if (y === h - 1) {
                    // Yüzey
                    type = (Math.random() < 0.1 && (x<5 || z<5)) ? BLOCK_TYPES.SAND : BLOCK_TYPES.GRASS;
                } else if (y > h - 6) {
                    type = BLOCK_TYPES.DIRT;
                } else {
                    // Derinlikler ve Madenler
                    type = BLOCK_TYPES.STONE;
                    let rand = Math.random();
                    if (y < 5) { // En derin
                        if (rand < 0.02) type = BLOCK_TYPES.DIAMOND;
                        else if (rand < 0.05) type = BLOCK_TYPES.GOLD;
                    } else if (y < 12) { // Orta
                        if (rand < 0.04) type = BLOCK_TYPES.IRON;
                    }
                    if (rand < 0.08) type = BLOCK_TYPES.COAL;
                }
                blocks.push({x, y, z, t: type});
            }

            // Nadir Ağaç ve Çakıl (Deniz çevresi/Dağ)
            if (x % 15 === 0 && z % 15 === 0 && Math.random() > 0.5) {
                spawnTree(x, Math.floor(Math.sin(x/8) * 4 + Math.cos(z/8) * 4 + 15), z);
            }
        }
    }
    saveData();
}

function spawnTree(x, y, z) {
    for(let i=0; i<4; i++) blocks.push({x, y: y+i, z, t: BLOCK_TYPES.WOOD}); // Gövde
    for(let lx=-1; lx<=1; lx++) {
        for(let lz=-1; lz<=1; lz++) {
            blocks.push({x: x+lx, y: y+4, z: z+lz, t: BLOCK_TYPES.LEAVES});
        }
    }
}

// --- GÖRSELLEŞTİRME ---
function renderBlocks() {
    const geometry = new THREE.BoxGeometry(1,1,1);
    // Her blok tipi için bir grup oluştur (Performans için)
    Object.values(BLOCK_TYPES).forEach(typeIndex => {
        const typeBlocks = blocks.filter(b => b.t === typeIndex);
        if (typeBlocks.length === 0) return;

        const mesh = new THREE.InstancedMesh(geometry, new THREE.MeshLambertMaterial({color: COLORS[typeIndex]}), typeBlocks.length);
        const matrix = new THREE.Matrix4();
        typeBlocks.forEach((b, i) => {
            matrix.setPosition(b.x, b.y, b.z);
            mesh.setMatrixAt(i, matrix);
        });
        scene.add(mesh);
    });
}

// --- FİZİK VE KONTROLLER ---
function setupInput() {
    document.addEventListener('keydown', (e) => {
        if(e.code === 'KeyW') moveFwd = true;
        if(e.code === 'KeyS') moveBwd = true;
        if(e.code === 'KeyA') moveLft = true;
        if(e.code === 'KeyD') moveRgt = true;
        if(e.code === 'KeyK') placeBlock();
    });
    document.addEventListener('keyup', (e) => {
        if(e.code === 'KeyW') moveFwd = false;
        if(e.code === 'KeyS') moveBwd = false;
        if(e.code === 'KeyA') moveLft = false;
        if(e.code === 'KeyD') moveRgt = false;
    });
    document.addEventListener('mousedown', (e) => { if(e.button === 0) breakBlock(); });
}

function breakBlock() {
    const ray = new THREE.Raycaster();
    ray.setFromCamera(new THREE.Vector2(), camera);
    const intersects = ray.intersectObjects(scene.children);
    if (intersects.length > 0) {
        // Basitlik adına sahneden siliyoruz, gerçek projede blocks dizisinden silinip renderBlocks tetiklenmeli
        intersects[0].object.visible = false; 
        saveData();
    }
}

function placeBlock() {
    const x = Math.round(camera.position.x);
    const y = Math.round(camera.position.y - 2);
    const z = Math.round(camera.position.z);
    blocks.push({x, y, z, t: BLOCK_TYPES.WOOD});
    renderBlocks();
    saveData();
}

function saveData() {
    localStorage.setItem('horrorMini_save', JSON.stringify(blocks));
}

function animate() {
    requestAnimationFrame(animate);
    if (controls.isLocked) {
        // Yerçekimi
        velocity.y -= 0.01; 
        camera.position.y += velocity.y;

        // Basit Yer Çarpışması
        if (camera.position.y < 18) {
            velocity.y = 0;
            camera.position.y = 18;
        }

        // Hareket
        const speed = 0.12;
        if (moveFwd) controls.moveForward(speed);
        if (moveBwd) controls.moveForward(-speed);
        if (moveLft) controls.moveRight(-speed);
        if (moveRgt) controls.moveRight(speed);
    }
    renderer.render(scene, camera);
}

window.onload = () => {
    // UI başlatma burada olabilir
};
</script>
</body>
</html>
