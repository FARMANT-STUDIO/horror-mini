<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>KNKCIM World Engine - V3.1 Final</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #87CEEB; font-family: 'Segoe UI', Tahoma, sans-serif; }
        #loading-screen {
            position: absolute; width: 100%; height: 100%; background: #0a0a0a; color: #00ff00;
            display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 100;
            transition: opacity 0.5s ease;
        }
        #ui { position: absolute; top: 15px; left: 15px; background: rgba(0,0,0,0.7); color: #fff; padding: 15px; border-radius: 10px; font-size: 14px; pointer-events: none; border: 1px solid #333; }
        #crosshair { position: absolute; top: 50%; left: 50%; width: 18px; height: 18px; border: 2px solid rgba(255,255,255,0.8); transform: translate(-50%, -50%); border-radius: 50%; }
        .bar-bg { width: 400px; height: 10px; background: #222; margin-top: 25px; border-radius: 5px; overflow: hidden; }
        #bar-fill { width: 0%; height: 100%; background: #00ff00; box-shadow: 0 0 10px #00ff00; }
        #status { margin-top: 10px; font-size: 12px; text-transform: uppercase; letter-spacing: 2px; }
    </style>
</head>
<body>

<div id="loading-screen">
    <h1 style="margin:0; font-size: 40px;">KNKCIM ENGINE</h1>
    <div id="status">Sistemler Başlatılıyor...</div>
    <div class="bar-bg"><div id="bar-fill"></div></div>
    <p style="color: #666; margin-top: 15px;">112,000,000 BLOK ANALİZ EDİLİYOR...</p>
</div>

<div id="ui">
    <div id="fps" style="color: #ffcc00; font-weight: bold;">FPS: 0</div>
    <div id="xyz" style="color: #00ff00;">XYZ: 0 / 100 / 0</div>
    <div style="color: #00d4ff; font-size: 11px; margin-top: 4px;">RENDER MODU: AKILLI CHUNK (15)</div>
</div>
<div id="crosshair"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>
    // --- TEMEL SAHNE AYARLARI ---
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x87CEEB); // Gündüz Gökyüzü
    scene.fog = new THREE.Fog(0x87CEEB, 10, 80); // Uzak performans sisi

    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ antialias: false }); // Performans için AA kapalı
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    // --- BLOK MATERYALLERİ ---
    const materials = {
        grass: new THREE.MeshLambertMaterial({ color: 0x3d8c40 }),
        dirt: new THREE.MeshLambertMaterial({ color: 0x5c4033 }),
        stone: new THREE.MeshLambertMaterial({ color: 0x7a7a7a }),
        coal: new THREE.MeshLambertMaterial({ color: 0x222222 }),
        iron: new THREE.MeshLambertMaterial({ color: 0xe8d1b5 }),
        gold: new THREE.MeshLambertMaterial({ color: 0xffd700 }),
        diamond: new THREE.MeshLambertMaterial({ color: 0x00f2ff }),
        wood: new THREE.MeshLambertMaterial({ color: 0x4a2e13 }),
        leaf: new THREE.MeshLambertMaterial({ color: 0x1e5c1e, transparent: true, opacity: 0.9 })
    };

    const geometry = new THREE.BoxGeometry(1, 1, 1);
    const worldBlocks = [];

    // --- IŞIKLANDIRMA ---
    const sun = new THREE.DirectionalLight(0xffffff, 1.1);
    sun.position.set(20, 100, 20);
    scene.add(sun);
    scene.add(new THREE.AmbientLight(0x707070));

    // --- BLOK EKLEME FONKSİYONU ---
    function addBlock(x, y, z, type) {
        const block = new THREE.Mesh(geometry, materials[type]);
        block.position.set(x, y, z);
        scene.add(block);
        worldBlocks.push(block);
    }

    // --- 6 BLOKLUK YAPRAKLI AĞAÇ SİSTEMİ ---
    function spawnTree(x, z) {
        const height = 6;
        for(let i=1; i<=height; i++) addBlock(x, 100 + i, z, 'wood'); // 6 Kat Odun
        
        // Yaprak kütlesi
        for(let lx=-2; lx<=2; lx++) {
            for(let lz=-2; lz<=2; lz++) {
                for(let ly=0; ly<3; ly++) {
                    if(Math.abs(lx) + Math.abs(lz) < 3)
                        addBlock(x+lx, 100+height+ly, z+lz, 'leaf');
                }
            }
        }
    }

    // --- YÜKLENME EKRANI SİMÜLASYONU ---
    let progress = 0;
    const bar = document.getElementById('bar-fill');
    const statusText = document.getElementById('status');

    function loadProcess() {
        if (progress < 100) {
            progress += 1.5;
            bar.style.width = progress + "%";
            statusText.innerText = "CHUNK " + Math.floor(progress/6.6) + " AKTİF EDİLİYOR...";
            setTimeout(loadProcess, 30);
        } else {
            const ls = document.getElementById('loading-screen');
            ls.style.opacity = '0';
            setTimeout(() => { ls.style.display = 'none'; }, 500);
            generateWorld();
        }
    }

    // --- DÜNYA VE MADEN ÜRETİMİ ---
    function generateWorld() {
        for(let x=-12; x<12; x++) {
            for(let z=-12; z<12; z++) {
                // Yüzey: Kat 100 (Çimen)
                addBlock(x, 100, z, 'grass');
                
                // Yeraltı ve Madenler (-200 kat mantığı için rastgele derinlikler)
                const rand = Math.random();
                if(rand > 0.99) addBlock(x, 90 + Math.random()*5, z, 'diamond');
                else if(rand > 0.96) addBlock(x, 85 + Math.random()*10, z, 'gold');
                else if(rand > 0.92) addBlock(x, 80 + Math.random()*15, z, 'iron');
                else if(rand > 0.85) addBlock(x, 75 + Math.random()*25, z, 'stone');
                
                // Toprak katmanı
                addBlock(x, 99, z, 'dirt');

                // Ağaçlar
                if(Math.random() > 0.97) spawnTree(x, z);
            }
        }
    }

    // --- OYUNCU KONTROLLERİ ---
    camera.position.set(0, 102, 5);
    const raycaster = new THREE.Raycaster();
    const center = new THREE.Vector2(0, 0);

    // BLOK KAZMA (SOL TIK)
    window.addEventListener('mousedown', (e) => {
        if(e.button === 0 && document.pointerLockElement) {
            raycaster.setFromCamera(center, camera);
            const intersects = raycaster.intersectObjects(worldBlocks);
            if (intersects.length > 0) {
                const target = intersects[0].object;
                scene.remove(target);
                worldBlocks.splice(worldBlocks.indexOf(target), 1);
            }
        }
    });

    // BAKMA (MOUSE)
    window.addEventListener('mousemove', (e) => {
        if(document.pointerLockElement) {
            camera.rotation.y -= e.movementX * 0.002;
            camera.rotation.x -= e.movementY * 0.002;
            camera.rotation.x = Math.max(-Math.PI/2, Math.min(Math.PI/2, camera.rotation.x));
        }
    });

    // Mouse Kilitleme
    window.addEventListener('click', () => {
        if(!document.pointerLockElement) document.body.requestPointerLock();
    });

    // --- RENDER DÖNGÜSÜ ---
    let lastTime = performance.now();
    function animate() {
        requestAnimationFrame(animate);
        const time = performance.now();
        const fps = Math.round(1000 / (time - lastTime));
        lastTime = time;

        // FPS ve XYZ Güncelleme
        document.getElementById('fps').innerText = `FPS: ${fps}`;
        document.getElementById('xyz').innerText = `XYZ: ${camera.position.x.toFixed(0)} / ${camera.position.y.toFixed(0)} / ${camera.position.z.toFixed(0)}`;

        renderer.render(scene, camera);
    }

    loadProcess();
    animate();
</script>
</body>
</html>
