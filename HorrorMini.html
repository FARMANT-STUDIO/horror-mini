<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>FARMANT STUDIOS - HORROR MINI</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #87CEEB; } /* Gökyüzü mavisi */
        #ui { 
            position: absolute; top: 20px; left: 20px; 
            color: #00ff00; font-family: 'Courier New', monospace; 
            text-shadow: 2px 2px #000; pointer-events: none;
            z-index: 10;
        }
        #crosshair { 
            position: absolute; top: 50%; left: 50%; 
            width: 20px; height: 2px; background: white;
            transform: translate(-50%, -50%);
        }
        #crosshair::after {
            content: ''; position: absolute; top: -9px; left: 9px;
            width: 2px; height: 20px; background: white;
        }
    </style>
</head>
<body>
    <div id="ui">
        <span style="font-size: 1.2em; color: #ff0000; font-weight: bold;">FARMANT STUDIOS</span><br>
        <span style="font-size: 1.5em; letter-spacing: 2px;">HORROR MINI - BILGISAYAR EDITION</span><br>
        <hr style="border: 1px solid #333;">
        KONUM: <span id="pos">0, 0, 0</span><br>
        CHUNKS: <span id="chunkCount">0</span><br>
        KONTROLLER: [W,A,S,D] Hareket | [K] Blok Koy | [SOL TIK] Kır
    </div>
    <div id="crosshair"></div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { PointerLockControls } from 'three/addons/controls/PointerLockControls.js';

        const CHUNK_SIZE = 16;
        const DEEP_LAYERS = 42;
        const VIEW_DIST = 4; 

        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87CEEB); // Siyah yerine mavi gökyüzü

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: false });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        const controls = new PointerLockControls(camera, document.body);
        document.body.addEventListener('click', () => controls.lock());

        const mats = {
            grass: new THREE.MeshLambertMaterial({ color: 0x559022 }),
            dirt: new THREE.MeshLambertMaterial({ color: 0x8B4513 }),
            stone: new THREE.MeshLambertMaterial({ color: 0x808080 }),
            stalker: new THREE.MeshBasicMaterial({ color: 0xffffff })
        };
        const boxGeo = new THREE.BoxGeometry(1, 1, 1);
        const chunks = new Map();

        class Chunk {
            constructor(cx, cz) {
                this.cx = cx;
                this.cz = cz;
                this.group = new THREE.Group();
                const countPerLayer = CHUNK_SIZE * CHUNK_SIZE;
                this.iGrass = new THREE.InstancedMesh(boxGeo, mats.grass, countPerLayer);
                this.iDirt = new THREE.InstancedMesh(boxGeo, mats.dirt, countPerLayer * 3);
                this.iStone = new THREE.InstancedMesh(boxGeo, mats.stone, countPerLayer * DEEP_LAYERS);
                this.generate();
            }

            generate() {
                const dummy = new THREE.Object3D();
                let gIdx = 0, dIdx = 0, sIdx = 0;
                for (let x = 0; x < CHUNK_SIZE; x++) {
                    for (let z = 0; z < CHUNK_SIZE; z++) {
                        const worldX = this.cx * CHUNK_SIZE + x;
                        const worldZ = this.cz * CHUNK_SIZE + z;
                        const surfaceY = Math.floor(Math.sin(worldX * 0.1) * 2 + Math.cos(worldZ * 0.1) * 2 + 5);

                        dummy.position.set(worldX, surfaceY, worldZ);
                        dummy.updateMatrix();
                        this.iGrass.setMatrixAt(gIdx++, dummy.matrix);

                        for (let y = 1; y <= DEEP_LAYERS; y++) {
                            dummy.position.set(worldX, surfaceY - y, worldZ);
                            dummy.updateMatrix();
                            if (y < 4) this.iDirt.setMatrixAt(dIdx++, dummy.matrix);
                            else this.iStone.setMatrixAt(sIdx++, dummy.matrix);
                        }
                    }
                }
                this.iGrass.instanceMatrix.needsUpdate = true;
                this.iDirt.instanceMatrix.needsUpdate = true;
                this.iStone.instanceMatrix.needsUpdate = true;
                this.group.add(this.iGrass, this.iDirt, this.iStone);
            }
        }

        const keys = {};
        window.addEventListener('keydown', (e) => keys[e.code] = true);
        window.addEventListener('keyup', (e) => keys[e.code] = false);

        function updateMovement() {
            const speed = 0.2;
            if (keys['KeyW']) controls.moveForward(speed);
            if (keys['KeyS']) controls.moveForward(-speed);
            if (keys['KeyA']) controls.moveRight(-speed);
            if (keys['KeyD']) controls.moveRight(speed);
        }

        // --- BLOK ETKİLEŞİMİ ---
        window.addEventListener('keydown', (e) => { if (e.code === 'KeyK' && controls.isLocked) rayAction(true); });
        window.addEventListener('mousedown', (e) => { if (e.button === 0 && controls.isLocked) rayAction(false); });

        function rayAction(isAdding) {
            const ray = new THREE.Raycaster();
            ray.setFromCamera(new THREE.Vector2(0,0), camera);
            const hits = ray.intersectObjects(scene.children, true);
            if (hits.length > 0) {
                const hit = hits[0];
                if (isAdding) {
                    const pos = new THREE.Vector3().copy(hit.point).add(hit.face.normal.multiplyScalar(0.5)).floor();
                    const b = new THREE.Mesh(boxGeo, mats.grass);
                    b.position.set(pos.x + 0.5, pos.y + 0.5, pos.z + 0.5);
                    scene.add(b);
                } else {
                    if (hit.object instanceof THREE.InstancedMesh) {
                        const m = new THREE.Matrix4().makeScale(0,0,0);
                        hit.object.setMatrixAt(hit.instanceId, m);
                        hit.object.instanceMatrix.needsUpdate = true;
                    } else { scene.remove(hit.object); }
                }
            }
        }

        // --- STALKER ---
        const stalker = new THREE.Mesh(new THREE.BoxGeometry(0.8, 2, 0.8), mats.stalker);
        scene.add(stalker);
        stalker.position.set(0, -100, 0);

        function handleStalker() {
            if (camera.position.distanceTo(stalker.position) > 40) {
                stalker.position.set(camera.position.x + 20, 10, camera.position.z + 20);
            }
            const camDir = new THREE.Vector3();
            camera.getWorldDirection(camDir);
            const toS = new THREE.Vector3().subVectors(stalker.position, camera.position).normalize();
            if (camDir.dot(toS) > 0.8) stalker.position.y = -100;
        }

        function updateChunks() {
            const curCX = Math.floor(camera.position.x / CHUNK_SIZE);
            const curCZ = Math.floor(camera.position.z / CHUNK_SIZE);
            for (let x = curCX - VIEW_DIST; x <= curCX + VIEW_DIST; x++) {
                for (let z = curCZ - VIEW_DIST; z <= curCZ + VIEW_DIST; z++) {
                    const key = `${x},${z}`;
                    if (!chunks.has(key)) {
                        const c = new Chunk(x, z);
                        chunks.set(key, c);
                        scene.add(c.group);
                    }
                }
            }
            document.getElementById('chunkCount').innerText = chunks.size;
        }

        // --- BAŞLANGIÇ ---
        camera.position.set(0, 25, 0); // Yüksekten başlat
        scene.add(new THREE.AmbientLight(0xffffff, 1.0));
        const sun = new THREE.DirectionalLight(0xffffff, 0.8);
        sun.position.set(10, 50, 10);
        scene.add(sun);

        function animate() {
            requestAnimationFrame(animate);
            if (controls.isLocked) {
                updateMovement();
                updateChunks();
                handleStalker();
                document.getElementById('pos').innerText = `${Math.round(camera.position.x)}, ${Math.round(camera.position.y)}, ${Math.round(camera.position.z)}`;
            }
            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
