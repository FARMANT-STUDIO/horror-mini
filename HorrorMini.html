<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Farmant Voxel - Alpha 0.02 FINAL PHYSICS</title>
    <style>
        body { margin: 0; overflow: hidden; background: #87ceeb; font-family: 'Segoe UI', sans-serif; user-select: none; }
        canvas { display: block; }
        #hud { position: fixed; bottom: 15px; left: 50%; transform: translateX(-50%); display: flex; flex-direction: column; align-items: center; gap: 4px; pointer-events: none; z-index: 100; }
        .bar { display: flex; gap: 2px; font-size: 20px; text-shadow: 2px 2px #000; line-height: 1; }
        #hotbar { display: flex; gap: 4px; background: rgba(0,0,0,0.8); padding: 8px; border: 2px solid #444; border-radius: 4px; margin-top: 5px; }
        .slot { width: 42px; height: 46px; border: 1px solid #555; background: rgba(255,255,255,0.1); color: white; font-size: 9px; display: flex; align-items: center; justify-content: center; }
        #menu { position: fixed; inset: 0; background: #000; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 10000; }
        .btn { background: #bc13fe; color: white; border: none; padding: 15px 50px; font-size: 24px; cursor: pointer; border-radius: 4px; font-weight: bold; box-shadow: 0 0 20px #bc13fe; }
    </style>
</head>
<body>
    <div id="menu">
        <h1 style="color:#bc13fe; font-size: 60px; margin: 0;">FARMANT</h1>
        <p style="color:#555; margin-bottom: 25px;">Alpha 0.02 - GERÇEK HİTBOX GELDİ</p>
        <button class="btn" onclick="start()">OYUNA GİR</button>
        <p style="color:#444; margin-top:15px;">ESC: Google Kaçışı | Sol Tık: Hayvan Avla/Et Ye</p>
    </div>

    <div id="hud">
        <div id="hp" class="bar" style="color: #ff2e2e;">❤❤❤❤❤❤❤❤❤❤</div>
        <div id="hunger" class="bar" style="color: #ff9f43;">🍖🍖🍖🍖🍖🍖🍖🍖🍖🍖</div>
        <div id="hotbar">
            <div class="slot" style="border-color:white">KAZMA</div>
            <div id="et-slot" class="slot">ET: 0</div>
            <div class="slot">TOPRAK</div>
            <div class="slot">TAŞ</div>
            <div class="slot">MADEN</div>
        </div>
    </div>

    <script type="module">
        import * as THREE from 'https://unpkg.com/three@0.160.0/build/three.module.js';

        let scene, camera, renderer, ghost, timer = 0, isLive = false;
        let hp = 10, food = 10, etCount = 0, vVel = 0;
        const grav = 0.009, jump = 0.18, chunkSize = 10;
        const blocks = [], mobs = [], keys = {}, world = {};
        
        // Karakter boyutu (AABB)
        const playerSize = { w: 0.6, h: 1.8, d: 0.6 };

        const mats = {
            grass: new THREE.MeshLambertMaterial({color: 0x2ecc71}),
            dirt: new THREE.MeshLambertMaterial({color: 0x8b4513}),
            stone: new THREE.MeshLambertMaterial({color: 0x7f8c8d}),
            ore: new THREE.MeshLambertMaterial({color: 0x34495e})
        };

        window.start = () => {
            document.getElementById('menu').style.display = 'none';
            document.body.requestPointerLock();
            isLive = true;
            init();
        };

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x87ceeb);
            scene.fog = new THREE.Fog(0x87ceeb, 2, 35);

            camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
            camera.position.set(0, 15, 0);

            renderer = new THREE.WebGLRenderer({ antialias: false });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            scene.add(new THREE.HemisphereLight(0xffffff, 0x444444, 1.8));
            loop();
        }

        function createChunk(cx, cz) {
            const id = `${cx},${cz}`;
            if(world[id]) return;
            for(let x=0; x<chunkSize; x++) {
                for(let z=0; z<chunkSize; z++) {
                    const wx = cx*chunkSize + x;
                    const wz = cz*chunkSize + z;
                    let h = Math.floor(Math.sin(wx*0.15)*Math.cos(wz*0.15)*7);
                    
                    for(let y = h; y > h-5; y--) {
                        let m = mats.stone;
                        if(y === h) m = mats.grass;
                        else if(y > h-2) m = mats.dirt;
                        if(y < h-2 && Math.random() < 0.1) m = mats.ore;

                        const b = new THREE.Mesh(new THREE.BoxGeometry(1,1,1), m);
                        b.position.set(wx, y, wz);
                        // Hitbox için verileri ekle
                        b.userData.isBlock = true;
                        scene.add(b);
                        blocks.push(b);
                    }
                }
            }
            world[id] = true;
            if(Math.random() > 0.8) spawnMob(cx*chunkSize+5, 12, cz*chunkSize+5);
        }

        function spawnMob(x, y, z) {
            const m = new THREE.Mesh(new THREE.BoxGeometry(0.8, 1.2, 0.8), new THREE.MeshLambertMaterial({color: 0x5d4037}));
            m.position.set(x, y, z);
            m.userData.isMob = true;
            scene.add(m);
            mobs.push(m);
        }

        // --- GERÇEK SERT HİTBOX KONTROLÜ ---
        function checkCollision(newPos) {
            const pBox = new THREE.Box3().setFromCenterAndSize(
                new THREE.Vector3(newPos.x, newPos.y - 0.4, newPos.z), 
                new THREE.Vector3(playerSize.w, playerSize.h, playerSize.d)
            );
            
            // Sadece yakındaki blokları kontrol et (Performans için)
            for(let i=0; i<blocks.length; i++) {
                const b = blocks[i];
                if(Math.abs(b.position.x - newPos.x) < 2 && Math.abs(b.position.z - newPos.z) < 2) {
                    const bBox = new THREE.Box3().setFromObject(b);
                    if(pBox.intersectsBox(bBox)) return true;
                }
            }
            for(let i=0; i<mobs.length; i++) {
                const mBox = new THREE.Box3().setFromObject(mobs[i]);
                if(pBox.intersectsBox(mBox)) return true;
            }
            return false;
        }

        function loop() {
            requestAnimationFrame(loop);
            if(!isLive) return;
            timer++;

            // Açlık & Can
            if(timer % 1200 === 0 && food > 0) { food--; updateHUD(); }
            if(food <= 0 && timer % 300 === 0) { hp--; updateHUD(); if(hp<=0) location.reload(); }

            // Ghost
            if(timer === 1200 && !ghost) {
                ghost = new THREE.Mesh(new THREE.BoxGeometry(0.5, 2, 0.2), new THREE.MeshBasicMaterial({color: 0xffffff}));
                ghost.position.set(camera.position.x+7, 5, camera.position.z-7);
                scene.add(ghost);
            }

            // --- FİZİK MOTORU ---
            vVel -= grav;
            let targetY = camera.position.clone();
            targetY.y += vVel;

            if(!checkCollision(targetY)) {
                camera.position.y += vVel;
            } else {
                if(vVel < 0) { // Yere çarptıysa
                    vVel = 0;
                    if(keys['Space']) vVel = jump;
                } else { // Kafayı tavana çarptıysa
                    vVel = -0.01;
                }
            }

            // --- HAREKET MOTORU ---
            const speed = 0.14;
            let moveDir = new THREE.Vector3();
            if(keys['KeyW']) moveDir.z -= 1;
            if(keys['KeyS']) moveDir.z += 1;
            if(keys['KeyA']) moveDir.x -= 1;
            if(keys['KeyD']) moveDir.x += 1;
            
            moveDir.applyQuaternion(camera.quaternion);
            moveDir.y = 0;
            moveDir.normalize().multiplyScalar(speed);

            // Adım adım kontrol (Duvarlara yapışmamak için)
            let nextX = camera.position.clone(); nextX.x += moveDir.x;
            if(!checkCollision(nextX)) camera.position.x += moveDir.x;

            let nextZ = camera.position.clone(); nextZ.z += moveDir.z;
            if(!checkCollision(nextZ)) camera.position.z += moveDir.z;

            // Chunk sistemi
            const cx = Math.floor(camera.position.x/chunkSize);
            const cz = Math.floor(camera.position.z/chunkSize);
            for(let i=-1; i<=1; i++) for(let j=-1; j<=1; j++) createChunk(cx+i, cz+j);

            mobs.forEach(m => { m.position.x += Math.sin(timer*0.03)*0.01; });
            if(ghost) ghost.lookAt(camera.position);

            renderer.render(scene, camera);
        }

        function updateHUD() {
            document.getElementById('hp').innerText = "❤".repeat(hp);
            document.getElementById('hunger').innerText = "🍖".repeat(food);
            document.getElementById('et-slot').innerText = "ET: " + etCount;
        }

        window.onmousedown = () => {
            const ray = new THREE.Raycaster();
            ray.setFromCamera(new THREE.Vector2(0,0), camera);
            const hits = ray.intersectObjects(mobs);
            if(hits.length > 0 && hits[0].distance < 4) {
                scene.remove(hits[0].object);
                mobs.splice(mobs.indexOf(hits[0].object), 1);
                etCount++; updateHUD();
            } else if(etCount > 0 && food < 10) {
                etCount--; food = Math.min(10, food + 2); updateHUD();
            }
        };

        window.onkeydown = (e) => { 
            if(e.key === "Escape") window.location.href = "https://google.com";
            keys[e.code] = true; 
        };
        window.onkeyup = (e) => keys[e.code] = false;
        document.addEventListener('mousemove', (e) => {
            if(document.pointerLockElement) {
                camera.rotation.y -= e.movementX * 0.0025;
                camera.rotation.x -= e.movementY * 0.0025;
                camera.rotation.x = Math.max(-1.5, Math.min(1.5, camera.rotation.x));
            }
        });
    </script>
</body>
</html>
