<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Horror Mini v0.03</title>

<style>
body { margin:0; overflow:hidden; background:black; }

#ui{
  position:absolute;
  top:10px;
  left:10px;
  color:#0f0;
  font-family:monospace;
  font-size:14px;
  z-index:10;
}

#version{
  color:#ff5555;
  font-size:10px;
  display:block;
}

#crosshair{
  position:absolute;
  top:50%;
  left:50%;
  width:6px;
  height:6px;
  background:white;
  transform:translate(-50%,-50%);
}
</style>
</head>

<body>

<div id="ui">
HORROR MINI ENGINE
<span id="version">v0.03 ALPHA</span>
</div>

<div id="crosshair"></div>

<script type="module">
import * as THREE from "https://unpkg.com/three@0.160.0/build/three.module.js";
import { PointerLockControls } from "https://unpkg.com/three@0.160.0/examples/jsm/controls/PointerLockControls.js";
import { SimplexNoise } from "https://cdn.skypack.dev/simplex-noise";


// ---------------- CORE ----------------
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0a0a0a);

const camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.1, 1000);

const renderer = new THREE.WebGLRenderer();
renderer.setSize(innerWidth, innerHeight);
document.body.appendChild(renderer.domElement);

const controls = new PointerLockControls(camera, document.body);
document.body.addEventListener("click", ()=>controls.lock());

scene.add(new THREE.AmbientLight(0xffffff, 0.9));

const noise = new SimplexNoise();


// ---------------- BLOCKS ----------------
const geo = new THREE.BoxGeometry(1,1,1);
const mat = new THREE.MeshLambertMaterial({color:0x777777});

const blocks = [];
const world = new Map();

const key = (x,y,z)=>`${x},${y},${z}`;


// ---------------- PLAYER ----------------
const player = {
  velocity: new THREE.Vector3(),
  direction: new THREE.Vector3(),
  speed: 0.15,
  canJump: false
};

camera.position.set(0,25,0);


// ---------------- INPUT ----------------
const keys = {};

document.addEventListener("keydown",(e)=>{
  keys[e.key.toLowerCase()] = true;

  if(e.key.toLowerCase() === "k"){
    placeBlock();
  }
});

document.addEventListener("keyup",(e)=>{
  keys[e.key.toLowerCase()] = false;
});


// ---------------- BLOCK ----------------
function addBlock(x,y,z){
  const mesh = new THREE.Mesh(geo,mat);
  mesh.position.set(x,y,z);
  scene.add(mesh);
  blocks.push(mesh);
  world.set(key(x,y,z), true);
}


// ---------------- WORLD GEN ----------------
function gen(){

  for(let x=-32;x<=32;x++){
    for(let z=-32;z<=32;z++){

      const h = Math.floor(noise.noise2D(x*0.05,z*0.05)*15 + 20);

      for(let y=0;y<h;y++){
        addBlock(x,y,z);
      }
    }
  }
}

gen();


// ---------------- RAYCAST ----------------
const ray = new THREE.Raycaster();

function breakBlock(){
  ray.setFromCamera({x:0,y:0},camera);

  const hit = ray.intersectObjects(blocks);

  if(hit.length && hit[0].distance < 5){
    const b = hit[0].object;
    world.delete(key(b.position.x,b.position.y,b.position.z));
    scene.remove(b);
  }
}

function placeBlock(){
  ray.setFromCamera({x:0,y:0},camera);

  const hit = ray.intersectObjects(blocks);

  if(hit.length && hit[0].distance < 5){

    const n = hit[0].face.normal;
    const pos = hit[0].object.position.clone();

    pos.add(n);

    if(!world.has(key(pos.x,pos.y,pos.z))){
      addBlock(pos.x,pos.y,pos.z);
    }
  }
}

document.addEventListener("mousedown",(e)=>{
  if(e.button===0) breakBlock();
});


// ---------------- COLLISION ----------------
function isSolid(x,y,z){
  return world.has(key(Math.floor(x),Math.floor(y),Math.floor(z)));
}


// ---------------- MOVEMENT ----------------
function move(){

  player.direction.set(0,0,0);

  if(keys["w"]) player.direction.z -= 1;
  if(keys["s"]) player.direction.z += 1;
  if(keys["a"]) player.direction.x -= 1;
  if(keys["d"]) player.direction.x += 1;

  player.direction.normalize();

  const nx = camera.position.x + player.direction.x * player.speed;
  const nz = camera.position.z + player.direction.z * player.speed;

  if(!isSolid(nx,camera.position.y,camera.position.z)){
    camera.position.x = nx;
  }

  if(!isSolid(camera.position.x,camera.position.y,nz)){
    camera.position.z = nz;
  }

  // gravity
  player.velocity.y -= 0.015;
  camera.position.y += player.velocity.y;

  if(isSolid(camera.position.x,camera.position.y-1,camera.position.z)){
    camera.position.y = Math.floor(camera.position.y)+1;
    player.velocity.y = 0;
    player.canJump = true;
  }

  if(keys[" "] && player.canJump){
    player.velocity.y = 0.25;
    player.canJump = false;
  }
}


// ---------------- LOOP ----------------
function animate(){
  requestAnimationFrame(animate);
  move();
  renderer.render(scene,camera);
}

animate();


// ---------------- RESIZE ----------------
window.addEventListener("resize",()=>{
  camera.aspect = innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth,innerHeight);
});
</script>

</body>
</html>
